body:
  text: 一胎寒小兒初生百日內覺口冷腹痛身起寒粟時發戰栗曲足握拳晝夜啼哭不已或口噤不開名曰胎寒其證在胎時母因腹痛而致寒經云胎寒多腹痛亦有産婦喜啖生冷或胎前外感風寒暑濕治以涼藥內傷胎氣則生後昏昏多睡間哯乳瀉白若不早治多成慢驚醫林川白薑散治産婦胎中受寒令兒腹痛不乳木香陳皮檳榔子各一分肉桂白薑甘草各半分上水煎綿蘸與之嘔加木瓜丁香南豐李氏曰面青四肢冷去檳榔子加當歸川芎東井翁曰加藿香砂仁去檳榔子為良方薛氏六君子湯腹痛手足冷惡寒依本方加炮薑以溫中醫統當歸散治小兒胎中受寒面色青白腹痛啼哭不寧當歸官桂川芎白薑炮香附木香甘草各等分上為末每服一字以乳汁調下日二服看大小加減服之大全當歸散楊氏方治小兒胎寒面青肢冷大便青黑腹痛當歸黃耆細辛黃芩龍骨桂心赤芍各半兩上為末每服一字以乳汁下醫統今氣散治小兒胎寒咳嗽氣喘腹脹桔梗陳皮一錢砂仁茴香各五分白薑二分半粉草四分上為細末每服一字空心沸湯調下醫統參苓白朮散治小兒脾胃虛寒瀉泄不思乳食醫統白芍藥湯治胎腹痛乳母同服白芍炒澤瀉各一錢炙甘草薄荷各一分上水煎入薑三片鉤藤一錢如乳母服宜大劑二胎熱巢氏曰小兒在胎母食熱物之物或熱藥令兒生下身熱面赤眼開口熱痰盛喘急大便不通小便赤澀多因胎中受熱或因誤服溫劑致令熱蓄於內蒸胎氣固有此證若久而不治則鵝口重舌紫赤丹瘤急驚風搐皆由此而生也入門釀乳方楊氏方主生下面赤眼閉二便不通不飲乳生地黃二錢澤瀉二錢半豬苓赤茯苓天花粉各一錢半茵陳甘草各一錢山梔子上水煎令乳母捏去宿乳卻服藥少頃乳之醫統木通湯治小兒胎熱諸熱腸腑開澀瘡毒丹班母子同服木通扁豆各五錢大黃赤茯苓甘草各三錢瞿麥滑石山梔子車前黃芩各一錢上入燈心薄荷水煎服醫統甘豆湯治小兒胎熱甘草一錢黑豆二錢淡竹葉十片上入燈心水煎服準繩四聖散治芽兒受熱毒生下兩目不開燈心黃連秦皮木賊上入棗水煎澄清去渣無時洗面目自開後服地黃膏準繩地黃膏治小兒胎熱山梔子緑豆粉各一兩半粉草六錢上為末用生地黃搗杵兩半和好蜜一兩半以薄瓦器盛在銅銚內煮成膏如稀糊候冷候分入前末同在乳鉢內再研勻和丸芡實大每以半丸麥門冬湯化服綱目胎熱地黃湯治兒生下面赤眼閉身體壯熱哭聲不止熱如湯乃胎熱之候也生乾地黃赤芍川芎當歸栝蔞根上水煎産婦可服抹些入兒口小兒初生有胎熱證者宜先以木通散煎與母服使通於乳令兒飲之通心氣解煩熱不可求速效乳母服藥漸次解熱百無一失若以涼藥攻之損脾胃必致嘔吐變生大患也三胎肥小兒生下肌肉厚遍身紅如血色滿月已後漸漸肌瘦目白睛紅花色五心熱大便難時時吐涎者是也當用浴體法主之直訣浴體法治肥胎並胎怯胎熱烏蛇肉酒浸焙末白礬青黛各三錢蠍梢辰砂各五分天麻二錢麝香一字上同研勻用水三碗入藥三錢桃枝一握同煎至十沸溫浴之勿浴背薛氏曰案浴體法乃開發腠理疏泄陽氣者也其胎氣果熱在暑月庶幾可用其或胎怯用前法恐復傷真氣也四胎瘦醫林長生丸主治瘦怯面黃白睛多喜哭身肌肉薄大便色白屬肺檳榔子枳殼各一兩木香五錢砂仁半夏丁香肉豆蔻蠍梢各二十個五不乳不乳者謂初出胞胎而不吮乳也嬰兒初出胎時其聲未發急以手拭其口令惡血淨盡不得下咽即無他病若拭口不全惡穢入腹則令腹滿氣短不能吮乳或産母取冷過度胎中受寒致令兒腹痛也宜茯苓丸醫林茯苓丸赤茯苓黃連枳殼各等分上為末煉蜜為丸如梧子大每服一丸乳汁化下準繩硃砂丸治三歲以下口胃閉不吃乳硃砂牛黃麝香丁香甘草炙人參各一分犀角黃耆石膏研細水飛五靈脂各半兩上搗羅研勻蜜丸如緑豆熟水下三丸日四五服治穢惡入腹令兒嘔吐不乳方木香乾薑生茯苓甘草木瓜丁香各等分上水煎綿蘸滴與之六胎驚巢氏曰小兒在胎因母驚悸有所觸撲驚氣入胎子乘母氣降生之後其兒精神不爽顏色虛白初則溫溫有熱其後頰赤多驚物動則恐聲響則悸印堂青色壯熱哯乳睡中多驚手足微掣久則成癇醫統青龍丸治小兒胎熱化痰鎮驚人參天麻茯神白附子炮南星各一兩甘草炙錢半青黛一錢硃砂水飛半錢麝香一錢上為細末煉蜜為丸梧子大用鉤藤皂莢子煎湯研化不拘時服醫統參蠍散治小兒胎驚定心神天漿子天竹黃人參硃砂全蠍天麻蟬退麝香少許上為末煉蜜為丸如梧子大每服一丸金銀湯下準繩獨活湯治胎驚發散風邪羌活獨活各一分檳榔子天麻麻黃甘草各半分上水煎服於內加南星末蜜調下可貼囟用醫林至聖保命丹治小兒胎驚內吊腹肚堅硬目睛上視手足抽掣角弓反張但是涎痰壅盛一切急慢驚風並治全蠍十四個白附天南星白殭蠶硃砂另研麝香另研各一錢防風天麻各二錢金箔十片蟬蛻一錢上為細末和勻以粳米煮飯取中心軟者搜為丸每兩作四十丸初生兒半丸乳汁化下周歲兒一丸金銀薄荷湯化下十歲左右有急候者二丸薄荷湯化下常服鎮心醫統豬乳膏治小兒諸驚胎癇全蠍一個琥珀硃砂少許上為末每服一字麥門冬煎湯調下醫林一方湯氏治胎中受驚故未滿月而發驚辰砂研細牛黃少許上取乳汁調稀抹入口中加麝香少許吮妙乳母服防風通聖散七胎黃千金論云小兒生下遍身面目皆黃如金色身上壯熱大便不通小便濁赤不思乳食啼叫不止此胎黃之候也皆因母受熱而傳於胎也準繩生地黃湯湯氏方治小兒生下胎黃生地黃赤芍川芎當歸栝蔞仁各等分上水煎乳母服時時少抹入兒口中全幼犀角散治小兒胎熱一身盡黃犀角茵陳栝蔞根升麻甘草龍膽草生地黃寒水石煅各等分上水煎服準繩地黃湯治胎黃生地赤芍天花粉赤茯苓川芎當歸豬苓澤瀉甘草茵陳上水煎服醫統生地黃飲子治小兒生下滿身面目俱黃狀如金色面赤身熱眼閉不開大便不通小便如梔汁滿身生瘡生地赤芍各二錢羌活當歸各一錢甘草二分上為極末用燈心煎湯服産婦宜服抹少入兒口內八撮口聖惠論小兒撮口皆由在母胎中挾於風熱兒生之後氣血未調洗浴當風而成此病若口吐白沫四肢覺冷必難用藥也小兒患諸風疾傳入惡候至於撮口病致危急凡有臍風撮口胎風撮口鎖肚撮口釣腸撮口卵疝撮口應病悉入成風入心脾俱能撮口夫患在撮口者皆由結鬱於中及於腸胃閉不得通氣不能化腹中滿脹肚下青筋撮口不乳證候甚急若不速與利下無可救療若將撮口以為常少緩之則斃矣醫林薑蠶散湯氏方治面目黃赤氣息喘急啼聲不出蓋由胎氣挾熱流毒心脾故令舌強唇青撮口飲乳有妨真薑蠶上為末蜜調塗口又牛黃研竹瀝調一字抹口中聖惠方醫統辰砂薑蠶散治初生撮口辰砂水飛五分薑蠶炒一錢蛇退炒一錢麝香研半分上為細末少許用蜜調傅唇口準繩撮風散治小兒撮口赤腳蜈蚣半條炙鉤藤二錢半硃砂薑蠶全蠍梢各一錢麝香一字上為末每服一字竹瀝調下醫林天麻丸治釣腸鎖肚撮口天南星炮二錢白附子牙硝天麻五靈脂全蠍焙各一錢巴豆霜一字輕粉半錢上為末稀糊丸如麻子大每服一丸薄荷湯調下準繩甘草湯治小兒撮口取肚甘草生一錢上煎服令吐出痰涎即以豬乳點入口中即痊醫林益脾散撮口用龍膽湯天麻丸類以去痰涎後用此方補脾胃茯苓人參草果煨木香甘草陳皮厚朴紫蘇子炒各等分上為末每服一錢薑棗水煎服九口噤巢氏病源云小兒在胎母吃熱物入臟腑兒生之後熱毒結聚滿口舌上其形如粟令兒不能開口名曰口噤醫統定命散治小兒初生口噤不乳蟬蛻十枚全蠍七個上為極末入輕粉少許和研用乳汁調化服醫林辰砂膏治眼閉口噤啼聲漸少舌上聚肉如粟米狀吃乳不得口吐白沫大小便皆不通蓋由胎中感受熱氣流毒於心脾故形見於喉舌或為風邪所搏致之辰砂三錢硼砂馬牙硝各一錢半玄明粉二錢全蠍真珠末各一錢麝香一字上為細末好油紙包裹自然成膏每用一豆許乳汁調敷乳頭上吃下金銀薄荷湯下亦可有潮熱甘草湯下全幼辰砂全蠍散治初生兒口噤辰砂飛半錢全蠍炙二十枚硼砂龍腦麝香各一字上為極末用乳母唾調塗口唇里及牙齒上或用豬乳少許調入口內兵部一方治小兒口噤體熱用竹瀝二合暖飲分三四服本草一方治小兒口噤牙關不開天南星一枚上煨熟紙裹斜包剪一小孔透氣於口中牙關自開也一方用生南星同薑汁擦之自開一鎖肛小兒由胎中受熱熱毒壅盛結肛門閉而不通無復滋潤所以有鎖肛之候若至第三日不通急令婦人以溫水漱口吸嘔兒前後心並臍下手足心共七處凡四五次仍以輕粉半錢蜜少許溫水化開時時將少許服之以通為度如便不通即是肛門內令當以物透而通之金簪為上玉簪次之須探入二寸許以蘇合香丸納入孔中糞出為快也若肚腹膨脹不能飲食作呻吟聲至於一七難可望其有生也醫統蘇合香丸治小兒鎖肛大便不通蘇合香油入安息油內各一兩安息香別為末無灰酒一升熬成膏薰陸香另研一兩青木香麝香白檀香沉香丁香白朮烏犀屑硃砂研水飛訶梨勒香附子蓽茇各一兩龍腦五錢上為末煉蜜丸梧子大醫統豬膽煎治導法入小兒肛門豬膽一枚以竹管一個插入膽內以絲線密密扎定以竹管插入肛門方逼膽汁入即通一一臍突臍為兒之根帶胎氣固則形體壯臍深則根命長受氣乖違形萎臍突凡兒斷臍利益漸長漸深吻乳調和愈實是血脈之相順致形體之相資初生之見有熱在胃及胸堂則頻頻伸引厄厄作聲努脹其氣抑入根本之中所以臍突腫赤虛大可畏無識之人將謂斷臍不利而使然者則非也斷臍不盈亦一臘之內隨其根帶自腐實者深之弱者淺之深淺之理以其稟賦得之良由胎中母多驚熱宜與散熱之藥其臍歸本不必以毒藥傅之恐毒傷入為害醫統山梔五苓散治小兒臍突梔子炒白朮炒茯苓豬苓澤瀉各一錢官桂五分上為極末每服一錢或五分用蜜湯燈心湯調下醫統二豆湯治前證赤小豆豆豉天南星白蘞各一錢上為細末每用半錢用芭蕉自然汁調傅臍四旁一日一次二日二次若得小腑下白即安準繩外消散治嬰孩初生旬日外臍突或不痛痛則啼聲不止大黃牡蠣炒各五分朴硝二錢上前二味銼焙為末仍入朴硝乳鉢內同杵勻抄一錢或二錢取田螺淨洗再以水半碗活過一宿去螺用水調塗腫處即消其螺仍放水中勿害之昔賢有曰殺生救生去生遠矣物命雖微亦可戒一二月里生嘔醫林硃砂丸月里生嘔先用之下之如利後用朱沉煎惡物下而不嘔也硃砂南星巴豆各半兩上為細末麵糊丸如黍米大每服二丸量病虛實大小或天吊目睛上視每服四五丸薄荷湯下醫林朱沉煎治小兒嘔吐不止硃砂二錢藿香三錢滑石五錢丁子十四粒上為細末每服半錢用新汲水一盞香油滴成花抄藥在上須臾墜下澄去水別用水空心送下一三變蒸小兒之初生血氣未足陰陽未和臟腑未實骨格未全有變蒸之候每三十二日一發熱或吐或汗或呻吟不食此為長血脈全智意之常候不須治而自愈按諸家所論皆謂乃小兒長骨脈臟腑與神智也自生之日始每三十二日一變凡人有三百六十五骨除手足四十五碎骨外止有三百二十骨自生下骨而上一日十骨三十二日乃為一變骨氣始全一變生一臟或一腑十變則臟腑始足每變發為虛熱諸證亦有胎氣壯實暗變無發熱證者此骨節臟腑由變而全胎毒亦因變而散為兒醫者可不審乎準繩柴胡湯治變蒸骨熱心煩啼叫不止人參甘草炙麥門各二錢防風龍膽酒炒黑各一錢柴胡五分上每服一錢水煎服百問調氣散治變蒸吐瀉不乳多啼慢驚欲發木香香附人參陳皮藿香甘草炙各一錢上入薑棗水煎服醫林當歸散治變蒸有寒無熱泉按醫統有寒熱者用之云當歸二錢人參一錢醫統只用三分官桂一錢醫統三分甘草三分上入薑棗水煎服醫統調元散治小兒變蒸脾弱不乳吐乳多啼人參陳皮白朮厚朴薑製香附子各二錢藿香炙甘草各五分上入薑棗水煎服醫統參杏膏治小兒變蒸潮熱人參半錢杏仁一錢炙甘草一錢升麻煨五分上為極末百日已前每用一字麥門冬煎湯調服經驗柴胡飲子治兒變蒸之期有似傷寒兩疑之間用之極穩柴胡紫蘇薄荷陳皮黃芩各五分炙甘草三分桔梗五分芍藥五分上入薑棗水煎服寶鑑紫陽黑散治小兒變蒸壯熱亦治傷寒發熱麻黃二錢大黃酒炒黑一錢杏仁二錢上同一處搗和燒存性以杏仁膏和之密器盛每服一豆許乳汁調和灌之醫統平和飲子治嬰兒變蒸於三日後三日進一服可免百病百日內宜服人參錢半白茯苓一錢炙甘草五分升麻二分上水煎服弱者加白朮一錢一四眼閉小兒初生眼閉不開者由産母食熱毒之物致成斯疾治法當以熊膽少許蒸水洗眼上一日七八次如三日不開用生地黃湯服仍洗乳頭須要山茵陳湯以開眼醫統生地黃湯治兒初生眼不開乾生地黃赤芍川芎當歸栝蔞根甘草各一錢上為末少許抹兒口中燈心煎湯調抹入口中連服效醫統山茵陳湯釀乳山茵陳澤瀉各三錢栝蔞根豬苓甘草生生地黃各一錢半上為㕮咀水煎服初服二服且捏去宿乳第三服後卻令兒吃乳若産母自乳亦可服準繩四聖散治嬰孩胎受熱毒生下兩目不開燈心黃連秦皮木賊棗各半兩上㕮咀水煎澄清去渣無時頻洗兩目自開一五臍風小兒生後有臍風證者多因斷臍帶後為風濕所傷而成也風入臍者令臍腫腹脹口撮多啼不能飲乳謂之臍風若入經絡多變為癇當作癇證治之醫統控痰飲治臍風宜先用此吐風痰次用益脾散和脾又用辰砂膏利驚即愈或手足攣拳口不開不治蠍梢銅青各五分硃砂一錢膩粉一字麝香少許上為末每服一字臘茶清調下先吐風痰然後和胃醫統宣風散治小兒初生因斷臍後外傷風濕唇青不乳多喘撮口全蠍二十一個頭足全去毒用無灰酒炙塗為末用麝香一字另研上為極末用半字金銀煎湯或麥門冬湯調化食遠服準繩防風散治初生兒臍風防風羌活白芷當歸黃耆甘草各五分上為極細末少許燈心麥門冬煎湯調化正傳張氏方治小兒臍風撮口因臍斷傷風或尿在胞中遂成臍風發熱面赤啼聲不出赤腳金頭蜈蚣一條瞿麥五分蠍梢四個殭蠶七個上為末鵝毛管吹些少入鼻中如噴嚏叫聲可治後用薄荷汁調與服之入門千金龍膽湯治小兒初生臍風撮口月內胎驚氣逆發熱龍膽鉤藤柴胡黃芩桔梗赤芍茯苓甘草各半分大黃一分蜣螂一枚上為末每一錢或五分棗湯調服一方去蜣加人參川芎水煎服治小兒疳魃病準繩大連翹湯治胎熱臍風小便不通及諸般瘡毒連翹瞿麥荊芥木通赤芍當歸防風柴胡滑石蟬殼甘草炒各一錢山梔子黃芩各五分上水煎服一六夜啼按夜啼者有陰陽二證陰者臟冷也夜則陰盛與冷相搏臟氣交擊故作痛而啼陽者臟熱夜則陽衰與臟熱交擊亦作痛而啼也醫統安神散治小兒一百二十日內夜啼蟬蛻四十九個只用後半截上為細末分作四服用鉤藤煎湯不時調化服全幼萬金散治嬰孩小兒臟冷夜啼當歸丁香乳香人參五味子各二錢半白朮半分沉香一錢半肉桂半錢赤芍炒半分上水煎食後服丹溪治小兒夜啼人參二錢半黃連一錢半炙甘草半錢竹葉二十片上薑水煎直訣當歸散治夜啼不乳當歸白芍人參各二錢半甘草一錢二分桔梗陳皮各一錢上水煎灌之百問鉤藤散治小兒夜啼及臟冷鉤藤茯神川芎當歸木香甘草白芍各一錢茯苓二錢上薑棗煎服醫統五味子散治小兒夜啼及腸痛至夜則似鬼祟五味子當歸赤芍白朮各五錢茯神陳皮肉桂甘草炙各二錢上水煎服醫統燈花膏治小兒夜啼不已燈花七分硃砂一字上研末白蜜調兒睡抹唇內綱目小兒夜啼黃連薑汁炒甘草竹葉煎服醫鑑一方用燈心燒灰付乳上令兒吮之入門四君子湯治夜啼氣虛者本方加山藥扁豆挾熱加黃連竹葉入門一方治氣血俱虛腹痛夜啼者黃耆當歸赤芍木香甘草等錢上為末著乳頭上使吮乳服之濟世一方治驚啼用亂髮燒灰酒調服直訣蟬蛻鉤藤散治肚痛驚啼鉤藤天麻茯苓川芎白芍各二錢甘草蟬蛻各一錢上燈心水煎服百門六神散治腹痛啼哭面青口中冷氣四肢亦冷曲腰而啼或大便泄瀉及不吮乳人參山藥白朮各半兩甘草二錢白茯苓白扁豆炒各一兩上薑棗煎服一七客忤小兒客忤是外人帶來穢惡之邪氣忤之一若人中是為客忤雖是父母家人或從遠來外至經履神廟喪門飲酒騎馬乍至汗氣穢氣近兒若一染之皆為客忤凡兒中忤率然驚駭啼哭不已心志恍惚聞聲即跳常欲躲避之狀者是也玉案安魂湯治客忤立效棗仁茯神遠志各一錢當歸膽星各七分上入燈心二十莖水煎服大全真珠散湯氏方治小兒客忤驚風痰熱煩躁恍惚睡臥驚跳時或咬牙啼叫不已小便赤澀或吐黃沫真珠末海螵蛸滑石各一錢茯苓白附子人參各二錢甘草全蠍各半錢硃砂二錢腦子麝香各一錢金銀箔五片上為末每用半錢燈心麥門冬入蜜少許下之方見物觸門醫林犀角散治客忤方見物觸門醫林黃土散治客忤灶心黃土蚯蚓糞上二品研末水調塗兒頭上及五心醫林伏龍肝散治客忤備急一方治小兒客忤死不能言桔梗燒研三錢米湯服之仍吞麝香豆許外臺一方治小兒客忤口不能言細辛桂心等分上末以少許納口中肘後一方治小兒客忤中惡真丹寸寸蜜三合和灌之一八中惡中惡天吊者為惡鬼之氣所中兩目上攛吊起而不能𦞂也此因胎氣不足精神失守虛之所在邪必腠之心虛則神離肺虛則魄亂肝虛則魂凶脾虛則意擾腎虛則精乏而鬼得以犯之矣其症面白帶青或土色目睛上視口吐白沫手足拘攣身冷如冰也玉案安神散治中惡天吊茯神遠志南星麥門各五錢石昌二錢琥珀一錢半上為末每服二錢滾湯調下保元辟邪膏治小兒卒中惡毒心腹刺痛悶亂欲死等症降真香白膠沉香虎頭骨鬼臼龍膽草人參茯苓各五錢上末入雄黃半兩麝香一錢煉乳為丸乳香湯下全幼中惡者卒然心腹刺痛悶絶煩死腹大而滿蘇合香圓研麝香雄黃用降真香煎湯研化食遠服方見鎖肛一九哭無聲幼幼心書云鍾洪聲大澗遠流長形處胞胎之中受氣充足水火兼濟心腎不虧所以發聲清韾洪亮是其根本深壯稟賦充實抑自然之理也初生啼哭發聲不出或短促厄厄上下氣不相乘此由胎氣不足根本不壯何必藥焉縱使以意投藥終非長大之見醫者不可不察二內釣病源曰驚風內釣腹痛多啼汗出糞清咬乳睛慢流涎或唇焦黑囊腫傴僂眼內紅筋班血虎口脈紋侵入掌中醫統桃符丸治小兒內釣銀硃半錢乳香一錢蒜煨一個上為細末用蒜研勻丸如黍米大半歲兒五丸薄荷煎湯化下百問保命丸治小兒胎驚內釣腹肚堅硬睡眠不安夜多啼哭全蠍十四個防風二錢殭蠶炒天麻各二錢南星白附子麝香五分金箔十片蟬蛻硃砂各一錢有熱症加牛黃片腦硼砂上為末粳米糊丸每兩作四十丸常服鎮心安神化痰除一切驚風諸症一方加人參白茯苓二錢阮氏一方治小兒內釣腹痛乳香沒藥木香等分上水煎二一急驚風急驚風症牙關緊急壯熱涎潮竄視反張搐搦擅動唇口眉眼眨引頻並六脈浮散洪緊此蓋屬肝風邪痰熱有餘之症也醫統消驚丸治小兒驚風鎮心利痰解熱人參天麻茯苓硃砂全蠍薑蠶羚羊角犀角南星四錢麝香一字上為極末煉蜜丸如芡實大用菖蒲煎湯研化食後服錢氏利驚丸治小兒急驚痰熱抽搐天竹黃輕粉青黛各一錢牽牛五錢上細末煉蜜丸梧子大以薄荷煎湯研化食前服保元南極壽星湯治小兒急驚搐搦眼番口噤搖頭天吊痰咳喘熱膽星防風白附子蟬蛻薄荷甘草上水煎服濟世無白附子名之曰鎮驚散人參羌活散治初作急驚散風邪除熱羌活獨活柴胡川芎人參甘草茯苓各一兩前胡桔梗地骨皮天麻各半兩枳殼一兩上入薑棗薄荷苛水煎服瘡疹未發亦可服醫鑑敗毒散治急驚風初起發熱手足搐搦眼上視等證並一切感冒風寒頭痛發熱咳嗽鼻塞聲重及瘡疹欲出發搐並宜服之人參羌活獨活柴胡前胡茯苓枳殼桔梗川芎天麻全蠍殭蠶白附子地骨皮甘草各等分上薑三片水煎服直訣抱龍丸治傷風溫疫驚風潮搐及蟲毒中暑雄黃二兩半辰砂另研五錢天竹黃一兩南星四兩麝香五錢正傳云恐太多用二錢半上為末甘草湯丸皂子大每服一丸白湯化下痰壅咳嗽薑湯下之錢仲陽加天麻一方加牛黃五分珍珠一錢琥珀一錢水煮甘草膏為丸金箔十片為衣治驚風百病大有神效薛氏曰煎丸化痰祛邪清熱之功居多屬肝心實熱而致者殊效若脾肺虛弱而見昏睡痰嗽者寶鑑天麻湯醫統抱龍丸治小兒諸驚四時感冒瘟疫邪熱煩躁不寧痰嗽氣急瘡疹欲出發搐並宜用此常服驅風化痰解鎮心熱和脾胃益精神鎮虛驚恐怖譫語人參天竹黃琥珀檀香茯苓各一兩五錢甘草炙三兩枳殼枳實辰砂飛五兩山藥炒一斤南星炒一兩金箔一百片上極末隨手新汲水和勻如芡實大陰乾薄荷湯下局方防風導赤散治小兒初驚生地木通防風甘草等分上入竹葉少許煎服嘗有一老醫云小兒驚搐多是熱證者若首先便用驚風藥白附子全蠍薑蠶川烏之類便成壞證後有醫幼科驚藥只此方進一二服導去心經邪熱其搐隨手便止次服寧志膏神效寧志膏麥門半兩麝香三分茯神硃砂各一兩上煉蜜丸薄荷湯下之準繩木通散治小兒肝心有熱驚悸羌活山梔各二錢大黃煨木通赤茯苓甘草各一錢上入紫蘇葉些少水煎服泉按此方瀉肝風降心火利驚熱也準繩仁濟犀角湯治心驚熱盛犀角防風木通赤茯苓桑白皮炒甘草炙各等分上水煎服直訣瀉青丸治肝熱急驚搐搦等症羌活大黃川芎山梔龍膽當歸防風各等分上末蜜丸芡實大每半丸至一丸煎竹葉湯入砂糖化下薛氏云前症若大便祕結煩渴飲冷飲食如常形病俱實宜此濟世一方治小兒發熱驚啼防風蟬蛻芍藥木通車前赤茯苓麥門甘草上入燈心水煎服局方至聖保命丹治小兒胎驚內吊腹肚堅硬目睛上視手足抽掣角弓反張痰涎壅盛方見胎驚保元千金散治小兒痰喘急慢驚風至死但能開口灌下無不活者內閣祕傳全蠍薑蠶各三分硃砂四分牛黃六釐冰片天麻黃連各四分膽星甘草各二分上為末每服五七釐薄荷燈心金銀煎湯不拘時調下保元安神散治驚風退後恍惚虛怯安神定志調理之劑人參茯苓遠志天麻白附子麥門全蠍蓮肉茯神硃砂各等分上為細末每服燈心湯調下醫統定志丸治小兒驚風已退神志未定以此調之琥珀茯神人參遠志薑製焙白附子天麻麥門酸棗仁甘草炙各等分上為末煉蜜丸皂角子大硃砂為衣每服一丸薄荷湯調下濟世抑肝散治肝經虛熱發搐或發熱咬牙或驚悸寒熱或木乘土而嘔吐痰涎腹脹少食睡臥不安當歸白朮炒茯苓鉤藤鉤各一錢川芎八分柴胡五分甘草三分上水煎子母俱服如蜜丸名抑青丸中山氏云小兒屬少陽故病則肝火症多是方也柴胡鉤藤能抑肝火芎歸能補肝血木乘土則脾胃衰術苓草所以補助脾氣也準繩奪命丹治急慢驚風諸藥無效此藥隨手奏功白附三錢黑附半兩急驚不用南星一兩天麻三錢辰砂另研二錢半防風半夏各半兩全蠍七枚蜈蚣炙一條麝香半錢薑蠶炒慢驚不用上為末三歲兒半錢薄荷生薑自然汁加好酒沸湯各少調服泉按上方急慢通治之良方也二二慢驚慢驚症因病後或吐瀉或藥餌傷損脾胃肢體逆冷口鼻氣微手足瘛瘲昏睡露睛此脾虛生風無陽之症也醫統理中湯治小兒慢驚風脾胃虛寒泄瀉人參白朮乾薑各二錢甘草二分上水煎服龔雲林云小兒吐瀉日久成慢驚風默默不語昏睡露睛遍身手足厥冷十分危篤死在須臾百藥罔效加附子用之得神驗也錢氏白朮散治小兒脾虛吐瀉積痛頻泄欲成慢驚人參白朮炒茯苓甘草炙加半分藿香各等分木香少許葛粉上為末每服一二錢薑棗湯服丹溪加白扁豆山藥肉豆蔻用薑煎服若慢驚已作加全蠍天麻細辛白附子醫統惺惺散王氏治小兒吐瀉脾弱內虛生驚人參茯苓木香天肉扁豆全蠍炙陳米炒各等分上入薑棗水煎服醫統星香全蠍散治小兒慢驚風昏迷痰搐木香南星人參陳皮各一錢全蠍炙甘草炙各五分上入紫蘇三葉薑棗水煎服準繩生附四君子湯治小兒吐瀉不思乳食凡虛冷病先與數服以正胃氣人參白朮附子生木香茯苓陳皮甘草各等分上入薑棗水煎服小青烏蠍四君子湯治小見慢驚人參白朮茯苓各一錢川烏生全蠍甘草上入薑棗水煎服次服去川烏準繩醒脾散治吐瀉脾困不食痰作驚風全蠍焙半錢白附子炮天麻焙甘草炙人參茯苓石菖蒲木香石蓮肉白朮各一錢上為末每三字薑棗煎服有熱去木香或加南星半夏陳皮陳米準繩大醒脾散小兒胃虛不消乳食尤須節約天南星茯苓橘紅各一分全蠍甘草炙白附炮蓮肉人參木香各半分陳倉米二百粒上為末每服三字薑棗煎服二方通用驅風醒脾亦可釀乳醫統醒脾散治小兒吐瀉不止作慢驚人參白朮茯苓木香全蠍薑蠶天麻白附子各等分甘草炙減半上入薑棗水煎服全幼調中湯治嬰孩小兒慢驚人參白朮茯苓去皮甘草炙白芷石蓮肉藿香天麻煨橘皮白扁豆生薑汁浸炒去皮半夏木香各半錢上劑入生薑棗水煎不拘時候服之按上方和脾胃止吐瀉溫中正氣之良劑屢用效東井翁曰手足厥冷加附子家傳六君子湯東井曰小兒諸疾服剛劑成慢驚者加附子有奇效薛氏芍藥參苓散治肝木克脾土目劄面青食少體倦芍藥人參茯苓白朮陳皮各七分柴胡山梔甘草各五分上入薑棗水煎服泉按脾土虛則木乘之面色青者肝亢之兆不食體倦者脾虛候此方中有柴芍梔抑肝木有五味異功散補助脾土最良劑也錢氏溫白丸治小兒吐瀉久病轉成慢驚身冷瘛瘲等症人參防風白附生薑蠶全蠍各一錢南星天麻各二錢上為末水糊丸梧桐子大每服一二丸薑湯下泉按此方驅風豁痰定驚良劑也入門加味朮附湯治小兒吐瀉後脾虛變成慢驚身如弓如髮直吐乳貪睡汗多宜此附子白朮各一兩肉豆蔻一個木香甘草各五錢上入薑棗水煎服泉按此方溫寒燥濕行氣健脾玄治翁加人參柴胡東垣黃耆湯治小兒慢驚風之神藥也人參一錢炙甘草五分黃耆二錢芍藥一錢上水煎服綱目豆卷散治小兒慢驚多因藥性大溫及熱藥治之有驚未退而別生熱症者大豆黃卷管仲板藍根炙甘草各一兩上為末每半錢水煎服補遺全幼定命飲子治嬰孩小兒吐瀉脾胃虛弱發作慢驚風半夏天麻甘草炙茯苓白朮老生薑上入薑棗水煎服或為末服醫統全蠍觀音散治小兒吐瀉脾虛發作慢驚全蠍炒十個天麻防風白芷各二錢人參黃耆茯苓甘草炙白扁豆炒各一錢半上為極細末棗一枚冬瓜仁炒煎湯調下醫統調氣散小兒慢驚之後以此調理木香陳皮藿香香附子人參甘草各等分上入薑棗水煎服大全保生丹治嬰孩小兒慢驚尚有陽證全蠍炒白附子炮薑蠶炒南星炮蟬蛻琥珀各一錢麝香二分半防風硃砂各半錢上為末粟米煮糊丸如芡實大金箔為衣用薄荷煎湯研化食遠服二三慢脾保元加味四君子湯治慢脾之症面赤額汗舌短頭低眼合不開睡中搖頭吐舌頻嘔腥臭噤口咬牙床手足微搐不收或身冷或身溫者四肢冷蓋慢驚之後吐瀉損脾病傳已極總歸虛處惟脾所受故曰慢脾風世所謂慢驚難療者慢脾是也人參一錢茯苓五分蒼朮三分炮乾薑四分白朮炒六分製附子一分羌活三分炙甘草四分上入薑棗水煎服百問生附四君子湯治慢脾風助胃回陽人參白朮茯苓甘草炙生附各一錢上入薑棗水煎如厥冷逆加附子一錢全幼加味大醒脾散治小兒慢脾風內虛昏迷不醒人參白朮炒橘紅丁香茯苓木香南星全蠍天麻白附煨山藥砂仁石蓮肉肉豆蔻石昌甘草上入薑棗水煎服回陽加附子保元回生錠治慢驚慢脾之聖藥也一錠即有起死回生之功頃刻奏效故名回生錠真海上仙方也急驚亦效人參五錢白朮一兩茯苓山藥桔梗各一兩甘草三錢膽星五錢辰砂三錢赤石脂煅五錢乳香另研二錢蒙石煅金色三錢牛黃一錢麝香一錢上為末五月五日午時取粽搗勻作錠子金箔為衣陰乾每服三五分薄荷湯化下全幼吉朋醒脾散治證同前大醒脾胃人參橘紅甘草炙白朮茯苓全蠍各五錢木香半夏各二錢半白附四個天南星煨一個陳倉米二百粒上入薑棗水煎服二四物觸大抵小兒隨其心性不可觸逆凡有所愛之物不可強直取之心神所好若不遂欲心氣解散神逐物遷不食不言神昏如醉四肢垂嚲狀如中惡醫士見之莫之措手如有此證詢其母及左右順其所欲然後用藥則安也醫統沉香順氣散治小兒物忤逆觸沉香茯神紫蘇人參甘草炙各一錢上為細末紫蘇梗煎湯調化不拘時服醫統安息香散治小兒物忤逆觸安息香蘇合香檀香藿香甘草南星各等分上為細末薑汁調作小餅每用磨化塗奶上及焚煙避一切客忤及物觸醫統犀角散治客忤驚啼壯熱犀角麥門天麻鉤藤硃砂各一錢鐵粉雄黃各五分麝香少許上為末每服半錢金銀煎湯調服醫統伏龍肝散治客忤驚啼壯熱灶心黃土二兩研雞子一枚二件和水少許調勻塗五心及頂門二五天釣如魚之上釣故云天釣錢氏云小兒天釣病皆由乳母飲酒食肉房勞熱毒之氣流入乳中兒食其乳遂使傳其熱毒痰涎蘊積不得宣通加之外挾六淫致有此證其患壯熱驚悸眼目翻騰手足抽掣或啼或笑喜怒不常甚者爪甲皆青如祟之狀初得之時四肢瘛瘲壯熱無時頻頻呵欠脈大而實海法宜速解利風熱醫林鉤藤散治小兒天釣潮熱鉤藤人參各半錢犀角三分甘草炙二分全蠍天麻各一分醫統天竹黃散治小兒天釣目睛釣上四肢瘛瘲天竹黃臘茶甘草炙各一錢全蠍生薄荷葉裹煨炙七個緑豆半生半熟炒四十粒荊芥雄黃水飛枯礬各五分上為細末每用半錢人參煎湯調服準繩鉤藤飲子治驚風天釣卒然驚悸眼目翻騰鉤藤炒五分麻黃甘草炙各三錢天麻川芎防風人參各七分全蠍炒去毒五個上入薑棗煎服二六癇證內經曰癇為神不守舍謂神亂也大抵癇證皆由驚動是臟氣不平鬱而生涎閉塞諸經厥而乃成或在母胎中受驚或幼少感風寒暑濕或飲食不節逆於臟氣而成者有矣胎內受驚與飲食作癇者多而外感者間而有之醫統安神散治小兒截癇安心神人參茯苓菖蒲白蘚皮遠志各五錢石膏二錢半犀角甘草炙各一錢上加麥門冬一撮水煎服醫統牛黃膏治小兒風癇迷悶抽搐潮涎南星全蠍炒蟬蛻各二錢薑蠶炒白附子防風天麻各一錢上為細末蒸棗肉研膏丸如小豆大用荊芥淡薑湯調服全幼太乙散治小兒胎癇正發分瘥後天漿子炒全蠍各二十一個防風天麻辰砂各五分麝香一字上細末用乳汁調化不時服錢氏五癇丸鎮一切癇硃砂半兩水銀一錢鉛二兩雄黃一兩珍珠一兩上末煉蜜丸麻子大每服一丸金銀薄荷煎湯下醫統南星散治癇後瘖不能言天南星上為末每服一字豬膽汁調下錢氏利驚丸治食癇熱癇者宜下之輕粉一錢天竹黃青黛各一錢牽牛炒取頭末五錢上細末煉蜜丸梧子大以薄荷煎湯研化食前服百問當歸大黃湯治諸癇壯熱利下心中惡血大黃濕紙裹略煨甘草炙當歸各三錢半半夏赤芍二錢五分川芎各一錢半上薑棗煎服二七感冒局方惺惺散治小兒風熱瘡疹傷寒時氣頭痛壯熱目澀多睡咳嗽喘兼鼻塞清涕兼治變蒸人參白朮細辛栝蔞根茯苓桔梗各一錢半薄荷三葉上入薑水煎服入門加川芎芍藥邪熱甚者本方加柴胡黃芩嗽咳痰喘加桑白皮杏仁全幼心鑑惺惺散加枳殼防風泉按古方謂小兒壯熱昏睡生風風熱瘡疹傷食證皆相似未能辨別疑似之間宜服之中山氏曰小兒形質俱脆雖有外邪難用發散峻劑惟調衛氣則邪可自去也是方也參朮苓草可以保養衛氣細辛桔荷辛溫所以疏陽邪栝蔞苦寒所以和其陰分然外邪甚盛正氣不弱者雖小兒敗毒十神等豈可舍而不用乎是亦有活方而已勿執一偏也全幼惺惺散治嬰孩小兒傷寒鼻塞發熱驚悸頭痛嗽咳時行瘡痘兒寒熱不問傷風風熱先與此藥數服往往必愈人參白朮茯苓甘草炙細辛桔梗栝蔞根加川芎上入生薑薄荷同煎食後服全幼惺惺散治證同蒼朮川芎細辛羌活防風白芷桔梗茯苓栝蔞根甘草炙赤芍麻黃荊芥當歸上入生薑薄荷水煎服濟世香葛散治小兒傷寒夾食夾驚四時瘧疾瘟疫香附子紫蘇陳皮青皮甘草葛根上入生薑水煎服東井先生曰小兒感冒大科同惟常須兼用清痰消食之藥蓋小兒易傷食而熱則生痰故劑中宜略用輕輕疏解令汗微出也豫常用此方加減百發百中最得神驗也全幼香葛湯治嬰孩小兒時氣瘟疫頭痛發熱肢體頰痛瘧疾葛根一兩羌活五錢升麻煨二錢桔梗炒芍藥炒川芎茯苓白芷甘草炙各五錢上用生薑蔥白一莖水煎服全幼人參羌活散治嬰孩小兒寒邪溫病時疫瘡疹頭痛體疼肢熱多睡及治潮熱煩渴痰實咳嗽作驚風人參羌活柴胡川芎獨活甘草炙枳殼茯苓各五錢桔梗炒前胡地骨皮天麻煨各二錢半上入薄荷三葉生薑二片水煎服按上方乃解肌發表化痰利氣之良劑也濟世參蘇飲治小兒感冒風寒發熱頭痛痰涎咳嗽上壅喘促胸膈痞悶嘔逆紫蘇陳皮半夏茯苓前胡枳殼桔梗乾葛人參甘草上入生薑水煎服按上方發散和緩之劑小兒感冒欲發表者用之最良也全幼解肌散治嬰孩小兒傷寒夾驚傷風面赤咨呀渾身壯熱人參一錢石膏煨二錢甘草炙麻黃各一錢半葶藶炒二錢茯苓半錢杏仁二十個鉤藤枳殼炒川芎各一錢半上為極細末用薑三片棗一個去核同煎湯不拘時候調化服全幼和解散治嬰孩小兒四時感冒風邪壯熱煩躁鼻塞清涕驚悸自汗四肢骨節疼痛疹痘已發未發羌活防風川芎人參甘草炙升麻炮葛根上入薑棗水煎服自汗加白朮直訣祕旨清肺湯治小兒感冒發熱鼻流清涕或咳嗽吐痰輕者勿藥自愈重者用此輕和之劑橘紅半夏桔梗川芎各五分茯苓桑白皮各七分甘草防風各四分薄荷黃芩炒各三分白朮一錢上入生薑水煎服二八濕證巢氏曰濕者水氣也活人書云風雨襲虛山澤蒸氣豈止大人中濕小兒亦有受濕者緣小兒入復以來脾胃虛弱腠理開疏或連日陰雨或地上蒸濕小兒坐臥於上便受熱氣脈見沉緩身體煩痛發熱惡寒或多汗惡風精神昏悶或小便不利大便溏瀉若久不愈則手足垂軃入臟則瘖啞不言治法大要疏利小水其濕自除不可發汗及峻攻之大全不換金正氣散治感冒風濕頭目昏重時發壯熱方見霍亂門和劑方全幼參朮散治嬰孩小兒初受濕氣身體疼痛發熱惡風多汗面浮作嘔小便不利人參白朮豬苓各一錢乾薑一錢澤瀉赤茯苓木通各三錢上入燈心七莖車前子一捻水煎服醫統除濕湯治小兒寒濕所傷手足軟弱吐瀉不能抬舉疼痛人參白朮蒼朮茯苓半夏厚朴陳皮藿香大腹甘草炙各等分上水煎服二九諸熱家傳藿香正氣散東井曰小兒食滯身熱不止頭痛額肚腹熱甚或夜熱晝涼面黃嘔惡不思飲食者宜之家傳錢氏白朮散半井翁曰小兒一切病後餘熱最妙醫林惺惺散主虛弱面白汗出泉按全幼曰虛熱證面色青白身微熱溫冷口氣冷手足心不熱大小便自利恍惚神慢噓氣軟弱泄瀉多尿虛汗自出叔和曰虛熱不可太攻熱去則寒起惺惺散四君子湯錢氏白朮散之類主之醫鑑大連翹湯治小兒心經邪熱眼目腫赤唇口生瘡涕唾稠盛驚風痰熱等症宜此常利小腸小兒諸熱表裡俱宜連翹瞿麥滑石車前子牛蒡子赤芍各一分山梔子木通蟬蛻當歸防風各半分黃芩荊芥各一分半柴胡甘草各二分上水煎服風熱痰變蒸肝熱大腸熱加麥門實熱丹熱加大黃胎熱瘡疥餘毒熱加薄荷濟世碧玉散治小兒十分潮熱五七日不退滑石一兩青黛五錢石膏煅五錢甘草五錢上為末每服二錢滾湯調服熱不退柴胡薄荷湯下醫林地骨皮散治虛熱潮熱亦治傷寒壯熱知母柴胡人參甘草地骨皮半夏茯苓各等分上入薑水煎服按解風熱壯熱清勞熱虛熱之劑小兒風熱不止久成勞熱虛熱日日羸瘦骨立終及危殆者用之有奇效也準繩四順清涼飲治小兒血脈壅實臟腑生熱頰赤多渴五心煩躁睡臥不安四肢驚利及因乳哺不時寒溫失度令兒血氣不順腸下不調小便少大便澀或溫壯連滯欲成伏熱或壯熱不歇欲發驚又治風熱結核頭面瘡癤目赤咽痛瘡疹毒一切壅滯並宜服之赤芍當歸甘草大黃各等分上煎服小便不通加燈心木通三脾胃蓋小兒臟腑怯弱乳食過度則傷脾胃貴乎謂理得中無有太過不及否則脾胃受傷面恍無色口中涼氣不思乳食嘔吐肌瘦虛弱腹中作痛則當補脾益胃凡人以胃氣為本惟治病亦然胃氣有虛有實虛則有嘔吐不食之證實則有否滿內熱之證虛者益之實者瀉之欲得其平則可局方平胃散治脾胃不和不思乳食心腹疼痛口苦無味嘔噦噁心噫氣吐酸面色痿黃體弱肌瘦肚痛泄瀉並服之厚朴陳皮各三兩蒼朮五兩甘草一兩炙上為末每服二錢薑一片棗二枚水煎空心入鹽少許調服常服快氣暖胃化宿食消痰醫統快膈消食丸寬中快膈消乳食正顏色砂仁橘紅三稜煨莪朮神麯麥芽炒各半兩香附子炒一兩上為末麵糊丸緑豆大食後紫蘇湯下二十丸局方溫脾湯治脾胃不和腹脅虛脹不進乳食困倦無力訶子炮人參七全半木香桔梗各半兩茯苓藿香陳皮黃耆甘草各二錢半白朮半兩上入薑棗水煎服局方和中湯治小兒脾胃不和嘔逆噁心冷熱不調減食泄瀉腹痛腸鳴少力嗜臥厚朴白朮乾薑甘草各二分上為細末每服二錢薑二片水八分煎乳食前溫服局方四君子湯小兒脾胃虛弱或因克伐之劑致飲食少思或食而難化或欲作嘔或大便不實脾胃虛損吐瀉少食宜此人參白朮土炒茯苓甘草炙上入薑棗水煎服調理小兒諸疾和胃養氣胃冷嘔吐加丁香嘔逆加藿香脾胃不和加木香砂仁脾弱腹脹不思飲食加扁豆粟米傷食加神麯泉按此方理脾胃之主藥補虛進食此其人之本歟拔萃方加陳皮一味名異功散快脾和氣最妙薛氏六君子湯治脾胃虛弱飲食少思或大便不調肢體消瘦面色痿黃之症即四君子湯加陳皮半夏上入薑棗水煎服仁濟保和丸治小兒食傷發熱欲成疳證常服益脾胃食則不傷白朮五兩茯苓半夏山楂神麯炒各三兩陳皮連翹蘿蔔子各二兩蒼朮枳實香附子厚朴黃芩酒炒黃連酒炒各一兩上細末薑汁打麵糊為丸如黍米大每服二三十丸漸加至五六十丸食後茶湯下大全加減觀音散調理脾胃常服正顏色消飲食楊氏方白朮炒人參扁豆炒茯苓麥芽炒黃耆炙甘草山藥神麯炒香附炒上為末每服一錢空心米飲下醫統調中散湯氏方治脾胃不和人參茯苓木香白朮甘草炙乾薑煨藿香洗香附砂仁丁香上為末每服一錢薑棗湯下局方參苓白朮散治脾胃虛弱飲食不進或嘔吐泄瀉及大病後調助脾胃人參白朮炒茯苓甘草炙山藥炒白扁豆炒各一斤蓮子砂仁薏苡仁炒桔梗炒各半斤上為末每服一錢棗湯調服或飲湯亦可東垣補中益氣湯治中氣不足困睡發熱元氣虛弱感冒風寒諸症或乳母勞役致發兒諸病局方丁香散治胃虛氣逆哯乳不食人參五錢丁香藿香各一錢半上水煎袖珍醒脾散湯氏方治小兒脾胃怯弱為風冷所乘體熱頭痛霍亂天南星八錢白朮丁香藿香茯苓人參甘草炙各一兩上水煎經濟白朮散治小兒脾胃虛弱青皮茯苓白朮甘草肉豆蔻丁香各等分上為末紫蘇湯調下三一腹脹夫腹脹由脾胃虛氣攻作也亦有實者必悶亂喘滿可下之不喘滿者虛也不可下若誤下致脾虛生大變謹之謹之直訣拓氣丸治小兒虛脹如腹大者加蘿蔔子名褐丸子胡椒一兩蠍尾去毒半兩上細末麵糊為丸如粟米大每服五七丸至一二十丸陳米飲下一方有木香一錢薛氏曰按前症屬脾肺虛水氣泛而喘急浮腫必兼溫補脾土以生肺金而氣自運行矣但前藥性屬辛熱雖能祛散寒邪而恐真氣反傷不可過劑正傳消積丸小兒腹中有食積結糞小便黃微喘脈伏而實時欲飲水能食者用之可下之丁香九個縮砂十二個烏梅肉三個上為末麵糊為丸如黍米大三歲已上三五丸已下一二丸溫水下家傳藿香正氣散治小兒宿食不消腹脹滿悶回春消脹散治小兒腹脹蘿蔔子炒蘇梗乾葛陳皮枳殼各等分甘草少許上水煎服食少者加白朮薛鎧小兒傷食腹脹胸滿有痰用異功散而痊後復傷食腹脹兼痛或用下劑痛雖止而脹益甚更加氣喘此脾益傷而肺益虛也用六君子湯加桔梗調補而愈薛鎧補中益氣湯小兒停食服通利之劑作嘔腹脹此脾胃傷用之本事調中丸治小兒久傷脾胃腹脹乾薑橘紅白朮茯苓木香砂仁官桂良薑上細末糊丸如麻子大每服三十丸食後熟水服無擇肥兒丸治小兒病多因缺乳吃食太早所致或因久患臟腑胃虛蟲動日漸羸瘦腹大不能行發豎發熱無精神黃連神麯麥芽炒半兩木香二錢檳榔三個使君子肉豆蔻麵裹煨各半兩上為末糊為丸如梧桐子每二三丸熟水吞下綱目十全丹丁奚者腹大頸小黃瘦是也此方主之丹溪寄子年五歲痘後肚急白朮一錢陳皮木通各五分犀角川芎白芷蘇梗甘草炙各三分上水煎服三二傷食夫小兒傷食皆因乳哺不節過食生冷堅硬之物脾胃不能克化積滯中脘外為風寒所搏或因夜臥失蓋以致頭痛身熱面黃目胞微腫腹痛脅脹足冷肚熱喜睡神昏不思飲食或惡食或噁心或嘔或噦或口噯酸氣或大便敗卵臭或氣短痞悶或胃口作痛或心下痞滿按之則痛葛氏曰乳者奶者哺者食也乳後不可與食食後不可與乳緣小兒脾胃怯弱乳食易傷難以消化初得成積久則成癖成疳變為百病可不慎乎醫鑑萬億丸治小兒乳食生冷所傷發熱肚脹諸症硃砂巴豆寒食麵上先將硃砂研爛即將巴豆同研極細卻以寒食麵好酒打成糕入藥中仍同研百餘下再揉和為丸如黍米大二三丸清茶下泉按此藥峻利中氣不足之兒勿與之保元太和散治小兒內傷乳食肚腹脹痛外感風寒頭痛發熱紫蘇陳皮香附子麥芽蒼朮川芎枳殼山楂神麯甘草羌活上入生薑水煎服回春消食丸又名消乳丸治宿食不消砂仁陳皮三稜炒神麯麥芽各五錢香附一兩白朮炒五錢上為末麵糊為丸如麻子大食後白湯下綱目曰湯氏方無白朮也濟世消食散治小兒傷食腹痛山楂神麯砂仁麥芽白朮陳皮青皮甘草炙上入生薑水煎服局方不換金正氣散東井先生曰小兒內傷生冷濕面等寒熱吐瀉腹痛者此方主之依本方加山楂神麯而最可也直訣清中解鬱湯治脾胃虛弱飲食停滯鬱熱生痰或身熱赤暈白朮茯苓山梔山楂神麯陳皮麥芽川芎桔梗甘草上水煎服直訣六君子湯治小兒傷食嘔吐發熱面赤依本方加升麻柴胡局方八解散玄治翁曰小兒傷食嘔吐腹痛用之有奇效也保元消食餅小兒時常傷食皮黃肌瘦肚大腹脹用此焦餅令常食之蓮肉山藥炒茯苓芡實神麯炒麥芽炒扁豆炒山楂各等分上為末每四兩入白麵一斤水同和烙焦餅用醫鑑啓脾丸此藥消食止泄止吐消疳消黃消脹定腹痛益元氣健脾胃人參白朮炒茯苓山藥蓮肉各一兩山楂陳皮澤瀉甘草炙各五錢上為末煉蜜為丸如緑豆大每三四十丸空心米湯送下小兒常患傷食諸疾服之立愈保元保嬰丸健脾胃進飲食消積滯殺疳蟲長肌肉乃保嬰第一方也方見疳門三三腮腫薛氏曰腮屬足陽明胃經其生癰者多因兒食甘甜厚味脾胃積熱所致本事治小兒毒氣攻腮赤腫可畏皂角二兩天南星生二錢糯米一合上為末薑汁調塗立效百問連翹漏蘆湯治小兒腮腫漏蘆麻黃連翹升麻黃芩白蘞各一錢甘草枳殼各半錢上水煎服熱甚加大黃朴硝準繩升麻防風湯治胃經實熱咽痛口燥腮癰等症升麻防風黃蘗炒茯苓芍藥炒陳皮各五分連翹當歸各七分上水煎仍量大小用之準繩清咽利膈湯治心脾蘊熱或咽喉腮舌腫痛玄參升麻桔梗炒甘草炒茯苓黃連炒黃芩炒牛蒡子炒杵防風芍藥炒各等分上水煎三四疳證丹溪曰小兒臟腑嫩嬌飽則易傷乳哺飲食一或失常不為疳者鮮矣皆因飲食不調肥甘無節而作也或嬰幼乳缺粥飯太早耗傷形氣則疳之根延及歲月五疳病成錢氏曰疳皆脾胃耗傷亡津液之所作也醫統加味肥兒丸治諸疳身黃肚大痞塊泄瀉瘦弱胡黃連黃連木香檳榔子三稜莪朮煨青皮陳皮神麯炒麥芽炒各一兩使君子香附子蘆薈各半兩上為末以神麯麥芽面打糊為丸緑豆大空心米飲下三四十丸如小兒無熱去胡黃連泄瀉加肉豆蔻人參茯苓醫統大蘆薈丸治疳殺蟲和胃止瀉蘆薈黃連胡黃連木香蕪荑檳榔子雷丸白者青皮各半兩藿香少許上為末用豬膽汁丸麻仁大每服十餘丸米飲下保元消疳湯治小兒大便色疳白小便渾濁如米泔肚大而青筋見者疳病也山楂白芍黃連薑汁炒茯苓白朮澤瀉各一錢青皮四分甘草三分上入薑棗水煎服濟世消疳飲治小兒疳疾身熱面黃肚大青筋瘦弱通治諸疳人參白朮茯苓黃連胡黃連神麯青皮砂仁甘草上水煎服傷食加山楂有蟲加使君子保元消疳退熱飲治小兒疳積發熱肚大青筋骨瘦如柴山楂烏藥竹茹檳榔史君蕪荑木通牽牛大黃柴胡莪朮枳殼黃芩葶藶燈心上水煎服醫統五疳保童丸治小兒一切疳證無不保安蟾頭一枚炙令黃色白鱔頭炙焦黃龍膽草蘆薈各二錢黃連胡黃連五倍子苦楝根皮夜明砂天漿子各五錢麝香五分青皮五錢熊膽一錢雄黃二錢青黛三錢上為細末糯米飯丸麻子大一歲兒二十丸米飲下不拘時日進三服醫統五疳消食丸治小兒五疳八痢肚大青筋療勞疳走馬牙疳唇爛口臭此藥中和大能進食長肌使君子蕪荑黃連橘紅麥芽龍膽草各等分上為細末粟米糊丸黍米大每服三十丸空心米飲下醫統通神丸治小兒冷熱疳黃連胡黃連各二錢蕪荑使君子木香各一錢丁香五分肉豆蔻一錢大蝦蟆酥炙為末上為末飯丸黍米大每服十丸米飲下局方肥兒丸治諸疳多因少乳吃食太早或因病人胃虛脾弱生蟲日漸黃瘦肚大青筋不能行立發豎發熱口臭牙疳黃連薑炒神麯炒麥芽炒各半兩檳榔子二枚木香二錢肉豆蔻使君子煨各半兩上為末麵糊丸麻子大每服三十丸米飲下直訣四味肥兒丸治小兒食積脾疳目生雲翳口舌生瘡牙根臍爛發熱瘦怯遍身生瘡又小便澄白腹大青筋一切疳症蕪荑神麯麥芽黃連各等分上為末水糊丸一二十丸空心白滾湯送下醫鑑肥兒丸消疳化積磨癖消熱伐肝補脾進食殺蟲養元氣人參三錢半白朮三錢茯苓三錢黃連薑炒三錢半胡黃連五錢使君子四錢半神麯三錢半麥芽三錢半山楂三錢半甘草炙三錢半蘆薈二錢半上為末黃米糊為丸米湯化下萬氏肥兒丸健脾胃進飲食消積滯殺疳蟲補疳癆長肌肉仍保嬰之第一方也人參三錢白朮橘紅山藥蓮肉神麯各五錢茯苓四錢青皮山楂各三錢砂仁二錢半使君子甘草各二錢上為極細末用生荷葉包粳米煮熟去荷葉將米杵爛以淨布扭出再煮成糊為丸如麻仁大每服二十五丸陳倉米炒熟煎湯下泉按上方加木香而壽世保元名保嬰丸回春蘆連消疳丸治小兒五疳痞塊發肚脹壯脾胃消飲食平肝火磨積塊蘆薈胡黃連黃連酒炒蕪荑檳榔各五錢白朮茯苓當歸各二兩芍藥八錢人參神麯各六錢甘草四兩山楂子使君子各七錢上為末湯泡蒸餅打糊為丸緑豆大每服五十丸米湯下回春消疳丸治五疳皮黃肌瘦髮直尿白肚大青筋好食泥炭茶米之物或吐或瀉腹內積塊諸蟲作痛蒼朮陳皮厚朴枳殼檳榔神麯山楂麥芽三稜煨莪朮煨砂仁茯苓黃連胡黃連蕪荑使君子蘆薈上為末使君子殼煎湯泡蒸餅為丸如彈子大每服一丸清米湯化下可正傳一方治小兒疳病黃連白朮山楂各五錢胡黃連蘆薈各二錢蕪荑二錢五分神麯二錢上為細末豬膽汁為丸如麻子大量兒大小加減丸數與之正傳祖傳經驗祕方檳榔丸小兒疳病積氣成塊腹大有蟲等證其效如神檳榔子一兩三稜煨醋炒莪朮醋炒各半兩青皮陳皮半兩蕪荑二錢半雷丸五錢鶴蝨三錢乾漆五分木香二錢良薑二兩陳壁土同炒砂仁一錢麥芽五錢胡黃連三錢甘草炙三錢神麯五錢山楂五錢上為細末醋糊為丸如緑豆大每服三五十丸空心淡薑湯送下醫統茯神丸治小兒心疳熱茯神茯苓遠志薑炒黃連炒琥珀各三錢鉤藤蝦蟆煅各二錢菖蒲一錢蘆薈五分麝香二分半上為末粟米煮糊丸如黍米大薄荷煎湯下一二十丸醫統龍膽丸治小兒心疳頰赤面黃鼻乾心躁口內生瘡驚悸龍膽赤茯苓黃連胡黃連硃砂各二錢麝香一字上為極末蒸餅泡為丸黍米大每服二十丸食遠白湯下醫統天麻丸治小兒肝疳風疳眼疳青黛黃連天麻五靈脂川芎夜明砂蘆薈各一錢龍膽防風蟬蛻各錢半全蠍二枚焙麝香少許上為末豬膽汁浸糕丸麻子大每服薄荷湯下醫林生熟地黃湯治肝疳搖頭揉目白膜遮睛腦熱羸瘦生地黃熟地川芎茯苓枳殼杏仁黃連半夏天麻甘草地骨皮當歸上入生薑三片黑豆十五粒水煎服醫統靈脂丸治小兒脾疳食疳靈脂砂仁白豆蔻麥芽莪朮青皮使君子陳皮蝦蟆炙焦上為細末麵糊丸黍米大每服二十丸米飲下醫統捉疳丸治小兒脾胃受疳面黃腹脹多睡如醉吃生米酒土丁香木香各半兩黃連蕪荑蚌粉神麯三稜煨青皮各二錢上為細末豬膽汁煮糊丸黍米大食遠米飲下醫林清肺湯治肺疳咳嗽多喘揉鼻咬甲寒熱桑白皮五錢紫蘇前胡黃芩當歸天門冬連翹防風赤茯苓桔梗生地甘草各二錢半上水煎服入門地黃丸主腎疳耳焦天柱倒齒脫手足冷如水熟地黃四錢半赤茯苓山茱萸牡丹皮山藥炒各三錢使君子當歸川芎川楝子焙各二錢上為末煉蜜丸梧子大每服三十丸空心服醫統黃耆湯癆疳者潮熱往來五心煩熱盜汗骨蒸咳嗽憔悴或瀉而渴腹硬如石面色如薰用此黃耆人參當歸川芎芍藥生地黃蝦蟆鱉甲炙焦各錢半茯苓陳皮柴胡使君子煨各一錢上入薑棗水煎服醫統十全丹丁奚哺露者皆因脾胃久虛不能克化水穀榮氣血故肌肉消瘦腎氣不足漸致肉枯骨露亦有胎中受病於母手足極細項小骨高腹大臍突或生谷瘕是為丁奚若往來蒸熱顱囟分開吐乳吐蟲煩渴嘔噦是為哺露此蓋疳症之極而因其形以名之也用此青皮陳皮莪朮川芎五靈脂白豆蔻檳榔子蘆薈木香使君子蝦蟆各二錢炙上為末豬膽汁浸糕丸麻子大每服二十丸米飲下醫統大蘆薈丸治前症回春異攻散治小兒疳疾四肢消瘦肚腹脹大行步不能頗能飲食作渴發熱等症用之加減而得奇效回春四君子湯小兒面色痿黃眼胞微腫作渴飲食少思腹中一塊或移動小便澄白大便不實依本方加山梔蕪荑兼肥兒丸東垣厚腸丸治小兒失乳以食飼之不能克化或生腹脹四肢瘦弱或利色無常陳皮三分麥芽五分半夏三分枳殼蒼朮三分青皮二分人參厚朴各二分面末五分上為末麵糊丸如麻子大每服二十丸溫湯送下忌飽食濟世補中益氣湯諸疳癖塊久治不愈多服尤效三五虛羸錢氏曰虛羸者脾胃不和不能食乳致肌瘦亦因大病或吐瀉後脾胃尚弱不能傳化穀氣有冷者時時下痢唇口青白有熱者身壯熱肌肉微黃此冷熱虛羸也冷者木香丸熱者胡黃連丸虛羸與疳同治也家傳錢氏白朮散東井翁曰小兒初病疳津液少肌瘦者用之當生胃之津液唯多則妙準繩潔古云小兒疳病肌瘦血氣不足同大人癆瘵之疾治之以潔古此言論之不拘冷熱虛羸皆用四君子地黃丸與前藥相兼服為得也錢氏異功散治脾胃虛弱飲食少思吐瀉不食虛冷證先與數服以正胃氣準繩補中益氣湯治中氣虛弱體疲食少或發煩渴等證聖惠訶梨勒散治小兒羸瘦脾胃氣弱挾於宿食不欲乳食四肢不和訶梨勒皮陳橘皮各半兩黃耆人參白朮藿香桂心白茯苓各二分甘草炙半分上件藥搗粗羅為散每服一錢以水一小盞入生薑少許棗一枚煎至五分去滓溫服日三四服量小兒大小以意加減準繩溫脾湯治小兒脾氣不和食少無力肌膚羸瘦方見脾胃錢氏橘連丸治疳瘦久服消食和氣長肌肉橘皮一兩黃連米泔浸一宿一兩半上為細末另研入麝香五分用豬膽七個分藥入膽內漿水煮候臨熟以針微刺破以熟為度煮粟米粥和丸如緑豆大每服十丸至二三十丸米飲下量兒加減無時海藏云黃連苦燥可以瀉脾火長肌肉三六嘔吐凡小兒乳哺不宜過飽若滿則溢故令嘔吐乳母無知但欲速得兒長更無時度或兒睡著而強乳自此受病之源漸至日深遂成嘔吐蓋有冷吐有熱吐有積吐有傷乳吐也活幼參砂和胃散治小兒胃氣弱而有寒嘔吐不思飲食或食下即吐其吐多順快而無聲面青白唇淡精神倦怠人參砂仁半夏各四分白朮茯苓各五分藿香陳皮各三分炙甘草二分煨薑少許上水煎服醫統白豆蔻散治小兒脾胃不和憎寒壯熱腹痛嘔吐不納乳食枇杷葉白豆蔻陳皮黃耆各半兩木瓜人參甘草各二錢半川芎一錢上入薑棗水煎服醫統人參散小兒止嘔逆併除煩渴昏困多睡乳食減少及傷寒時氣胃氣不順吐利止後燥渴不解宜此乾薑二兩人參茯苓各一兩木香甘草各二錢半藿香二錢半上水煎服按此方調中和氣之良劑醫統丁香散治小兒胃虛氣逆嘔吐不定精神不安羸困霍亂人參五分丁香藿香各二錢半上水煎入乳汁少許可醫林定吐紫金核治丈夫婦女一切嘔吐小兒尤效半夏人參白朮木香丁香藿香各等分上為細末薑汁打糊為丸用沉香硃砂為衣或煎湯亦可經濟藿香散治小兒吐哯嘔逆身熱面青不進乳食藿香一錢半丁香人參白朮茯苓扁豆神麯各半錢上為細末每服半錢罌粟米飲調下陳皮煎米飲下亦可醫林通心飲治嘔吐作渴木通連翹瞿麥山梔黃芩甘草上入燈心藿香水煎服按此治熱吐之劑或小柴胡湯多加生薑亦可百問竹茹湯治胃受邪熱心煩喜冷嘔吐不止乾薑七錢半半夏半兩炮甘草二錢上入竹茹一塊薑五片水煎服一方加茯苓尤妙醫林加味四君子湯交精吐乳眼慢糞多穢氣乃父母交合時吃乳所致本方加藿香木香家傳錢氏白朮散東井曰治前症最可一小兒有乳癖而壅滯胃口吐哯加枳實妙也回春定吐飲治小兒吐逆投諸藥不止服此有神效半夏二兩生薑一兩薄桂三錢上薑切作小方塊如緑豆大前半夏和勻入小鐺內慢火順手炒令香熟帶干方下桂再炒勻微有香氣以紙攤開地上去火毒候冷略播去黑焦末每服二錢水一盞薑三片煎七分空心少與緩服袖珍助胃膏湯氏方治小兒冷氣入胃嘔吐不止白豆蔻十四個木香三錢砂仁四十個人參茯苓白朮各半兩丁香五錢山藥一兩肉豆蔻四個甘草炙半兩上為末每一錢陳紫蘇木瓜湯調下拔萃朱沉煎治小兒嘔吐不止硃砂二錢水飛沉香二錢藿香三錢滑石半兩丁香十四個上為細末每服半錢用新汲水一盞芝麻油點成花子抄藥在上須臾墜濾去水卻用別水送下醫林安神丸因驚吐乳面色青者宜此天門牙硝茯苓山藥寒水石各五錢硃砂三錢甘草五錢龍腦一字研上為末煉蜜丸藿香煎湯化服醫統消乳丸消乳食香附子一兩砂仁陳皮甘草炙各半兩神麯炒麥芽炒各一兩上為末麵糊丸黍米大七歲兒丸緑豆大食後薑湯吞下二三丸按上藥溫中快膈止嘔良品也綱目半夏散治小兒胃虛嘔吐水穀不化半夏一兩泡陳糯米上入薑棗水煎服醫統丁香散治吐乳傷食丁香蓮肉枇杷葉薑汁塗炙熟各等分上為末每服一錢米飲調下醫統益胃散快膈益脾止嘔進食木香丁香藿香陳皮砂仁白豆蔻茯苓甘草各等分上為末每服一錢用生薑棗湯下醫統茯苓半夏湯治諸嘔噦心下堅痞膈間有水痰眩悸半夏五分茯苓二兩上入生薑水煎全幼丁香圓治嬰孩小兒嘔吐不止丁香半夏各一錢青皮五錢陳皮一兩上為極細末煉白蜜丸如芡實大用滾白湯研化食前服全幼紫蘇子飲治嬰孩小兒飲乳母氣奶嘔吐紫蘇子人參沉香各二錢甘草炙一錢半縮砂二錢半茯苓四錢上為極末用生薑煎湯調化食前服全幼沉香散治嬰孩小兒補虛調胃氣止吐瀉進乳食沉香一分藿香丁香甘草炙各一錢木香桂各半錢茯苓一分上為極末用紫蘇木瓜同煎湯調化食前服本事治小兒嘔吐脈數有熱麥門半夏人參茯苓各二錢甘草一錢上入生薑水煎服湯氏清膈飲子治小兒伏暑嘔吐香薷淡竹葉各一兩茯苓人參半夏檀香炙甘草炙各半兩白粳米一合上入薑水煎服大小加減玉機藿香散治脾胃虛有熱面赤嘔噦麥門冬半夏甘草石膏各半兩藿香一分上薑水煎丹溪萬安膏調脾順氣定驚脾胃不足吐乳黃疸治小兒一切疾木香沉香各二錢檀香三錢香附一兩檳榔半兩白朮二兩肉蔻半兩辰砂三錢薄荷二兩人參半兩甘草二兩琥珀真珠青黛犀角各二錢黃耆一兩麝香五分使君子一兩天竺黃半兩上為末煉蜜丸臨臥服薄荷汁或蜜水米飲化下準繩萬安膏治小兒脾胃虛弱腹生疳蟲癥瘕食積泄瀉常服消疳去積助胃氣和中疏氣滯人參厚朴陳皮青皮乾薑肉桂各一兩夏不用木香沉香藿香各半兩甘草半兩澤瀉冬不用春秋減半使君子一個上為末煉蜜丸如芡實大食前米飲化下如熱薄荷湯下一方無木香沉香藿香青皮使君子有白朮蒼朮茯苓豬苓也得效方一方治小兒吐乳胃寒者白豆蔻十四個縮砂同甘草生二錢炙二錢上為末常摻入兒口中明堂吐乳灸中庭一壯三七吐水吐蟲錢氏面㿠白無精光口中氣冷不思食吐水當補脾益黃散主之方見泄瀉門丹溪冬月吐蛔多是胃虛寒而蟲作吐用錢氏白朮散加丁香二粒方見慢驚門錢氏吐水不心痛者胃冷吐水心痛者蟲痛口中吐沫水者後必蟲痛玉案一方治小兒口中常吐出蟲黑錫灰檳榔各等分上為末每服一錢花椒煎湯送下三八泄瀉泄瀉乃脾胃顓病凡飲食寒熱三者不調此為內因必致泄瀉又經所論春傷風復飧泄夏傷暑秋傷濕皆為外因亦致泄瀉醫者當於各類求之毋徒用一止瀉之方而云概可施治此則誤兒豈淺云耳若不治本則瀉皆止暫而復瀉耽誤久脾胃益虛變生他證良醫莫救局方藿香正氣散中濕泄瀉腸鳴肚腹脹痛醫統六神湯治脾虛吐瀉不進飲食黃耆炙扁豆炒人參白朮茯苓粉草炙各等分加藿香亦可上入薑棗水前服或作末薑棗湯調服醫統人參安胃散出東垣方治暑熱傷乳損其脾胃吐瀉久恐成慢風人參二錢黃耆四錢生甘草炙甘草各一錢芍藥二錢茯苓陳皮黃連各二錢上水煎醫林錢氏白朮散治小兒冷瀉臟腑冷洞瀉如水人參白朮茯苓甘草木香藿香葛根長澤氏曰小兒脾胃虛寒而兼發熱惡寒泄瀉者理中湯大溫難輕用補中益氣湯之峻補未適當於此時必投之謂之中治也活幼加減五苓散治小兒暑月水瀉小便赤澀或全不小便者赤茯苓豬苓澤瀉各一錢木瓜五分白朮六分木通八分車前子略炒四分上入燈心一圍水二鍾煎一鍾入鹽少許令藥微有鹹味飢時服之小便自利其瀉立止回春五苓散小兒傷食作瀉腹脹四肢浮腫小便不利加木香用之而愈回春益元散小兒水瀉殊效滑石六兩甘草一兩加白朮一兩上為極末米湯下一錢許直訣五味異功散治小兒脾胃虛冷腸鳴腹痛自利不思飲食按薛氏曰小兒食積瀉飲食已消而泄瀉未止此脾胃氣傷宜此醫述參朮薑桂飲小兒久瀉面色赤身熱口渴屬脾胃極虛陽氣外散者此方主之俗概為有餘邪熱用寒涼之藥則殺人者不為不多矣人參五分白朮炒六分乾薑炒桂茯苓扁豆薑汁炒山藥炒各六分陳皮甘草各四分上入薑棗水煎服醫統藿香散治小兒脾胃不調作瀉青黃黑白乳食不消糞中有如雞子清兼瀉如水其證腹痛微熱陳皮藿香枳殼炒厚朴制甘草各等分上為末紫蘇湯調下或米湯下亦可如黃白色木瓜湯下如瀉止棗湯下大能和胃進食百問參苓白朮散治脾胃虛弱泄瀉不止及大病後以此養胃人參白朮茯苓甘草炙白扁豆山藥砂仁蓮肉薏苡仁桔梗各一兩上為末每服五分棗湯米湯送下醫統香橘餅治積瀉冷瀉傷食泄瀉木香青皮陳皮各二錢半厚朴神麯麥芽各半兩上為末煉蜜丸餅或米湯下醫統胃苓湯治泄瀉脾胃不和傷食瀉豬苓澤瀉白朮茯苓厚朴陳皮甘草各等分上為末每服二錢燈心陳米煎湯調服錢氏益黃散小兒不能食乳瀉褐色身冷無陽也宜此陳皮十兩青皮訶子各五兩丁香一兩甘草上細末白湯調下準繩田氏云便青者因驚風內藏脾氣不和宜白朮湯丹溪瀉青亦是寒宜用蘇合香丸平胃散各等分蜜湯調服中藏經白朮圓治小兒白瀉白朮當歸芍藥木香減半上等分為末煉蜜丸如緑豆大每服十丸十五丸米飲下濟世一方治小兒久瀉用山藥炒為末不拘多少入粥內食之立愈三九霍亂吐瀉凡小兒上吐不止下瀉不住皆因內外傷侵兼以調護失常乳食不節遂使脾胃虛弱清濁相干蘊作而成有先瀉而後吐者乃脾胃虛冷其候先瀉白水吐亦不多口氣緩而神色慢額前有汗六脈沉濡此為冷也先吐而後瀉者乃脾胃有熱氣促唇紅吐來面赤脈洪而數渴飲水漿此為熱也冷熱之分須要詳審局方不換金正氣散治山嵐瘴氣寒熱往來霍亂吐瀉臟虛寒厚朴藿香陳皮半夏蒼朮甘草各等分上入薑棗水煎服醫統藿香散治時氣吐瀉退熱藿香厚朴半夏白朮乾葛甘草炙各等分上入薑水煎服全幼藿香散治嬰孩小兒脾胃虛弱乳食不調身熱風熱作驚吐瀉不止藿香人參茯苓丁香羌活防風半夏上入生薑棗水煎服活幼加味平胃散治小兒傷食吐瀉蒼朮厚朴山楂各六分陳皮青皮麥芽香附砂仁川芎各四分甘草炙二分上入生薑水煎服直訣五味異功散治脾胃虛弱吐瀉不食人參茯苓白朮甘草炙陳皮等分一方加木香上入薑棗水煎服按凡小兒虛冷病先以數服正其氣溫中和胃之劑也薛氏曰按前方補脾胃之聖藥也況人之一身以脾胃為主若小兒乳食失節寒涼失宜或乳母六淫七情失調兒飲其乳諸病頓起當專以此藥治之其應如響活幼藿香和中湯治感寒停食吐瀉藿香紫蘇香附子蒼朮厚朴山楂川芎各六分羌活砂仁麥芽白芷陳皮各四分炙甘草二分上入生薑水煎服直訣助胃膏治胃寒吐瀉乳食不化白朮茯苓人參各五分甘草一錢白豆蔻十四個山藥一兩砂仁四十個丁香一錢肉豆蔻四錢上為末煉蜜為丸芡實大每二三丸米飲磨化龔氏回春此方有木香桂藿香陳皮全幼心鑑更加沉香全幼助胃膏治嬰孩小兒慢驚風吐瀉不進乳食人參白朮蓮肉各二錢白豆蔻甘草炙茴香炒丁香檀香木香各一錢上為極細末煮粟米糊圓如芡實大用陳米飲研化食前服全幼助胃膏治嬰孩小兒助養脾止吐人參白朮茯苓砂仁山藥甘草炙各三錢沉香木香各一錢丁香五粒肉豆蔻一個上為極末煉蜜圓如芡實大用生薑煎湯研化食前服保元七味白朮散治小兒脾胃久虛嘔吐泄瀉頻並不止津液枯竭發熱煩渴多燥但欲飲水乳食不進羸困失治變成慢驚風癇不問陰陽虛實並宜服之人參白朮木香茯苓藿香甘草葛根上入薑棗水煎服薛氏曰胃傷則嘔脾傷則瀉故用上藥調補胃氣以化生津液如無他症只因胃氣虛而津液不足者用四君子湯尤效泉按若胃虛不能食而大渴不止者不可用淡滲之藥但胃元氣少故也以本方補之全幼藿香正氣散治嬰孩小兒傷寒頭痛憎寒壯熱痰喘咳嗽心腹疼疼吐瀉虛腫疳傷藿香一錢半甘草炙腹皮白芷白朮桔梗陳皮厚朴各五錢上入薑棗水煎服全幼不換金正氣散治嬰孩小兒四時傷寒五臟氣噎咳嗽痰涎霍亂吐瀉藿香厚朴各二錢半甘草一錢半蒼朮二錢人參茯苓木香各一錢半夏三錢陳皮二錢上入薑棗水煎服醫統五苓散治傷暑霍亂吐瀉身熱口渴白朮茯苓豬苓澤瀉各一錢官桂三分上入薑燈心水煎服局方觀音散治小兒外感風冷內傷脾胃嘔逆吐瀉不進乳食石蓮肉一分茯苓一錢半人參白芷木香綿耆各一錢神麯炒二錢白扁豆甘草三錢炙上入藿香水煎服袖珍香朴飲子幼幼方治小兒伏熱吐瀉虛煩悶亂如發驚狀人參茯苓甘草紫蘇木瓜澤瀉香薷半夏扁豆陳皮厚朴烏梅上入薑棗水煎服全幼掌胃膏治嬰孩小兒脾虛胃弱吐瀉不止人參白朮茯苓甘草炙肉豆蔻白豆蔻陳皮枇杷葉青皮丁香沉香木香藿香縮砂各一錢上為極細末煉白蜜丸如芡實大用米飲研化食前服東井先生此方用半夏乾薑水煎與之治小兒吐瀉屢得奇效也保元加減柴苓湯治小兒夏秋月霍亂吐瀉身熱口渴豬苓澤瀉香薷葛根各七分茯苓一錢白朮黃連甘草各五分天花粉二錢上入生薑水煎服腹痛加桂芍藥準繩六君子湯治脾胃氣虛吐瀉不食肌肉消瘦或肺虛痰嗽喘促惡寒或肝虛驚搐目眩自汗諸證東井翁小兒虛而吐瀉者必投之有奇效也程仁甫曰常治小兒吐瀉之疾得捷效者甚多須辨寒熱如夏月熱症必加薑炒黃連少用藿香白豆蔻之類徐徐服之不可火急頓服即不納如寒月依本方加乾薑砂仁藿香白豆蔻類或有傷食吐瀉者初劑加神麯麥芽山楂一二劑而決可取效如不效者有必發慢驚死屢試皆爾醫統銀白散治小兒吐瀉壯胃治糞清扁豆糯米各一兩藿香丁香白朮甘草炙各一錢上為末紫蘇湯下醫統加減四君子湯治小兒吐瀉不止調胃進食扁豆藿香甘草黃耆人參茯苓白朮各一兩上為末每服一錢入鹽點服或用水煎亦可百問益黃散治小兒吐瀉脾虛不食米不穀化困倦力少滑腸夜起並疳虛盜汗並治涎沫流出方見泄瀉門回春又方治吐瀉四君子湯加藿香陳皮一劑而愈醫統理中湯治脾胃不和心腹攻痛痰逆噁心嘔吐心下虛煩否滿膈塞不通飲食減少短氣羸困溫中逐水止汗去濕泄瀉注下水穀不分腹中雷鳴霍亂吐瀉手足厥冷並治人參白朮乾薑煨各一兩甘草炙半兩上入薑棗水煎服腹痛加人參渴加白朮寒加薑附吐多去白朮加生薑瀉多仍用術悸者加茯苓四肢厥冷下利轉筋可加附子為末煉蜜丸名理中丸治厥冷臟寒吐長蟲或胃中虛冷先服理中丸醫統縮脾散解伏熱除煩渴消暑止吐利霍亂之後服熱藥太多致煩躁者並治之砂仁烏梅肉草果煨去皮甘草炙各半兩乾薑白扁豆炒各三錢上每服二錢白水煎服醫統參香散治伏熱瀉虛煩悶亂飲引不止人參白朮香薷半夏陳皮茯苓扁豆炒上水煎服宣明人參散治小兒虛熱煩渴因吐瀉煩渴不止人參半兩茯苓二兩半生犀桔梗各二錢半甘草乾葛各半兩上為末每服一大錢水一中盞入燈心五莖同煎至六分放溫不計時候煩渴者以新竹葉湯下量年紀加減吐瀉過多脾胃虛乏欲生風候者四君子加白附減半生薑煎服綱目和中散和胃止吐瀉定煩渴治腹痛人參茯苓白朮甘草炙乾葛黃耆白扁豆藿香等錢上入薑棗水煎服海藏曰和中散四君子湯加減法丹溪小兒周歲吐乳腹瀉滑石煅二錢白朮炒三錢乾葛三錢陳皮炙三分上為粗末煎飲之海藏吐利四肢脹逆腦門低陷四君子加藿香丁香芍藥等分服準繩溫中丸治小兒瀉白胃寒故也腹痛腸鳴吐酸水不思飲食霍亂吐瀉人參白朮甘草等分上為末薑汁麵糊丸如緑豆大米飲下二三十丸準繩吐瀉昏睡露睛者胃虛熱也錢氏白朮散和中散可也吐瀉昏睡不露睛者胃實熱益元散之類入門升陽益胃湯吐瀉久不止者乃清氣下陷胃口陽虛飲食少進四肢無力黃耆二錢人參甘草半夏各一錢白朮柴胡白茯澤瀉各三分陳皮四分羌活獨活防風芍藥各五分黃連一分上薑棗煎服泉按南豐李氏曰小兒吐瀉皆當溫補若已虛損尤當速生胃氣惟尋常時行瀉症不可遽投熱藥慎之慎之四痢疾小兒痢疾大抵多由脾胃不和飲食過傷停滯不能克化又為乳母恣食生冷熱毒厚味以傳之又為風寒濕熱之邪以干之故有此疾有裡急窘迫急痛者火性急速而能燥物故也大法與大人同惟劑輕重耳準繩一方丹溪方治小兒痢疾黃連黃芩大黃甘草上水煎服赤痢加桃仁紅花白痢加滑石末同煎按熱痢初宜下丹溪一小兒八歲下痢純血作食積治蒼朮白朮黃芩芍藥滑石茯苓甘草陳皮神麯上水煎下保和丸泉按玉案曰下痢純血者在大人則為難治在小兒則為食積而無所妨而治小兒之痢又宜以消積為主淡寮敗毒散治小兒禁口痢毒氣上衝心肺食即吐逆人參茯苓甘草前胡川芎羌活獨活桔梗柴胡枳殼陳倉米各等分上入生薑水煎服直訣香連丸治小兒赤白痢疾黃連二十兩吳茱萸十兩上先將二味用熟水拌和入磁器內置熱湯中頓一日同炒至黃連紫黃色去茱用連為末每末四兩入木香末一兩淡醋米飲為丸如麻子大每服四五十丸白滾湯下醫鑑萬億丸治小兒下痢赤白腹痛立效泉云兒實壯積滯深重者其效如神玉案通快飲治小兒痢疾始發山楂一錢麥芽蒼朮萊蔔子枳實木通各七分大黃檳榔子各一錢二分上入生薑水煎服保元清熱化滯湯治小兒痢主方黃連吳茱萸煎湯拌炒白芍陳皮茯苓枳殼黃芩甘草上入生薑一片水煎空心服初起積熱正熾加大黃芒硝血痢加酒炒黃芩當歸地榆白痢加厚朴枳殼赤白並下加川芎歸尾桃仁紅花滑石陳皮乾薑炒黑白痢久虛加白朮黃耆茯苓去芩連枳赤痢久虛下後未愈去芩連加川歸白芍白朮川芎阿膠裡急後重加木香檳榔腹痛加白芍川歸玄胡枳殼小便赤少加木通豬苓澤瀉下如豆汁加白朮蒼朮防風食積加山楂枳實麥芽神麯久痢氣血兩虛加人參黃耆當歸川芎升麻肉蔻下後二便流利惟後重不去者氣陷於下也以升麻提之醫統地榆散治小兒赤痢因大腸停積熱毒得之或點滴鮮紅地榆訶子肉甘草各等分上為末每服一錢米湯調下一方加黃連枳殼芍藥醫統小連丸治小兒赤白痢脾胃虛弱糟粕不聚腹脹不食時作陳痛煩渴身熱黃連三兩乾薑炮一錢當歸阿膠炒各兩半上為末阿膠膏丸小豆大三歲三十丸食前米湯化服家傳和中湯治小兒傷於飲食濕面之物患泄痢稍後重赤白相交一身無熱者青皮厚朴枳殼芍藥藿香各中白朮蒼朮砂仁各小上水煎服按上方延壽院所制小兒多此證屢用屢驗局方胃風湯治小兒風冷乘虛入客腸胃水殼不和泄瀉注下及腸胃濕毒下痢如豆汁瘀血日夜無度人參白朮白茯苓川芎當歸芍藥桂少許上入粟米數粒水煎食前服選方一方治小兒噤口痢石蓮肉去殼留心上研為末每服五分陳米飲調下此是毒氣上衝心腹藉此以通心氣便覺思食全幼參苓白朮散小兒痢疾久不愈脾胃虛弱有熱氣關閉胸中禁口加石膏枳殼粳米一撮同煎食前服心氣通胃脘開便能食方見泄瀉門全幼參香散治嬰兒臟腑氣虛怯冷熱不調積在臟腑作成痢疾或下鮮血或如豆汁魚腦瘀血或下紫黑血或赤白相雜或成五色裡急後重日夜頻並臍腹絞痛甚不可忍及禁口疳蟲時瘟諸痢無問新久人參白扁豆炒木香各四錢肉豆蔻茯苓八錢陳皮去白罌粟殼去筋帶炙二兩四錢上為極細末用米飲調化食前服醫統豆蔻香連丸治小兒乳食不節腹胃虛弱冷熱之氣客於腹間下赤白痢腸內疼痛日夜頻並不思乳食黃連炒七錢半肉豆蔻二枚麵包煨丁香二錢半木香訶子炮各半兩上末粟米糊丸黍米大三歲服十丸米飲下醫統烏梅散治下痢後津液減少臟腑虛燥煩渴引飲長治諸病後煩渴引飲無度烏梅肉半兩微炒茯苓木瓜各一兩上入薑水煎服醫統桃花丸治下痢赤白多並泄瀉青水赤石脂乾薑各等分上為末糊丸如麻子大空心服二三十丸米飲下經濟木香散治諸般瀉痢日久不安並皆治之白朮用麵炒麥芽當歸一錢木香人參陳紅曲各一錢甘草茯苓神麯青皮各二錢上為末每服半錢白湯調下一方用紫蘇木瓜湯調下袖珍木香圓幼幼方治下痢赤白黃連一兩用吳茱炒去茱不用肉豆蔻二個木香二錢半二件一處面浸上為末麵糊丸如黍米大赤痢粟米飲下白痢厚朴湯下大全赤白相雜陳米飲下宣明厚朴散治小兒虛滑瀉痢不止使君子一個揀丁香十個厚朴半兩吳白朮茯苓青皮各二錢甘草一寸炒訶子皮半兩上為末每服一錢量歲數加減用清米湯下袖珍木香散治冷痢肚痛不食木香白朮各一分厚朴龍骨當歸各半兩乾薑訶子各一分上入薑棗水煎全幼香梅飲子治嬰孩小兒腸胃受積脾虛下痢赤白腹肚疼痛裡急後重木香一片生一片煨烏梅半生半煨當歸半生半煨甘草半生半炙陳皮去白半生半炒二錢半木香一錢黑豆半生半炒三十粒上水煎生黑豆不可打破全用食前服泉按木香一錢恐木瓜乎按上方安和五臟順益三焦陰陽既分腸胃自厚蓋生熟藥而治冷熱病可謂切要而穩當也一本後木香作木通也全幼地榆散治嬰孩小兒下痢赤白頻並地榆一分甘草二分芍藥一字當歸一錢上水煎服海藏赤痢四君子加當歸赤芍入粟米少同煎服白痢四君子等分加乾薑減半入粟米少同煎百問五苓散治中濕下痢煩渴飲水保元補中益氣湯治小兒久痢裡急後重欲去不去手足並冷皆胃氣虛寒下陷也此方主之本方加木香補骨脂倍加升麻柴胡四一腹痛小兒腹痛之病誠為急切凡初生二三個月及一周之內多有腹痛之患無故啼哭不已或夜間啼哭之甚多是腹痛之故大都不外寒熱二因夫寒者面白唇青或瀉痢清白以熱綿裹腹而啼少止即是寒也因於熱者面赤唇紅得暖啼甚即是熱也一周之外能吃飲食則有傷食腹痛或瀉或不瀉口渴而臭面黃身熱即是積痛久而不愈必致成疳矣局方藿香正氣散東井曰小兒一切腹痛用之有效依本方加木香醫鑑消食散治小兒腹痛多是飲食所傷治宜和脾消食山楂砂仁麥芽各一錢神麯陳皮青皮香附子各七分白朮二錢半甘草五分上入薑水煎服受寒作腹痛加藿香吳茱泉按小兒腹痛多是飲食所傷用上方和脾消食而奇效丹溪食積腹痛硬必用紫蘇蘿蔔子之類湯氏三稜散治積氣肚痛砂仁甘草益智三稜莪朮青皮各等分上為末白湯點下丹溪一方治冷熱不調嘔逆腹痛枳殼桔梗青皮陳皮當歸甘草木香上入薑水煎服玉案運脾散治小兒飲食所傷腹中作痛香附蘿蔔子陳皮山楂各六分木香白朮青皮丁香各四分上入生薑水煎服正傳一方治小兒腹痛甘草炙乾薑各二錢伏龍肝一兩人參茯苓百草霜白朮各五錢上細末粥丸如梧子大每服三十五丸陳皮湯下薛氏六君子湯腹痛若手足指冷厄逆泄瀉寒水侮土也本方用炮薑肉桂不效急加附子薛氏五味異功散服克滯之藥致腹作痛按之不痛脾氣復傷也宜之錢氏益黃散胃虛冷面㿠白色腹痛不思食主之方見泄瀉門醫統理中湯治小兒受寒腹痛人參白朮甘草乾薑炮上水煎服醫統七氣湯治七氣傷脾結聚大腹痛不能乳食半夏一兩人參二錢甘草炙桂心各一錢醫統芍藥甘草湯治熱腹痛小便不通芍藥一錢甘草五分上水煎服加黃芩名黃芩芍藥湯錢氏安蟲散治小兒蟲痛胡粉炒黃檳榔川楝子鶴蝨各三錢枯白礬二錢五分上為末每服五六分痛時米飲調下泉按錢氏曰蟲痛者當口淡而沫自出薛氏云蟲動之因多屬胃氣虛弱或聞飲食氣味而動前方乃化蟲之劑若因脾胃虛弱者須當調補中氣魯氏云有胃受極寒極熱亦令蟲動或微痛或不痛遽然吐出法當安蟲為上若以治蟲反傷胃氣固不可也因寒而動者用理中湯加烏梅水煎服因熱而動者用㕮咀五苓散亦加烏梅水薑煎服四二心痛小兒心痛當於大人心痛門參用之心痛吐水者蟲痛心痛不吐水者冷心痛錢氏靈礬散治小兒蟲咬心痛欲絶五靈脂二錢白礬火飛半錢上同研每服一二錢水一鍾煎至五分溫服無時當吐出蟲錢氏安蟲散治蟲動心痛方見腹痛準繩金鈴散治小兒心痛金鈴子莪朮炮各一錢茴香木香炮三稜炮各半兩上為末每服一錢半錢用熱湯調下四三癖疾並食積癖塊者僻於兩脅痞結者否於中脘此因乳哺失調飲食停滯或乳母七情而所致也癖塊久則脾氣必虛宜以養胃氣為主食積者因脾胃虛實乳食不化久而成積其症至夜發熱天明覆涼腹痛膨脹嘔吞酸足冷肚熱喜睡神昏大便酸臭是也家傳錢氏白朮散治小兒積痛和胃東井翁曰小兒癖積加青皮尤可也保元淨府湯治小兒腹中癖塊發熱憎寒口乾小便赤或大便稀溏或腹脹腫滿或痰嗽喘熱不思飲食面黃肌瘦四肢困倦等症柴胡山楂各一錢黃芩半夏各八分白朮八分人參三分茯苓二錢豬苓五分澤瀉二錢三稜莪朮各七分胡黃連三分甘草三分上入薑棗水煎服濟世此方有麥門冬各等分而名之消癖湯也直訣肥兒丸治小兒癖其效如神蕪荑炒黃連炒神麯麥芽炒各等分上為末水糊丸梧子大每服一二丸空心白湯下半井翁曰兒稟弱而有癖者此藥丸如雞頭實大每服五六丸以錢氏白朮散煎汁用之緩緩治之可也玉案消麻散治小兒諸食所傷以致肚腹膨脹面色黃瘦莪朮三稜陳皮山楂草果上為末每一錢薑淡湯下百問九味蘆薈丸治小兒癖疾並食積胡黃連黃連蕪荑蘆薈鶴蝨木香雷丸青皮各半兩麝香二錢另研上為末粟飯丸緑豆大每服二三丸米飲下濟世參朮肥兒丸治小兒癖塊發熱王道之劑久服除根人參山楂麥芽黃連神麯各三錢半使君子四錢半胡黃連五錢白朮茯苓各三錢蘆薈二錢半甘草三錢炙上為末陳小黃末粉糊為丸緑豆大每六七丸米湯下保元抑肝扶脾散治小兒癖積日久不消元氣虛弱脾胃虧損肌肉消削肚大青筋發熱口乾肚腹脹滿人參五分白朮土炒茯苓龍膽草白芥子山楂各八分陳皮神麯各六分柴胡三分黃連薑炒一錢青皮六分胡黃連三分甘草三分上入薑棗水煎服回春千金消癖丸治小兒癖疾積塊有殊效蘆薈阿魏另為糊青黛木香檳榔厚朴陳皮甘草炙各一錢使君子胡黃連山楂香附三稜醋炒莪朮煨酢炒各一錢麥芽神麯水紅花子微炒各四錢人參茯苓白朮各三錢上為末將阿魏一錢研水和麵打糊為丸緑豆大每服四五十丸米飲白湯任下直訣消積丸治食積大便酸臭發熱丁香九個砂仁十二個烏梅肉三個巴豆二粒上為末麵糊丸黍米大每服五七丸溫水下直訣保和丸治食積山楂三兩神麯二兩半夏茯苓各一兩陳皮連翹蘿蔔子各五錢上為末粥糊丸桐子大每服一二十丸白湯下簡易勝紅丸治小兒食積陳皮青皮三稜乾薑炮良薑各一兩莪朮一兩二味醋煮香附炒二兩上為末醋糊丸如桐子大薑湯下東井翁曰癖疾食積等久則皆脾胃虛憊生變症五味異功散錢氏白朮散六君子湯補中益氣湯等宜兼服四四咳嗽附喘急經曰秋傷於濕冬必咳嗽大抵素秋之氣宜清肅及動之則氣上衝而為咳嗽久則動脾濕而為痰也大法與大人同醫統參蘇散治嬰兒感冒風寒發熱頭痛咳嗽痰涎並宜服之人參蘇葉葛根前胡半夏茯苓陳皮枳殼桔梗甘草各等分上入薑棗水煎服若肺實有邪去人參加黃芩桑白皮杏仁直訣阿膠散治小兒咳嗽口乾作渴阿膠一兩馬兜鈴五錢糯米一兩杏仁七粒甘草一錢牛蒡子二錢半上水煎服蓬溪李氏曰阿膠散用馬兜鈴非取其補肺乃取其清熱降氣也邪去則肺安矣其中所用阿膠糯米則正補肺之藥也醫統葶藶丸治乳食傷脾傷風咳嗽面赤身熱痰盛喘促甜葶藶炒黑豆炒杏仁另研漢防己各一兩上為末入杏膏蒸棗肉和搗成劑丸如麻子大每服五丸至七丸淡薑湯下乳食後或臨臥服量兒加減直訣瀉白散治肺實熱咳嗽痰喘桑白皮地骨皮各二錢甘草五分上入粳米二十粒水煎服大全人參散治小兒咳嗽發熱氣喘面紅人參天花粉各等分上為末每服半錢蜜水調下家傳藿香正氣散東井翁曰感外邪挾食咳嗽者宜之於本方加杏仁薛氏人參平肺散治心火克肺咳嗽喘嘔痰涎壅盛胸膈痞滿人參陳皮甘草地骨皮茯苓知母五味子青皮天門冬桑白皮上水煎服玉案平肺飲治小兒感風邪咳嗽痰多灑淅惡寒陳皮前胡桑白皮薄荷防風各五分栝蔞仁蘇子桔梗各四分上入生薑水煎服綱目紫蘇子散治小兒咳逆上氣因乳哺無度內挾風冷傷於肺氣或小兒啼氣未定與乳飲之與氣相逆氣不得下紫蘇子訶子萊蔔子杏仁木香人參各等分甘草青皮各減半上入薑水煎服家傳不換金正氣散半井翁曰小兒食滯生痰五更咳嗽者甚多矣豫用此得奇效玉案涼肺湯治肺咳嗽痰盛音啞黃芩貝母天花粉枳殼各七分橘紅山梔子桔梗麥門甘草各五分上入燈心三十莖水煎服玉案定嗽湯治小兒肺有寒痰咳嗽並作氣喘款冬花杏仁橘紅各八分桑白皮桔梗枳實各六分栝蔞仁膽星各五分上入生薑水煎服醫統杏蘇飲治嬰兒痰氣咳嗽不止杏仁蘇子陳皮赤茯苓桑白皮大腹皮半夏甘草炙各一錢上入薑水煎服醫統百部丸治小兒肺寒壅嗽微喘百部麻黃各三錢杏仁四十粒上和勻煉蜜丸皂角子大溫水下二三丸直訣甘桔湯治咳吐熱涎咽喉不利甘草二錢桔梗一錢上為末每二錢入阿膠半斤水煎服丹纂二陳湯治小兒傷風咳嗽本方加防風枳殼白朮桔梗回春補中益氣湯小兒傷風咳嗽發熱服解表之劑加喘促出汗此脾肺氣虛加五味子醫林人參胡桃湯治小兒喘急不得臥人參一錢半胡桃肉連皮五十個上入薑三片水煎服古今醫鑑曰治肺虛發喘少氣難以布息回春六君子湯小兒有哮病其母遇勞即發兒飲其乳亦嗽依本方加桔梗杏仁桑白皮治之子母並服潔古人參荊芥散治身熱痰嗽胸膈不利宜下痰去熱人參半兩荊芥一兩大黃二錢上水煎調檳榔木香細末五分輕粉一字乳後服如身熱潮熱宜服清涼飲子去大黃三服之後一二日卻入大黃服之令疏利則愈不可便動臟腑潔古黃耆湯治小兒咳嗽喘逆身熱鼻乾燥者是熱入肺經為客熱呷呀有聲黃耆二兩人參二錢半地骨皮五錢桑白皮三錢甘草二錢半上水煎放溫頻頻服之海藏涎嗽四君子加杏仁桑白皮等分半夏曲減半同煎咳嗽四君子末煎紫蘇湯調下準繩牛黃奪命散治小兒肺脹喘滿胸膈起急兩脅扇動陷下作坑兩鼻竅張悶亂嗽喝聲嗄而不鳴痰涎潮如塞白牽牛黑牽牛半生半熟各一兩川大黃檳榔各一兩若不治死在旦夕俗云馬脾風上為細末三歲兒每服二錢冷漿水調下涎多加膩粉少許無時加蜜少許泉按田氏云暴喘俗傳為馬脾風也大小便哽宜急下之用牛黃奪命散後用白虎湯平之馬脾風暴喘而脹滿也在百日內者不治準繩無價散治風熱喘促悶亂不安俗謂之馬脾風辰砂二錢半輕粉五錢甘遂麵裹煮焙乾一錢半上為細末每服一字用溫漿水少許入滴油一點挑藥在上沉下去卻以漿水灌之立效四五瘧疾小兒瘧不外乎風痰與食無食不發熱無風不作寒而痰食風之所成矣蓋三者不全則不能成瘧也治法惟宜兼用消食疏風化痰焉但量其所屬輕重可也師曰大抵嬰兒之瘧皆自飲食上得之者居多須以消導扶胃氣為本此祕訣也濟世清脾飲治疸瘧脈來弦數但熱不寒或熱多寒少膈滿不能食口苦舌乾心煩渴飲水小便黃赤大便不利青皮厚朴白朮草果柴胡茯苓半夏黃芩甘草各等分上入薑水煎服東井曰小兒食瘧嘔吐痰沫及時行瘴瘧不問先寒後熱諸瘧通用加檳榔子直指四獸飲治小兒瘧疾和胃消痰半夏人參茯苓白朮陳皮草果烏梅生薑大棗各等分甘草減半上水煎服局方養胃湯治外感風寒內傷生冷溫中快膈能闢山嵐瘴氣寒瘧脾胃虛寒嘔逆噁心並宜服之厚朴蒼朮半夏藿香草果茯苓人參各半兩甘草二錢半陳皮七錢半上入棗薑搗梅水煎服大全草果飲張氏方治小兒瘧寒多熱少或遍身浮腫厚朴青皮草果藿香半夏甘草丁香皮神麯良薑各等分上入薑棗水煎服醫統大腹皮湯治小兒瘧疾因藥退熱太早變作浮腫外腎腫大飲食積於脾胃宜服枳殼蒼朮各二兩甘草二錢大腹檳榔子三稜莪朮各一錢上入薑皮蘿蔔子椒目同煎服玉案疏脾飲治小兒因風成瘧紫蘇柴胡半夏各一錢防風青皮厚朴川芎各五分上入薑水煎服玉案平安飲治小兒痰瘧來時作嘔半夏貝母橘紅柴胡各七分黃芩草果白朮枳殼各五分上入生薑水煎服玉案檳陳湯治小兒因食成瘧山楂青皮草果各八分檳榔子枳實半夏柴胡麥芽各六分上入薑水煎服保元截瘧飲治嬰兒瘧疾主方白朮青皮柴胡陳皮蒼朮豬苓常山澤瀉黃芩甘草上入薑棗水煎露一宿溫服有汗而熱多加黃耆人參前胡知母無汗而熱多加葛根紫蘇寒多加乾薑草果痰多加貝母半夏食積加山楂枳實麥芽神麯夜發者為陰分加當歸升麻二日三日一發者加人參黃耆白朮烏梅去蒼朮單寒加乾薑附子人參去柴胡黃芩豬苓澤瀉腹痛加厚朴檳榔醫統參苓湯治小兒瘧後面赤黃泄瀉不止乳食不消此乃胃氣虛弱故脾虛則泄胃虛則吐宜服之丁香訶子二錢炮青皮陳皮白朮茯苓人參肉豆蔻煨各三錢甘草炙二錢上末每服二錢陳米一勺薑一片同煎家傳錢氏白朮散古林氏曰小兒瘧疾用藥病邪漸輕乳食不進時時寒熱者用之醫統麻黃根湯治小兒瘧疾盜汗寒熱進退麻黃根知母檳榔子三稜莪朮各一錢半半夏三錢白芷貝母五分常山甘草各一錢上入薑二片小麥十五粒煎局方藿香正氣散小兒瘧疾寒多熱少周身浮腫腹滿悶不食者加前胡局方八解散小兒瘧因飲食而得者補遺玉素鱉甲飲治小兒久瘧不住何首烏鱉甲酒炙當歸白朮人參黃芩各八分上入棗水煎服保元一方治乳兒瘧疾痞塊川芎生地芍藥各一錢半陳皮半夏黃芩各一錢甘草上入薑水煎下鱉甲末半錢袖珍常山飲張氏方治一切瘧疾厚朴草果常山人參半夏貝母知母甘草茯苓上入薑棗水煎空心服準繩青皮湯湯氏方治小兒瘧疾作浮腫兼寒熱不退飲食不進白朮茯苓青皮厚朴陳皮半夏大腹檳榔子三稜莪朮木通甘草上入薑水煎服泉按此方皆克泄元氣之藥若病久脾虛而作腫者當以錢氏異功散為主少佐以五皮湯誤用此必至不救濟生鱉甲飲子治瘧久不愈腹中結為癥瘕名曰瘧母鱉甲醋炙白朮黃芩草果芎藭橘紅檳榔子甘草厚朴白芍上入薑棗水煎服準繩小柴胡湯治小兒瘧疾往來寒熱人參半夏柴胡黃芩甘草各等分上入薑棗水煎服明堂小兒瘧久不愈灸內庭在足大指次指外間陷中各一壯大椎百會四六鵝口瘡小兒鵝口瘡者胃中之濕熱也何以名之鵝口也鵝口者滿口皆白有似鵝之口中俗謂之雪口是也分而言之重舌屬心鵝口屬肺合而言之總為心熱何者心統於脾故曰治於口也使不由於心熱則口雖白而舌自赤何為而舌上皆白耶大法內服瀉心清熱之劑而外敷涼藥則重者可消白者可退矣醫林小兒鵝口瘡用發纏指頭蘸井花水拭口令淨用濃煎煮粟米汁以綿纏箸頭拭之更以煅過黃丹摻之即愈葛氏方正傳一方治小兒鵝口瘡不能食乳地雞上擂水塗瘡即愈地雞即匾蟲也人家磚石下多有之局方珠礬散治小兒鵝口瘡不能吮乳硃砂白礬上為細末使亂髮纏指揩舌上令淨以藥敷之保元牛黃散治小兒口中百病鵝口瘡重齶不能吮乳及咽喉腫塞一切熱毒黃連黃柏各八分牛黃冰片硼砂辰砂各一分雄黃青黛各二分牙硝一分半上共入乳鉢內研勻每用少許敷口內子母一方治小兒鵝口不能飲乳以黍米汁傅之子母一方治小兒鵝口瘡桑白皮汁和胡粉傅之聖惠一方治小兒鵝口滿口白爛貝母去心為末半錢水五分蜜少許煎三沸繳淨沫之日四五度四七口瘡小兒口舌生瘡乃心脾受熱也口瘡赤心藏熱白脾藏冷口瘡黃脾藏熱聖惠瀉心湯治小兒口瘡屬實熱者黃連上為末每一字蜜水調下千金甘露飲治小兒胃中客熱口舌生瘡咽喉腫痛或牙齦腫出膿血等症枇杷葉生地熟地天門麥門枳殼茵陳石斛黃芩各一錢甘草五分上水煎服本事方無麥門茵陳加山豆根犀角屑大有神效東垣柴胡地骨皮散小兒口瘡心胃壅熱者柴胡地骨升麻上水煎服直指升麻湯治小兒心脾有熱口舌破裂生瘡升麻玄參川芎生地麥門各五錢大黃赤芍黃連黃芩焙各三錢上水煎服集成黑參散治小兒口舌生瘡久不愈天門麥門黑參各等分上為末煉蜜丸彈子大白湯下準繩五味異功散治脾胃虛熱口舌生瘡或因誤服克伐之劑脾胃復傷而口舌生瘡或弄舌流涎吐瀉不止飲食少思或驚搐痰嗽睡而露睛手足並冷若母有病致兒患者子母並服泉按口瘡有虛有實若不辨虛實一向用苦寒清冷之劑則作虛虛之患也準繩云若元氣虧損或服寒涼之藥或兼作嘔少食者此虛熱也用本方加升麻柴胡宮氣方治小兒舌上生瘡如粥皮桑白皮汁傅之三兩度痊千金一方治小兒舌上生瘡乳飲不得白礬上和雞子置醋中塗兒足底二七即愈保元加味五苓散治小兒滿口白爛生瘡口糜白朮豬苓澤瀉木通生地赤茯苓肉桂甘草上水煎服大全湯氏方治小兒心有客熱滿口生瘡天南星上為末醋調貼腳心家傳錢氏白朮散古林氏曰小兒病後口舌生瘡者此藥最可也舌胎亦用之妙也泉按舌胎者俗云志多志登岐百問吳茱萸散治初生兒吃乳後口內即生白屑煩躁吳茱萸不拘多少醋調傅兒腳心內退即去之泉按藥性雖熱能引熱下行準繩清熱消毒散治小兒實熱口舌生瘡及一切瘡瘍腫痛形病俱實黃連炒山梔子炒連翹當歸各五分川芎芍藥生地各六分金銀花一錢甘草二分上水煎服乳母同服正傳白梅散治小兒口瘡鹽白梅燒存性鉛丹火飛紅棗去核燒存性人中白火飛龍腦少上為末服之神效也宮氣方一方治小兒口瘡及風疳瘡等晚蠶蛾上細研貼瘡上妙也正傳一方治小兒口瘡黃柏細辛上為末傅之入門一方治滿口生瘡糜爛者黃柏細辛青鹽上為末噙之吐涎三日即愈大人亦宜醫林一方治小兒口瘡通白者及風疳瘡蝕透者以白薑蠶炒令黃色拭去蠶上黃肉毛為末用蜜和傅之立效直訣薛氏曰口舌生瘡作渴飲冷屬胃經實熱者瀉黃散可也作渴畏冷屬胃經虛熱者四君子湯或錢氏白朮散五味異功散無擇牡蠣散治小兒口瘡牡蠣煅通紅取出候冷研細以紙裹入土中七日出火氣三錢甘草炙為末一錢上和勻時時挑少許摻口中或吐皆無害田氏口瘡之治方乳母同見宜服洗心散瀉心湯而後用黃柏末研細糝之瀉心湯黃連一味為末蜜水調不可煎湯氏治口瘡驗方黃柏蜜炒半兩青黛二分上為末頻摻口內斗門口瘡服冷藥不愈者此中焦之氣不足虛火泛上宜附子理中湯簡易一方治小兒口瘡不能吮乳密陀僧末醋調塗足心瘡愈洗去四八重舌重舌者心脾熱盛也何以名之曰重舌矣重舌者舌下腫突其狀又若一層故謂之重也非真有兩舌也醫統黃藥湯治小兒重舌及舌腫黃藥甘草炙各一兩上水煎服醫統一方治重舌生白礬黃丹五倍子上為細末蜜調塗舌上少頃以水漱之再塗以瘥為度玉案清熱飲治小兒重舌黃連生地黃各一錢甘草木通連翹石蓮子各五分上入淡竹葉七片時時灌入口中子母一方治小兒重舌黃丹上加大豆內管中以安舌下當歸連翹湯治小兒心脾有熱舌下有形如舌而小者曰重舌及唇口兩傍生瘡當歸尾連翹白芷各三分大黃煨甘草炙各一錢上水煎服濟衆一方治小兒卒然重舌蜂房燒灰上細研酒和為膏傅兒舌下三四次用之千金一方治小兒重舌竹瀝青黃柏上和勻點舌上即退濟衆一方治小兒重舌欲死亂髮灰上極末以半錢傅舌下子母一方治小兒重舌烏賊魚骨燒上和雞子黃傅之喉及舌上姚和一方治小兒重舌蛇脫炙焦上研末傅舌下日三次千金一方蒲黃塗之即痊千金一方用膽礬研細敷之湯氏小兒重舌木舌者用三稜針於舌下紫脈刺之出惡血痊姚和治小兒重舌馬牙硝塗舌下日三度丹溪小兒重舌桑白皮煮汁塗乳飲之四九木舌小兒木舌乃舌腫硬不柔和也此脾經實火也醫統玄參散治小兒心脾熱壅木舌腫脹玄參升麻大黃犀角各七分甘草半兩上水煎服醫統飛礬散治木舌漸腫大滿口若不急治即殺人上為細末捻糟茄自然汁調服回春瀉黃散治小兒木舌藿香七分山梔子一錢石膏五分防風四分甘草七分上水煎服丹溪一方治木舌百草芒硝滑石上為末酒調傅之田氏一方治木舌塞口欲滿紫雪二錢竹瀝半合和勻頻頻傅口即痊準繩川硝散治木舌朴硝一兩紫雪五錢鹽二錢半上細末每服五分入竹瀝三兩點用白湯調塗舌上咽津無妨入門一方治木舌用黃柏為末以竹瀝調點舌上甚者加朴硝白鹽直指一方治小兒木舌黃蜀葵花為末一錢黃丹五分傅之五弄舌小兒舌微露而即收名弄舌屬心脾虧損也用補脾散補之舌舒長而收緩名之吐舌乃心脾積熱少用瀉黃散主之大病未已而弄舌者凶保元補脾散治小兒弄舌人參白朮各一錢白芍酒炒茯苓各八分陳皮川芎各六分黃耆當歸酒洗甘草炙各四分上入生薑水煎服薛氏瀉黃散治小兒吐舌藿香七分梔子一錢石膏五分甘草七分半上水煎服泉按上方心脾積熱而為吐舌者用之效薛氏四君子湯弄舌作渴畏冷胃經虛熱宜此薛氏七味白朮散弄舌食少作渴大便不實脾胃虛弱也主之方見泄瀉門五一走馬牙疳牙床腐爛一時脫落不救謂之走馬牙疳言其速也此蓋熱毒蘊積既久故令一時發作如火鬱於灶突之中久矣一發而勢焰燎然莫之能御病此者十無一生惟初發時急以疳藥搽之漱之內瀉陽明胃火庶可愈者回春清胃升麻湯治小兒牙腫流涎腮腫走馬牙疳等症升麻川芎半夏芍藥各七分葛根黃連酒炒二次甘草防風各五分白芷二分白朮七分石膏煅一錢上水煎服能漱即含漱而吐之漱藥不用白朮半夏醫統立效散治小兒走馬牙疳青黛黃柏末白枯礬五倍子各一錢上為末用米泔水攪口內摻入患處正傳一方治小兒走馬牙疳其效如神白礬炒黃丹飛京棗連核燒存性上為細末傅之丹溪三仙散治走馬牙疳一時腐爛即死婦人溺桶中垢白者火煅一錢銅緑三分麝香一分上為極細末傅齒上不可太多醫林銅青散治走馬牙疳口內生瘡牙齦潰爛齒黑欲脫或出血臭氣丈夫婦女同白芷五錢馬牙硝銅青各一錢麝香一字上為末敷口角擦齒上仍服蟾酥丸醫林蟾酥散治走馬牙疳齒齦臭爛浸蝕唇鼻一應疳瘡蚵蚾燒黃連青黛上為末入麝香少許敷之五二吃泥土小兒愛吃泥土乃脾虛胃熱所致也保元清胃養脾湯治小兒愛吃泥土面色青黃或是蟲動者此藥治之若不急療癖症生石膏黃芩陳皮白朮茯苓甘草胡黃連使君子上各等分水煎服或為末於干飲食內令兒服之回春黃金餅治小兒好吃泥土干黃土上為末黃連汁和為餅服之立痊濟世指迷七氣湯小兒好食壁泥或好食生米或好食茶炭咸辣等物者有蟲積也此方有效青皮陳皮三稜醋炒莪朮醋炒香附子益智藿香官桂桔梗檳榔子大黃甘草上水煎露一宿五更空心服之準繩一方治小兒吃泥土石膏黃芩陳皮茯苓甘草白朮上水煎服春甫曰小兒愛吃泥土脾臟生蟲矣愛吃木炭是肝臟生蟲吃茶葉知為心臟吃生米須識脾宮推之以理度之以意斯為醫哲圓融也薛氏小兒嗜食泥土困睡泄瀉遍身如疥此脾經內外疳也用六君子及四味肥兒丸而愈準繩治小兒吃泥及䑋肚膩粉一分用沙糖搜丸如麻子大空少米飲下一丸瀉出士瘥䑋如掌切脹也生生子曰吃生米者此胃中有蟲也亦宜健脾清熱肥兒丸之類可也蓋吃泥吃米皆疳之漸當於疳門尋治大蘆薈丸之類方酌而用之錢氏益黃散治小兒脾熱面黃腹大食泥土當補脾方見泄瀉門玉案一方治好吃壁泥黃泥一斤砂仁四兩泥炒上為末黃連熬膏為丸每服二錢五更糖湯下準繩訶梨勒九治小兒食疳水穀不消心腹脹滿好吃泥土肌體瘦弱訶梨勒皮三分肉豆蔻一枚青黛麝香蘆薈硃砂熊膽各一分上件藥搗羅為末都研令勻用酒煮粳米飯和丸如黍粒大每服以粥飲下三丸日二服量兒大小增減服之五三赤遊丹毒小兒丹毒赤遊腫者蓋熱毒客於腠理搏於血氣發於外皮上赤如丹砂熱毒與血相擊而風乘之所以赤腫遊走遍身也此由乳母食酒面煎炙等物過度與夫烘衣與兒不候冷即著多成此疾醫林犀角解毒丹治小兒赤白丹瘤壯熱性躁睡臥不安胸膈痞悶咽喉腫痛通身丹毒牛蒡子炒半兩荊芥半兩防風甘草各二錢犀角一錢半上入竹葉水煎服一云如無犀角以升麻代之一方有黃芩醫統防風升麻湯治小兒丹瘤赤腫防風升麻山梔子麥門木通甘草各一錢上入竹葉水煎服直訣白玉散治丹瘤白土二錢五分寒水石五錢上為細末醋或清水調傅之醫統升麻散治五種丹毒升麻鬱金桔梗甘草葛根天花粉各等分上為末薄荷湯入蜜少許調下按醫林無升麻而名之牛黃散也薛氏四物湯加連翹山梔小兒頻浴或著烘衣而發丹者宜此薛氏四君子湯加柴胡神麯因飲食發熱而發丹玉案防犀飲治丹疹遍身如灑珠防己三錢朴硝犀角黃芩黃耆升麻各八分淡竹葉十五片煎服按此湯氏所制也名之防己散矣曰大抵丹毒雖有多種病源一也有赤丹毒遍身癢者或女子十五六而脈未通者多發丹疹皆由有風毒乘之宜服此藥醫林一方治發丹青黛土朱上為末井水入蜜調敷綱目張三太尉女十五歲病此諸醫百藥俱試而不能中召余視之以生料四物湯加防風黃芩一日而愈綱目生料四物湯治血熱生瘡遍身腫癢及脾胃常弱不禁大黃等冷藥尤宜服生地赤芍川芎當歸防風各半兩黃芩一錢半上水煎量大小加減忌酒面豬羊肉豆腐醫統一方青黛五味子上為末井水入蜜調傅薛氏加味逍遙散治因乳母鬱火而其兒發丹醫林平血飲治小兒風熱積毒發於面頭手足如胭脂色敗毒散加赤芍葛根升麻天麻蟬蛻薄荷生地麥門紫草是也全幼葛根白朮散治嬰孩小兒赤白丹毒腫白朮一錢茯苓三錢木香一錢半甘草二分半葛根三錢枳殼一錢上水煎服千金小兒丹發慎火草生一握搗取汁傅之效子母治小兒赤遊丹行於上下至心即死搗芭蕉根汁煎塗之子母小兒赤遊行於體上下至心即死以芒硝納湯中取濃汁以拭丹上丹溪小兒天火丹臍腰起者赤溜不妨用蚯蚓泥炒研細香油傅之田氏又法用牛膝一兩去苗甘草半兩生搗碎水煎一大盞去渣調伏龍肝塗之湯氏又傅丹毒方只一夜消盡用花蕊石生薑薄荷自然汁調鵝毛刷上患處為妙丹溪小兒赤溜主傷血熱宜生地木通荊芥芍藥帶發表之類外以芭蕉油塗患處準繩丹癢搗韭菜入些鹽與香油以手摩熱于丹上揩之立愈丹溪小兒丹瘤萆麻子五個去皮研入面一匙水調塗之甚效保幼一方赤遊風丹漸漸腫大五味子焙研熱酒服服一錢自消神效五四喉痹小兒喉痹會厭兩傍腫者為雙乳蛾易治下傍腫者為單乳蛾難治乳蛾差少者為喉痹熱結於咽喉且麻且癢腫繞於外名纏風喉痹暴發暴死者名走馬喉風回春甘桔湯治小兒咽喉腫痛風熱等毒桔梗三錢防風荊芥黃芩甘草薄荷各一錢上水煎服心鏡一方治小兒喉痹腫痛蜂房燒灰上以乳汁和一錢匕服千金治小兒咽喉腫鯉魚膽二七枚上和灶底土以塗咽喉立愈妙濟世蘇危湯治小兒喉閉腫痛危急之甚桔梗二錢山豆根一錢牛蒡子一錢荊芥一錢玄參八分升麻三分防風八分甘草少竹葉五分上水煎頻服外用硼砂一品含化咽下降痰消腫拔萃桔梗湯治熱腫喉痹桔梗甘草薄荷梔子連翹黃芩等分上入竹葉煎服淡寮牛蒡子湯治風熱上壅咽喉腫痛或生乳蛾牛蒡子玄參升麻桔梗犀角黃芩木通甘草上入生薑水煎服本事利膈湯治小兒脾肺有熱虛煩上壅咽喉瘡腫薄荷制芥防風桔梗人參牛蒡子甘草各等分上水煎服普濟一方小兒咽腫杏仁炒黑研爛含咽五五眼疾小兒兩眼腫痛上焦火盛也保元吹鼻散治小兒暴發赤眼疼痛乳香沒藥各五分雄黃三分火焰一兩黃丹一分上為細末每少許吹兩鼻孔丹溪祛風清熱飲治小兒熱眼腫痛防風黃連連翹升麻桔梗梔子草決明赤芍當歸上水煎服濟世小兒自脫胎時兩目赤腫或作癢或生翳此稟賦之肝火也用九味蘆薈丸六味地黃丸二藥而愈保元拔毒膏治小兒未周患兩眼腫痛黃連上一品為末水調敷腳心手心自愈如腫痛難開加薑黃牙皂朴硝為末同敷太陽穴手心足心加蔥搗爛敷之尤妙醫鑑一方治小兒眼腫痛熟地黃一兩上以新汲水浸透搗爛貼腳心布裹住效醫統二草散治小兒疳眼疼並赤眼腫痛甘草龍膽草各一錢細辛五分當歸一錢上為末每一錢水煎服聖惠一方治小兒雀目蒼朮一兩上為末每服一錢醫統合明散治小兒雀目至夜不見物石決明夜明砂蛤粉甘草上為細末三歲者每服五分煮豬肝汁沸後調服千金一方治小兒雀盲地膚子五兩決明子一升上為末米飲和丸每服二三十丸準繩復明散治小兒每至日暮即不見物乃雀目也蒼朮二兩穀精草一兩地膚子決明子黃芩各半兩上荊芥入少許煎服醫統秦皮散治小兒風毒赤眼腫痛癢淚眵淚昏暗並痘毒入眼秦皮滑石黃連各等分上為細末每用半錢沸湯泡去渣乘熱洗目湯氏導赤散治心熱小便赤眼目赤腫赤芍羌活防風各半兩大黃甘草各一錢上為末燈心黑豆煎食後服準繩小防風湯治小兒熱毒眼大黃蒸山梔子甘草炙防風赤芍川當歸洗羌活各等分上水煎溫服本事治小兒赤熱腫眼大黃白礬上為末冷水調作罨子貼眼立效入門小兒眼患多是胎毒及食毒內服敗毒散外洗解毒湯綱目余平生有赤眼之患用之如神大人小兒可通用凡眼赤澀之初只用自己小便張目溺出用一指接抹眼中便洗閉目少頃即效此以真氣逼去邪熱也準繩闢塵膏治小兒塵埃入目揩成腫熱作痛啼哭不已上以油煙細墨新汲井水濃磨入玄明粉半錢和勻為膏用筆多點目內三五次即效忌飲酒一晝宵明堂眼忽大小眥赤合谷灸三壯熱毒風盛眼痛灸中指本節頭二壯五六耳疾耳者腎之外候小兒腎經氣實其熱上衝於耳致津液壅滯為稠膿為清汁者此也亦有沐浴水入耳中水濕停留搏於氣血釀成耳膿久不痊變成耳重也醫統龍骨散治停耳小兒因沐浴水入耳中水濕停留搏於血氣醞釀成膿耳枯礬一錢龍骨煅一錢半黃丹胭脂一錢麝香少許一方無胭脂上為細末先用綿杖子捻出耳中膿水次用鵝翎管入耳中一字保元升陽散火湯治小兒耳腫疼痛或出膿汁者此三陽風熱壅遏所致升麻葛根羌活獨活芍藥人參各六分甘草炙一分柴胡三分防風二分半生甘草二分加黃柏知母少許上入生薑水煎晚服兼服金花丸保元金花丸方黃連黃柏黃芩山梔為末滴水為丸準繩清黃散治耳出黃膿名曰聤耳內有風熱外為水濕所幹醞久而成防風滑石五分甘草炙一錢梔子酒炒三錢藿香酒黃連各二錢上為末白湯調二錢食後服百問蔓荊子散治內熱耳出膿汁升麻木通赤芍桑白皮生地黃麥門冬前胡甘菜花赤茯苓蔓荊子甘草炙各等分上薑棗水煎服回春羽澤散治小兒耳中出膿或疼痛或出水枯礬少上為細末吹入耳中即愈保元清腎湯治小兒耳熱出汁作癢此痰也腎穴之上炎也主之黃柏鹽炒茯苓白芷蔓荊子天麻半夏防風天花粉貝母玄參各五分甘草三分半上入生薑水煎服百問干胭脂膏治小兒聤耳常出膿水不止干胭脂白龍骨白礬煅白石脂研等分上研如粉用棗肉和丸棗核大以綿裹丸納耳中日三換之田氏紅玉散治小兒膿耳枯白礬干胭脂麝香各一錢上同研勻先以綿裹杖子捻淨摻之本草治小兒聤耳用胭脂滴耳中外臺治小兒聤耳硫黃末以粉耳中日一夜一瘥止姚和治小兒耳後月蝕瘡胡粉和土塗上楊氏治小兒耳後月蝕瘡黃連為末傅之子母一方治小兒耳後月蝕瘡燒蚯蚓糞合豬脂敷之醫統月蝕瘡小兒勿指月耳後生瘡曰月蝕瘡用蝦蟆末傅醫統薔薇散治小兒月蝕瘡薔薇根四錢地榆皮二錢輕粉五分上為末先用鹽湯洗過後傅之準繩白蘞散治小兒凍耳成瘡或癢或痛黃柏白蘞半兩上為末先以湯洗瘡後用生油調塗五七鼻瘡小兒熱壅傷肺肺開竅於鼻故鼻上生瘡紅點集集名曰肺風或鼻下兩傍及人中濕爛癢潰名曰鼻𧈟其瘡有不痛者瘡汁流處卻又成瘡名淫瀝瘡醫統澤瀉散治小兒肺經積熱鼻上生瘡及鼻下赤爛澤瀉鬱金山梔仁甘草上為細末用甘草煎湯食後調服量大小與之丹溪治小兒赤鼻雄黃黃丹各等分用無根水調傅無根水者天落雨水用碗盛之者是也泉按薛氏曰鼻色赤乃脾胃實熱也用瀉黃散微赤乃脾經虛熱也用異功散加升麻柴胡醫統清金散傅鼻下爛瘡銅青白礬各一錢上為末傅患處醫統祕驗方治黃水浸濕流汁成瘡枯礬海螵蛸各一錢赤石脂鉛粉各二錢雄黃三錢黃丹二錢輕粉孩兒茶各五分上為末干搽上不黏者香油調傅保元一方治小兒鼻瘡久不愈膿極臭百草霜上研細每服五分冷水調服千金治小兒鼻塞生息肉方通草細辛各一兩上二味搗末取藥如豆著綿纏頭內鼻中日二千金治齆鼻有息肉不聞香臭方瓜蒂細辛各半兩上二味為散絮裹豆大塞鼻中須臾即通湯氏五福化毒丹治𧈟臭清膈涼血玄參桔梗各一兩赤茯苓人參馬牙硝青黛甘草各一分麝香五分一方有龍腦五分上除麝香牙硝另研一處為末次和青黛等煉蜜丸如芡實大金銀箔為衣薄荷湯化下準繩枇杷葉散治鼻疳赤爛枇杷葉去毛陰乾一兩山梔子半兩百部檳榔各二錢半上為細末每服三錢兒小者二錢更小一錢白湯調下準繩吉氏家傳治鼻下赤爛疳方青黛一錢麝香少許熊膽上末睡時貼少許在鼻下子母一方治小兒鼻下赤色以米泔洗淨用黃連末傅之日三四次五八頭瘡小兒頭瘡者風熱胎毒也袖珍黃連散張子和方治小兒頭瘡黃連黃柏真輕粉草決明上為細末用生小油調藥於瘡上塗立愈正傳通聖散治小兒癩頭川芎防風當歸芍藥連翹薄荷麻黃各四分石膏桔梗黃芩各八分白朮梔子荊芥各三分滑石二錢四分芒硝四分甘草五分大黃四分上酒拌除大黃另用酒炒共為末再以酒拌焙乾每服一錢水煎服外以白炭燒紅淬入水中乘熱洗之更以胡荽子伏龍肝懸龍尾黃連白礬為末油調敷之正傳又方治癩頭以松樹皮燒存性二兩黃丹火飛一兩白礬火枯黃連大黃各五錢白膠香火飛上六品石上一兩輕粉四盝共為末熱香油調敷事林一方治小兒頭瘡杏仁燒研傅之保元一方治小兒頭瘡胎毒諸風熱惡瘡痘瘡黃柏黃連白芷五倍子各等分上為細末用井花水調稀稠得所塗開在碗內覆架兩磚上中空處灼艾煙薰蒸以黑干為度仍取下前藥再研作末清油調塗如有蟲則用煎油調搽立效回春一掃光治小兒頭上肥瘡或多生蝨子搔癢或成瘡膿水出不止細茶三錢口嚼爛水銀入茶內研一錢牙皂花椒各二錢上為末香油調搽丹溪一小兒二歲滿頭生瘡一日瘡忽自平遂患痰喘知其為胎毒也詢其母孕時多食辛熱物遂以人參連翹黃連甘草陳皮川芎芍藥木通濃煎入竹瀝與之數日而安濟世一方治小兒頭瘡胎毒等瘡五倍子白芷各一兩花椒黃丹各五分枯白礬一錢上為末瘡濕乾摻瘡干香油調搽保元一方治小兒頭瘡經年不瘥者白礬五錢胡粉一兩水銀一兩大黃黃連苦參松脂各一兩半黃芩一兩蛇床子十八銖上為細末以臘月豬脂和研水銀不時敷之聖濟一方治小兒頭瘡用烏梅肉燒存性研末茶油調塗效聖惠一方治小兒頭瘡水磨檳榔曬取粉和生油塗之聖惠一方治小兒頭瘡吳茱萸炒焦為末入汞粉少許豬脂醋調塗之藥性論一方治小兒頭瘡蓼子為末蜜和雞子白同塗之子母一方小兒頭瘡菟絲苗煮湯頻洗之子母小兒頭身諸瘡燒雞卵殼和豬脂傅之五九白禿瘡白禿之候頭上白點斑剝初似癬而上有白皮屑久則生痂瘰成瘡遂至遍頭洗刮除其痂頭皮瘡孔如箸頭大里有濃汁出不痛而有微癢時其里有蟲甚細微難見九蟲論亦云是燒蟲動作而成此瘡乃至自小及長大小不瘥頭髮禿落故謂之白禿也産乳一方治小兒禿瘡榆白皮上為末醋和塗之蟲當出千金一方治小兒白禿葶藶上搗末以湯洗訖塗之本草一方主小兒禿瘡油煎胡荽傅之聖惠治小兒頭瘡梁上塵和油取餅下滓以皂角湯洗後塗上肘後治小兒白禿發不生用臘月豬屎燒末傅之姚和治小兒白禿頭瘡團團白色以牛屎傅之産乳治小兒白禿瘡及發中生癬取熊脂傅之食療治小兒白禿用白齒莧煎為膏塗之肘後一方治小兒頭瘡耳上生瘡竹葉燒末和豬脂塗上又以雞子白傅之亦妙楊氏一方治小兒頭瘡白禿用馬屎洗之楊氏一方治小兒禿瘡收未開桃花陰乾與桑椹赤等分作末先用灰汁洗去瘡痂用豬脂調藥敷上食療一方治白禿瘡用青銅錢一個搗為末入杏仁七枚同搗爛將瘡洗淨用燈窩油調搽極效或早朝以蒜揩白處亦可千金治小兒頭無發燒鯽魚末醬汁和傅之子母香薷散治小兒白禿不生髮燥痛陳香薷二兩胡粉一兩豬脂半兩上用水一大盞煎香薷取汁三分去滓入胡粉豬脂相和合勻塗於頭上日頻用之補遺一方治白禿土器松脂上等分胡麻油調傅一方干蕪上黑燒胡麻油調傅一方茵陳上黑燒胡麻油調傅一方雞卵胡麻油和傅之一方禿瘡及惡瘡苦楝根皮上黑燒以豬油調傅六臍瘡巢氏曰因浴兒水入臍中或尿濕繃袍致臍中受濕腫爛成瘡或解脫為風邪所襲入於經絡則成風癇若臍腫不幹久則發搐聖惠一方治小兒臍中汁出不止並赤腫痛枯礬上為細末干敷姚和一方治小兒臍腫桂心上炙令熱尉之日可四五度子母一方治小兒臍瘡不合黃柏上為末塗之保元又方蠶繭殼上燒灰存性摻之亦可千金治小兒臍瘡久不瘥者馬齒菜上燒末傅之保元礬龍散治小兒因煎臍外傷於風邪以致臍瘡不幹枯礬龍骨煅各五分上為細末每用少許乾摻臍上聖惠治小兒臍風濕腫久不痊蜂房上燒末傅之東井一方小兒臍瘡汁出久不痊妙也蒼朮麝香上為細末傅之子母一方治小兒臍瘡久不痊伏龍肝上為末傅之醫林一方釜底墨上研勻傅之亦妙也錢氏柏墨散治斷臍後為水濕所傷或襁褓濕氣傷於臍中或解脫風冷所乘致令小兒四肢不和臍腫多啼不能乳哺宜速療之黃柏釜下墨亂髮燒上各等分為細末每用少許傅之丹溪臍風濕鹽二兩豉二合杵成餅子如錢灸熱尉臍上安又以黃柏末傅之子母治小兒臍赤腫杏仁杵如脂傅臍腫上醫説一方小兒初生未滿月多啼叫致臍中出血以白石脂末貼之即愈醫説小兒臍久不幹當歸焙乾為末著臍中準繩異功散治臍中瘡龍骨煅薄荷葉蛇床子各二錢輕粉半錢上為極細末少許乾摻臍明堂臍腫腰對臍骨節間六一蛔蟲凡蟲證者古云濕熱生蟲龔雲林曰假如禾苗雨灑日照則蟲生此説明矣其為患嘈雜腹痛嘔吐涎沫面色痿黃眼眶鼻下青黑以致飲食少進肌肉不生沉默寒熱皆是飲食傷脾所致也寶鑑化毒丸治小兒蟲病或因臟腑虛弱而動或因食肥甘而動其動則腹中疼痛發作積聚往來上下痛有休止亦攻心痛則哭不休閣眼仰身撲手心神悶亂嘔噦涎沫或吐清水四肢羸困面色青黃飲食雖進不生肌肉或寒或熱沉沉默默不的知病之處其蟲不療則子母相生無有休止若服此藥其蟲大者即下細者盡化為水鶴蝨檳榔苦楝根胡粉炒各一兩白礬枯二錢半上為細末水糊丸麻子大空心米飲下五丸保元楝陳湯治蛔蟲作痛苦楝根皮二錢陳皮半夏茯苓各一錢甘草五分上入薑水煎服丹溪錢氏白朮散治小兒冬月吐蛔蟲多是胃寒胃虛所致人參白朮茯苓藿香木香乾葛甘草各一錢丁香二粒上水煎服醫余曰既蟲九蟲之數人腹中皆有之小兒失乳而哺早或食甜物過多胃虛而熱生蟲今人腹痛惡心口吐清水腹上青筋用火煨使君子與食以殼煎湯送下甚妙然世人多臨於臥服之又無日分多不驗唯月初四五里五更而服之至日午前蟲盡下可用溫平和胃藥調理一二日凡蟲在腹中月上旬頭向上中旬橫之下旬頭向下故中旬下旬用藥則不入蟲口所以不驗也牛馬之生子上旬生者行在母前中旬生者並肩而行下旬生者後隨之貓之食鼠亦然天地自然之理物皆由之而莫知之虞天民云丹溪曰濕熱之生蟲臟腑虛則侵蝕上半月蟲頭向上易治下半月蟲頭向下難治已上二月字恐並當作日字蓋蟲無半月一轉頭之理也先以蜜或砂糖少許吃引蟲頭向上然後用殺蟲藥矣春抱此説最韙之外臺一方治小兒蛔蟲苦樹根檳榔鶴蝨上濃煎飲之家傳嘉禾散半井春蘭子家傳書云小兒吐蛔用之有奇效茯苓砂仁薏苡枇杷葉桑白皮沉香五味子各五錢木香青皮谷蘖藿香桂仲隨風子石斛酒炒大腹陳皮半夏神麯檳榔各三分白豆蔻丁香人參白朮甘草炙各五分上入薑棗水煎服集成取蟲丸治小兒肚大青筋有蟲牽牛三錢檳榔錫灰各半兩大黃六錢滴水丸梧子大楝根使君子湯下五丸以下蟲為度正傳經驗檳榔丸治小兒疳病積氣塊痛腹大有蟲等症三稜醋炒莪朮醋炒青皮陳皮雷丸乾漆炒煙盡麥芽神麯炒黃色各半兩檳榔蕪荑二錢半鶴蝨木香砂仁甘草炙胡黃連炒各三錢良薑土炒二錢山楂五錢上為細末醋米糊丸梧子大每服三四丸空心薑湯下今方中加使君子五錢尤妙經驗抵聖散治小兒蛔蟲苦楝根二兩白蕪荑半兩為末每一二錢水煎服之方老烏梅丸胃虛藏寒得食而嘔蛔從上出者此方主之烏梅三十枚人參細辛黃柏附子炮桂枝各六錢黃連一兩六錢炒乾薑一兩炮當歸蜀椒去目及閉目者各四錢方老曰烏梅味酸蛔得之而軟黃柏味苦蛔得之而伏椒細味辛蛔得之而死乾薑附桂溫臟寒也人參歸補胃虛六二尾骨痛臀尖椎盡處小兒尾骨痛乃是陰虛火所致也回春補陰降火丹丹溪方治陰虛尾骨節痛當歸酒選川芎白芍酒炒黃柏酒炒知母酒炒熟地黃各等分上銼少用官桂為引或以前胡木香為引如痛不止加乳香沒藥回春化痰降火湯治痰火尾骨痛陳皮半夏茯苓澤瀉黃柏酒炒知母酒炒甘草各等分上銼必用前胡木香為引蓋陰虛故痰盛若痛不止加乳香沒藥六三陰腫夫小兒陰腫者皆由膀胱蘊熱風濕相乘或濕熱水腫流注或疝氣攻作或暴風客熱及啼叫怒氣結聚或蟲蟻吹毒所致詳其所因施以方治大全三白散治膀胱蘊熱風濕相乘陰囊腫脹二便不利方見疝氣門錢氏地龍膏治小兒外腎腫或疝氣風熱暴腫及陰瘡腫醫統桃仁丸治小兒啼叫怒氣閉於下結聚陰腫不散桃仁三錢官桂牽牛白蒺藜牡丹大黃各三錢上為末煉蜜丸如梧子大每服五七丸不拘時用青皮木通蔥白鹽少許同煎湯送下或煎木香流氣飲牡蠣散方見疝氣門蟬蛻散同斷醫統遇仙方治小兒外腎焮赤腫痛日夜呻吟退皮殼愈了又發用老杉木燒灰入膩粉香油調敷湯氏海蛤散小兒陰腫由啼叫怒氣閉縱於下成此疾宜此海蛤三錢茴香炒七錢半薏苡仁白朮檳榔子各半兩上為末食前溫酒調下大小加減按滯氣陰腫者宜此準繩桃仁丹治陰腫桃仁炒七錢半牡丹桂心白蒺藜炒各半兩郁李仁二錢半上為細末煉蜜和黍米大每服十粒以溫酒下乳食前量兒大小加減亦可水煎服曾氏一方治小兒陽明經風熱濕氣相搏陰莖無故腫或痛縮木香枳殼各二錢半甘草二錢上水煎服集玄一方治小兒陰㿉腫大不消硼砂一分水研塗之大有效危氏一方小兒陰腫多因坐地風襲及蟲蟻所吹用蟬蛻半兩煎水洗仍服五苓散即腫消痛止危氏一方治小兒陰腫以蔥椒湯暖處洗之唾調地黃末傅之外腎熱者雞子清調或加牡蠣少許六四脫囊小兒脫囊陰囊腫大墜下而不收也亦有囊皮脫爛者丹溪一方治小兒脫囊木通甘草黃連當歸黃芩上水煎服囊爛者以野紫蘇葉為末香油調傅皮脫兩丸露者外以青荷葉包之傅藥後自生皮六五陰腫疝氣小兒陰腫者足少陰為腎之經其氣下通於陰或有少陰之經虛而受風邪者氣衝於陰氣與血搏結則陰腫也然兒有大小壯弱起止中節可也苟腎氣虛或坐石不起冷氣凝之或近地經久風邪濕氣傷之不為陰腫幾希矣間有啼叫怒氣閉擊於下結聚不散加以水實不行亦能發為此疾醫統勻氣散治嬰兒調補通利後及冷疝腹痛氣滯不和桔梗一兩炒陳皮去白半兩砂仁茴香各二錢白薑炮錢半甘草炙二錢上為細末滾白湯調下冷疝腹痛燒鹽湯下食前服準繩烏梅散治腹痛及初生臍下冷痛疝氣烏梅一個延胡索甘草半生半炙各二錢半乳香沒藥鉤藤各一錢半上水煎服準繩金茱丸治嬰兒冷疝氣痛及脬囊浮腫金鈴子半兩吳茱萸二錢半上末酒煮糊丸黍米大食前鹽湯下二七丸醫統青木香丸寬中快膈腹痛心下堅痞腸中水聲及陰腫黑豆炒半兩木香破故紙炒蓽澄茄檳榔各四錢上先將檳榔粟飯包濕紙包裹煨焦去飯用檳榔同前藥為末滴水丸緑豆大每服十丸空心白湯下醫統傅藥方治小兒外腎腫大光明牡蠣灰二錢乾地龍一錢上為末津唾調塗熱者雞子清調錢氏地龍膏治小兒疝氣腫痛及陰瘡先以蔥椒湯洗次用地龍末雞子清調敷又方研桃仁泥唾調敷大全三白散治小兒膀胱蘊熱風濕相乘陰囊腫脹大小便不利牽牛二兩白者桑白皮木通白朮陳皮各半兩上入薑水煎保元必方治小兒陰腫疝氣五倍子燒存性為末以好酒調服出汗立愈回春又方治小兒外腎腫大牡蠣上不拘多少為末用雞子清調塗上即消醫林金鈴散治小兒疝氣曲腳腰啼哭唇乾額汗或外腎釣上陰囊偏大極效金鈴子半兩砂仁七錢半蓽澄茄木香各半兩上為末鹽湯或酒調下二錢入門牡丹皮散治小兒外腎偏墜防風牡丹皮等分上為末每二錢溫酒或鹽湯調服外用鹽湯洗之入門五苓散治陰核氣結腫大釣痛謂之㿗疝有因坐石冷氣凝之或近地風濕傷之湯氏家傳妙方治小腸疝氣芫花醋浸炒木通檳榔三稜各半兩茯苓青皮全蠍桂枝附子硼砂各二錢半上為末將硼砂浸澄去土頓在湯瓶上候成膏子和糖醋打麵糊為丸如豆大每服三十丸空心溫酒下未效再服按丹臺玉案曰夫小兒偏墜當以食積治蓋食積不消脾濕下行流入肝部故成此症豈以大人之疝治之六六盤腸氣小兒盤腸氣者痛則腰曲乾啼額上有汗是小腸為冷氣取搏然耳其證口閉腳冷上唇乾者是也此是生下洗遲感受風冷或大便青色不實也醫統乳香散治盤腸氣凡有此證急煎蔥湯淋洗其腹揉其蔥尉臍腹間良久尿自湧出其痛自止服此藥乳香沒藥各等分上為末木香湯調下或煎數沸亦可百問當歸散治小兒夜啼者臟寒而腸痛也面青手冷不吃乳是也宜用此方當歸白芍人參各二錢半炙甘草桔梗陳皮各一錢上水煎服醫林茴香散治小兒盤腸氣痛茴香炒木香黑附子煨金鈴子蘿蔔子檳榔破故紙炒白豆蔻煨各等分上水煎入鹽少許服經濟木香散治小兒盤腸氣痛不已面青手冷日夜啼叫尿如米泔川楝子七個去皮核用巴豆三十五粒去皮同炒令巴豆黃去豆不用木香延胡茴香各一分使君子二分上為末清米飲空心調下量兒大小服之醫林鉤藤膏治小兒盤腸內吊腹中極痛乾啼乳香沒藥木香薑黃四錢半木鱉子十二個去殼研爛成膏上以木鱉膏和外四味更入爛蜜少許丸櫻桃大煎鉤藤湯化下次服魏香散大全魏香散治盤腸內吊莪朮半兩阿魏一錢上先用溫水化阿魏浸莪朮一晝夜焙乾為末每服一字紫蘇米飲下直指一方小兒盤腸用蘿蔔子炒黃研末乳香湯服半錢六七脫肛小兒脫肛者皆因久患瀉痢得之大腸頭自糞門出而不收也此大腸虛滑也保元提氣散治小兒肛門脫下極效黃耆人參白朮當歸白芍炒乾薑炒柴胡升麻羌活炙甘草上水煎服泉按上之證脾肺虛寒所致宜之海上一方治小兒瀉痢肛帶出用胡荽切一升燒煙薰肛即收正傳治小兒肛門脫下鱉頭上燒存性香油調傅一云以此物燒煙薰之良久自收經濟一方治小兒脫肛陳槐花上一品不拘多少為末陳米飲下海上一方治小兒脫肛不收浮萍草上為末摻患處陳無名之水聖散正傳一方治小兒肛門脫下丹溪方陳壁土上一品泡湯先薰後洗回春提肛散治小兒肛門脫出醫統名龍骨散也龍骨二錢半訶子煨沒食子罌粟殼酢炙赤石脂湯氏方無赤石脂上為末用米飲調食前服仍將蔥湯薰洗令軟凝凝托上錢氏赤石脂散治小兒因痢後努躽氣下推出肛門不入躽於建反用力努腹也赤石脂伏龍肝上等分為末傅腸頭上頻用按入正傳一方治小兒肛門脫五倍子上為細末敷而頻托入之海上一方治小兒脫肛萆麻子上搗爛貼頂上腸收即去之回春小兒脫肛洗法苦參五倍子東壁土上等分水煎湯洗次用木賊末搽上醫統澀腸散治小兒久痢大腸頭脫出不收訶子肉煨赤石脂龍骨各等分上為末茶少許和藥摻腸頭上以帛揉入治痢木通湯調下百問苦參湯治脫肛並痔枳殼黃連大黃甘草荊芥苦參芍藥黃芩各等分上銼散每用五錢以車前子茅草同煎薰洗三因香荊散治小兒脫肛不收香附子荊芥穗各等分上為末每用三五錢水二碗煎五七沸熱淋洗潔古五倍子散治小兒脫肛五倍子地榆各等分上細末每服半錢空心米飲調下薛氏小兒脫肛多因吐瀉脾氣虛肺無所養故大腸之氣虛脫而下陷也補中益氣或四君子為主六八遺尿小兒遺尿者此由膀胱有冷不能約於水故也夫腎主水腎氣下通於陰小便者津液之餘也膀胱為津液之府腎與膀胱俱虛而冷氣乘之衰弱故不能約制其水出而不禁故遺尿也又有尿床者亦由膀胱冷夜屬陰小便不禁睡里自出謂之尿床也醫統雞腸散治小兒遺尿雞腸牡蠣茯苓肉桂龍骨各二錢半桑螵蛸炒半兩上為末每服二錢薑黃湯調服濟世益智散治小兒遺溺益智桑螵蛸各七個上為末酒調服準繩胡紙散治膀胱虛冷夜間遺尿或小便不禁破故紙炒上為末每服一錢熱湯下準繩又方破故紙炒為末黃蘗湯調下外臺治小兒睡中遺尿不自覺者官桂上為末雄雞肝一具等分搗丸如小豆大溫水送下每日進一二服醫統一方治小兒遺尿益智茯苓上為末每服一錢空心米湯下縮泉治小兒尿床及産後損脬遺尿用豬脬豬肚各一個糯米半升上將米入脬內將脬入肚內煮爛入鹽椒勻如飲食日常服效保元治小兒下元虛弱遺尿失禁六味丸加人參肉桂破故紙益智薛氏補中益氣湯治脾肺氣虛者加補骨脂山茱萸按醫宗必讀云嬰兒遺尿挾熱十居七八此又不可不辨也六九白濁小兒尿白者由乳母乳哺失節過傷於脾故使清濁不分而尿白如米泔也久則成疳亦心膈伏熱而得之宜和脾士消食化積利小便也回春澄清飲治小兒大便白小便濁或澄之如米泔此濕滯於脾胃白朮茯苓白芍炒黃連薑汁炒澤瀉山楂各一錢青皮四分甘草三分上水煎服醫林茯苓散治小兒尿白狀如米泔三稜莪朮砂仁赤茯苓各半兩青皮陳皮滑石甘草各二錢半上為末每服一錢麥門冬調下或加燈心煎湯氏三稜散治小兒尿白濁久而成疳此藥實脾土消食化疳積實字作疏綱目三稜炮莪朮炮各一兩益智甘草炙神麯炒麥芽炒陳皮各半兩上為末每服二錢燈心湯調下醫統分清飲通心氣補漏精治小便余溺赤白濁益智川萆薢石菖蒲烏藥各等分上每服二錢燈心煎可加茯苓白芍各等分準繩益黃散初出黃白久而白濁者乃冷疳之候也冷者主之全幼香砂圓治嬰孩小兒白濁香附子炒一兩縮砂五錢三稜煨莪朮煨陳皮麥糵炒各四錢蘆薈五錢半上為極末煮麵糊圓如黍米大用米飲鹽湯食前服七便血論曰小兒初生七日內大小便有血出者此由胎氣熱盛所致也母食酒面炙煿熱物流入心肺兒在胎內稟受熱毒亦傳心肺且女子熱入於心故小便有之男子熱入於肺故大便有之血出淡淡有水胚紅色盛則其血鮮凡有此證不可以他藥只以生地黃取自然汁入蜜少許和勻溫服自愈男女皆效甘露飲茅根及茅花湯兼服亦好醫統甘露飲治小兒胃中客熱牙宣口氣齒齦腫爛時出膜血或肌煩不欲飲食及赤目腫痛口舌生瘡咽喉腫痛及身面皆黃肢體腫大便不調小便澀黃並治熟地麥門枳殼甘草茵陳枇杷葉去毛石斛黃芩生地天門各等分上水煎服醫統聚金丸治大便下血發熱煩躁腹中熱痛作渴脈來弦數或驚熱目赤昏澀或有酒毒去血並治黃連一兩水浸曬乾一兩炒一兩炮一兩生用黃芩防風各一兩上末麵糊丸緑豆大每服五十丸白湯下醫統千金地黃丸治心熱腸風臟毒去血生地半斤研取汁連渣二味拌勻曬乾黃連四兩上末煉蜜丸緑豆大每服二十丸食後麥門冬湯下外臺治小兒大便失血出車釭一枚燒令赤內水中服之痊回春一方用生蒲油頭髮燒灰各一錢為末生地黃汁或米飲乳汁調同服御藥阿膠丸治小兒腸風下血黃連阿膠赤茯苓各等分上將連茯為末調阿膠酒熬衆手和丸食前米湯送下本事槐花散治小兒腸風臟毒下血槐花側柏葉荊芥枳殼上為末每用二錢空心米飲調下七一淋疾小兒諸淋者膀胱津液內郁水道不通停積於胞熱則澀故令水道不利小便淋瀝故謂之淋其狀小便出少小腹急痛引臍是也名雖有五總屬於熱醫統葵子散治小兒諸淋小便不通葵子車前木通瞿麥赤茯苓桑白皮梔子甘草各等分炙上水煎服醫統冬葵子散治小兒小腹急悶小便淋漓冬葵子一兩木通半兩上入燈心水煎服保元五淋散治小兒下淋乃膀胱有熱水道不通淋瀝不出或尿如豆汁或如砂石或冷淋如膏如熱淋尿血赤茯苓六分赤芍山梔各二分黃芩三分當歸甘草各五分一方加生地澤瀉木通猾石車前子各二分上燈心一團水煎服百問立效散治小兒諸淋不通莖中疼痛木通甘草白孩兒花名王不留行胡荽滑石海金砂山梔檳榔各等分上煎服醫統車前子散治小水不利茯苓豬苓香薷車前子人參各等分上為末每服二錢燈心湯下醫統金砂散治小便淋瀝不通鬱金海金砂滑石甘草各等分上為末每服二錢木通燈心煎湯下或冬瓜湯下亦可全幼草豆湯治嬰孩小兒沙石淋甘草一寸生黑豆百二十粒上用新水煮乘熱入滑石末煎食前服湯氏治血淋神效方紫草連翹車前子上水煎準繩又方海螵蛸生地白茯苓上為末柏葉車前草煎湯調下寶鑑導赤散治小兒血淋生地黃木通各二錢黃芩甘草生用各一錢上為末每服一錢井水入燈心煎服仍以米飲調油發灰空心灌下準繩治氣淋赤芍一兩檳榔一個上為末燈心同棗子煎湯調下薛氏補中益氣湯淋脾氣下陷薛氏兒早近色欲小便澀滯或作痛及去後大小便牽痛者皆屬肝腎不足也用六味地黃丸補中益氣湯加牛膝車前肉桂未應當參五臟所勝不可輕用滲泄寒涼之藥大損胃氣慎之七二尿血醫林朱珀散治小兒尿血滑石硃砂琥珀甘草上末每服一錢燈心湯調下姚和治小兒尿血甘草五分上以水六合煎取二合去滓一歲兒一日服令盡姚和一方治小兒尿血蜀升麻五分水五合煎取一合去滓一歲兒一日服盡準繩穴府丹治小兒小便出血木通生地黃甘草黃芩上為末水煎溫服丹溪一方治小兒尿血用甘草升麻煎湯調益元散尿血方生蒲黃生地黃赤茯苓甘草各等分上每服一錢煎調發灰食前服全幼又方小兒出血生地黃汁生薑汁入生蜜同調化食前服七三吐血夫吐血證者由營衛氣逆也營者血也衛者氣也營衛相濟不失常道一則所盛則致妄行血者水也決之東則東流決之西則西流氣之使血其勢如此簡要祕方治小兒吐血不止黃連一兩上為末每一錢豆豉二十粒水煎服回春一方治小兒吐血山梔子炒黑三錢上入生薑水煎服録驗一方治小兒咯血吐血衄血白芍藥一兩犀角二錢半上為末新水服一錢匕血止為限保元柏枝散治小兒吐血衄血柏枝曬乾藕節曬乾各等分上為末三歲兒服半錢藕汁和蜜一匙白湯調下準繩紫參散治吐血紫參山梔子生乾地黃各一兩刺薊一分燒灰亂髮一分燒灰俱存性已上搗羅為細末次用蒲黃伏龍肝各一分並細研上件都拌勻每服半錢至一錢煎竹茹湯調下回春黃芩丸治小兒吐血衄下血黃芩上為末煉蜜為丸如雞頭實大鹽湯下每一二丸聖濟一方治小兒吐血不止蒲黃上每半錢用地黃汁調下量兒大小加減或入發灰等分聖惠雙荷散治小兒卒暴吐血藕節七節荷葉頂七個上入蜜一匙擂爛水二盞煎八分去渣溫服七四鼻衄夫鼻衄者是五臟熱結所為也血隨氣行通流臟腑冷熱調和不失常度無有壅滯亦不流溢血得寒則凝結得熱則流散熱乘於血血隨氣發溢出於鼻竅也有因傷寒溫疫諸陽受病不得其汗熱毒停聚五臟故從鼻而出也血熱不循經從鼻出血隨其氣肺主氣外屬鼻故衄也大全一方治小兒衄生蘿蔔上去葉搗汁仰頭滴入鼻中或血妄行取汁飲之立效拔萃黃芩芍藥湯治鼻衄吐血黃芩芍藥甘草上水煎服湯氏地黃湯治營中熱及肺壅鼻血生瘡一切丹毒生地黃赤芍當歸川芎各等分上水煎服量大小加減如鼻衄臨熟入生蒲黃少許生瘡加黃耆等分丹毒加防風等分三因白芨散治鼻衄白芨不以多少上為末冷水調貼鼻竅中泉按時珍曰白芨性澀而收得秋金之令故能入肺止血生肌治瘡也小柴胡湯傷寒證衄者依本方加生地準繩膠黃散治小兒大衄口鼻耳出血不止十五六歲兒陽盛多此病阿膠一兩蒲黃半兩上為末三歲兒半錢生地黃汁微煎調下泉按口鼻耳皆出血者難治之症也丹臺玉案云耳目口鼻一齊逆流藥不及煎針不及下死在頃刻間此猶血症之至極者也醫者豈可無急治之法七五小便不通小兒小便不通者皆因心經不順或伏熱或驚起心火上炎不能降濟腎水不上升故使心經愈熱而小腸與心合所以小便不通也回春神通散治小兒小便緊急不通或去血小便閉澀不堪言為用兒茶末一錢萹蓄煎湯來送下霎時溲便湧如泉袖珍木通散湯氏方治小兒心經伏熱小便不通木通一兩牽牛半兩滑石一兩上為末燈心蔥白煎服醫統梔子仁散湯氏方治小兒小便不通臍腹妨悶心神煩躁梔子五枚茅根冬葵子各半兩甘草炙一分上水煎服袖珍勻氣散治小兒脾肺氣逆喘嗽面浮胸膈痞悶小便不利桑白皮一兩陳皮一兩半桔梗一兩炒甘草炙一兩藿香半兩木通四兩赤茯苓一兩上水煎服保元治小兒小便不通腹脹欲死野地蒺藜子上一品不拘多少焙黃色為末溫酒服立通保元又方用火麻燒灰酒調下東井治小兒小便不通肚腹膨脹滑石上為末和蜜為餅敷臍中陳藏器一方治小兒卒不尿用炒鹽裹帛臍上下及肚臍尉之暫時通來局方五苓散治小兒小便不通豬苓澤瀉茯苓白朮各等分官桂減半上水煎服加車前子燈心尤妙阮元一方大田螺十五個上新水養候螺中出泥澄去上清水以底下泥入膩粉調塗臍上尿即通將田螺放長流水中若殺之病不得愈錢氏捻頭散治小便不通玄胡苦楝子各等分上為細末每服半錢捻頭湯調下量多少與之捻頭湯即湯中滴油數點食前服按因汙血而小便閉者宜此準繩五淋散治熱結膀胱而不利者薛氏補中益氣湯肺虛而短少者本方加山藥麥門藥性一方小兒不尿安鹽於臍中以艾灸之七六大便不通小兒大便不通者臟腑有熱也醫鑑萬億丸治小兒大便不通其驗如神硃砂巴豆寒食麵上先將硃砂研爛即將巴豆同研極細卻以寒食麵好酒打成糕入藥汁仍同研再餘下再揉和為丸如黍米大每服一二丸茶清下回春沒藥散治小兒風與熱滯留蓄上焦胸膈高起大便不通沒藥大黃枳殼桔梗各二錢木香甘草炙各一錢上入薑水煎服家傳藿香正氣散延壽院曰小兒風氣大便祕依本方加枳殼家傳錢氏白朮散半井翁曰小兒稟弱或癖積鬱熱大便艱難加枳殼黃芩百問四順清涼散通順大腸令無壅閉赤芍當歸甘草大黃各等分上水煎七七大小便閉小兒初生大小便不通腹脹欲死急令人以溫水漱口淨口吸咂兒前後心並臍下手足心共七處每一處凡三五次漱口吸咂取紅赤為度須臾自通不爾則無生意經驗治小兒大小便不通用老蘿蔔頭煎湯冷服即通大全八正散局方治小兒心經積熱大小便祕大黃瞿麥木通滑石萹蓄山梔車前子甘草上入燈心水煎服保元治新生小兒二三日不大小便用蔥汁人乳各半調勻抹在口中同乳帶下即通回春掩臍法治小兒大小便不通取連根蔥白一莖生薑一塊淡豆豉二十粒鹽一小匙同研爛捏作餅子貼臍中烘熱貼之用絹帛扎定良久氣透自然通不通再易一餅百問大連翹湯治二便閉結方見諸熱門準繩惠眼芍藥散治大小便下藥不通者芍藥大黃甘草炙當歸朴硝各一分上為末水煎服即通七八腫脹丹溪云脾虛不能制水腎虛不能行水胃與脾合為水穀之海因脾虛而不能傳化腎水泛濫反得以浸漬脾土於是三焦停滯經絡壅塞水滲於皮膚注於肌肉而發腫也其狀自目胞下微起肢體重著咳嗽怔忡股間清冷小便澀黃皮薄而光手按成凹舉手即滿是也諸家只知治濕多利小便之説執此一途用諸利水之藥往往多死殊不知脾極虛損雖劫目前水氣復來束手待斃大都小兒尤是飲食傷脾不能行水而作脹滿只用實脾為主佐之分證治而得之矣局方藿香正氣散半井春蘭子祿驗書云小兒水腫腹脹用之有數功濟世實脾散治小兒陰水發腫用此先實脾土厚朴白朮木瓜木香乾薑煨各一兩草果仁大腹附子茯苓甘草炙各半兩上入薑棗水煎服按水氣肢體浮腫口不渴大便不祕小便不澀者陰水也此方主之名曰實脾散者實土以防水也雖其藥味不皆實土然能去其邪乃所以使脾氣之自實也丹溪加味五皮散治小兒四肢腫滿陽水陰水皆可服之茯苓皮陳皮桑白皮生薑皮大腹皮各一錢薑黃木瓜五分上水煎服經驗大橘皮湯治濕熱內攻腹脹水腫小便不利大便滑泄陳皮一兩半木香二錢半滑石一兩檳榔三錢茯苓一兩豬苓白朮澤瀉肉桂各半兩甘草一錢上水煎服按竹氣治濕熱利水道之劑此蓋五苓散合益元散加陳皮木香檳榔子醫統三稜丸治小兒停積腹脅脹滿乾嘔噁心全不入食三稜木香神麯陳皮半夏各一兩丁香桂心各半兩上為末麵糊丸粟米大乳食後薑湯下十餘丸醫鑑加減胃苓湯半井翁云小兒水腫用之最有奇功陳皮豬苓澤瀉茯苓木瓜白朮各一錢厚朴神麯檳榔各八分香附子大腹山楂砂仁各七分蒼朮二錢半甘草炙二分上入生薑燈心水煎服醫林五苓散治小兒通身浮腫小便不利豬苓澤瀉白朮茯苓桂上入燈心長流水煎時時灌服小便利則愈醫統溫肝散治小兒脾不和虛脹不乳食憎寒壯熱困倦無力訶子人參各七錢半甘草二錢半炙白朮木香茯苓黃耆藿香陳皮桔梗各半兩上入薑棗水煎服幼幼集補中行濕湯治小兒諸般虛腫小水不利者陳皮人參茯苓白朮豬苓肉桂澤瀉蒼朮厚朴甘草上薑燈心水煎服泉按丹溪云諸濕腫脹補中宮故補中行濕治腫滿之要法也御藥勻氣散治脾肺氣逆喘嗽面浮小便不利陳皮七錢桑白皮桔梗赤茯苓甘草各半兩藿香三錢木通二兩上入薑燈心水煎服全幼營衛飲子治嬰孩小兒調補氣血俱虛四肢頭面手足浮腫以致喘急當歸熟地人參茯苓川芎白朮甘草芍藥枳殼陳皮黃耆蜜炙各二錢上水煎服全幼分氣飲子治嬰孩小兒調理腫脹作喘氣短促急坐臥不任四肢浮腫飲食吐逆神困喜睡五味子桔梗茯苓甘草陳皮桑白皮草果枳殼大腹白朮當歸紫蘇蘇子半夏上入薑棗水煎服一方無五味子當歸白朮丹溪白文舉兒五歲身面皆腫尿少山梔炒桑皮炒各一錢黃芩二錢半白朮蘇梗各一錢半上作三貼水一盞半煎至半盞食前溫服湯氏退腫氣方赤小豆陳皮蘿蔔子甘草炙各半兩木香炮一錢上入薑棗煎服大小加減綱目又方用錢氏益黃散加木香去丁香加蘿蔔子去訶子為末大小加減米飲調下方見泄瀉門七九黃疸錢氏曰凡小兒身皮自皆黃者黃病也身痛髆皆強大小便澀一身皆黃面目指爪皆黃小便如屋塵色著物皆如黃深此黃疸也二證多病於大病後又有一證生下百日及半年不因病後身微黃者胃熱也大人亦同又有面黃腹大食土渴者脾疳也又有自生而身黃者胎疸也經云諸疸皆屬於熱色深黃者是也若淡黃者兼白胃怯胃不和也丹溪云不必分五同是濕熱如𨠭曲相似此理甚明也全嬰方論云夫發黃者皆由寒濕之氣蘊結於脾胃蒸發而成也陽明病無汗小便不利心中熱壅必發黃巢氏曰小兒百日半歲非傷寒疸病而身微黃者亦是脾胃熱不可灸火灸之則熱甚此是將息過度所為微薄其衣欲與除熱丸散投之自歇不得妄與湯劑及灸為害不淺淺也家傳藿香正氣散小兒黃疸腹脹不食者有神驗也加茵陳醫統茯苓滲濕湯治小兒黃疸寒熱嘔吐渴欲飲水身面俱黃小便不利不得安臥不思飲食茯苓五分澤瀉三分茵陳六分豬苓二錢黃芩黃連梔子防己白朮蒼朮陳皮青皮枳殼各一錢上水煎徐徐溫服龔氏壽世曰如小便不通加木通如傷食不思飲食加砂仁神麯麥芽直訣瀉黃散治小兒黃疸屬脾胃實熱者藿香甘草各七錢半山梔一兩石膏五錢防風二兩上水前服小兒旬日內先兩目發黃漸及遍身用之而痊醫統加減瀉黃散此藥退脾土復腎水降心火黃連茵陳各五分黃蘗黃芩茯苓山梔各三分澤瀉二分上水煎服圖經一方治小兒四歲發黃王瓜生搗絞汁三合與飲不過三飲已子母一方治小兒患黃搗韭根汁滴兒鼻中如大豆許薛氏錢氏白朮散小兒病後身目皆黃或肢體黃胖者脾氣虧損而真藏為病半井祕傳一本加茵陳小兒黃疸用之有奇效云云醫統梔子蘗皮湯治小兒身黃發熱梔子十枚甘草炙一兩黃蘗一兩上水煎服丹溪一方治小兒吐瀉黃疸三稜莪朮青皮陳皮神麯麥芽黃連甘草白朮茯苓各等分為末上每服一錢溫湯調服傷乳者麥芽湯調時氣用紫蘇湯發熱者薄荷湯茵陳五苓散沸湯調服薛氏越麴丸小兒因母食鬱飽脹咽酸而患遍身皆黃用此治其母以瀉黃散治其子並愈蒼朮神麯香附子山楂山梔川芎麥芽上為末水調神麯糊丸桐子大每服二三十丸白滾湯下子母一方治小兒忽發黃面目皮肉並黃搗生栝蔞根取汁二合蜜一大匙二味暖相和分作二服與服之綱目犀角散治小兒黃疸一身盡黃犀角一兩茵陳乾葛升麻龍膽草生地黃各半兩寒水石四錢上水煎服一方治小兒忽發黃面目皮肉盡干黃以乾葛汁和蜜調服袖珍方無干葛用瓜蔞總微論一方治小兒黃疸胡黃連川黃連各一兩上末用王瓜一個去瓤留蓋入藥在內合定麵裹煨熟去面搗丸緑豆大每量大小溫水下八汗症夫小兒氣血嫩弱膚腠未密若厚衣太暖臟腑生熱搏心為邪所勝津液不能內藏蒸出肌膚而為汗也又或傷於冷熱陰陽不知津液發泄亦令睡中汗出其有虛者諸病後汗出多血氣弱潮熱自汗或寒熱發過之後身涼自汗日久令兒黃瘦失治則變蒸骨疳癆是也盜汗乃熟睡時溱溱然汗以覺則止而不復出矣是亦心虛宜斂心氣益腎水使陰陽調和水火升降其汗自止錢氏云上至頭下至項謂之六陽虛汗不須治之孫尚藥柴胡丸治小兒盜汗潮熱往來胡黃連柴胡各等分上為細末煉蜜為丸如雞頭子大每一丸至三丸銀器中用酒少許化開更入水五分重湯煮二三十沸放溫食後和渣服直訣止汗散治小兒睡而自汗胡蒲扇燒上為末每服三錢溫酒調下全幼團參湯治嬰孩小兒虛汗盜汗心血液盛亦發為汗收斂心氣人參當歸炒各二錢上用豬心一片水煎一方加黃耆蜜炙醫統牡蠣散治血虛自汗或病後暴虛津液不固自汗牡蠣二兩黃耆生地各一兩上入小麥麻黃根水煎服醫統三稜散小兒無疾但睡中汗出如水覺而經久不幹此名積證盜汗脾冷所致宜此益黃散主之三稜莪朮各一兩益智甘草神麯麥芽陳皮各半兩上水煎服醫林人參黃耆湯治小兒發熱自汗虛煩人參黃耆芍藥各五錢甘草三錢上入薑棗浮麥水煎服醫統酸棗參苓飲治小兒盜汗人參茯苓酸棗仁上為末每服二錢米飲下或水煎服保元治小兒盜汗五倍子上為末調津液塗臍中一宿即止保元又方用何首烏為末調津液塗臍內醫統通神丸治小兒夜間遍身多汗龍膽草不拘多少上為末醋糊丸緑豆大每服五七丸米飲下醫林益黃散治小兒汗上至頭下至臍此胃虛也方見泄瀉門直訣六君子湯薛氏曰小兒汗胃氣虛者宜此全幼止汗散人參白朮茯苓黃耆當歸甘草炙上用生薑三片入麥麩同煎食前服全幼撲汗方牡蠣麻黃根赤石脂糯米粉貝母上極末綿包藥撲汗薛鎧一方治小兒胃氣虛而汗白朮炒上為末以浮麥炒濃煎湯調服全幼曰白朮五錢小麥一撮煮水乾去麥白尤杵極細末用黃耆煎湯食前服濟世一方治小兒盜汗鬱金上為末塗兩乳下立效東井曰牡蠣末加之甚妙方老撲粉汗出多不止以此粉撲之龍骨牡蠣糯米上為末吳昆曰龍骨牡蠣之澀以固脫入糯米者取其黏膩雲爾乃衛外之兵也直訣參附湯治稟賦不足上氣喘急自汗盜汗或病久陽氣脫陷急宜服之人參五錢附子一兩上每一錢薑水煎直訣耆附湯治稟賦氣虛陽弱自汗不止肢體倦怠或大病後陽氣虧損並急服之多有生者黃耆蜜炙附子等分上薑水煎八一解顱小兒解顱頭縫不合也因母氣虛與熱多也錢氏云生下而顱不合腎氣未成也雖長必少笑更有目白睛多面㿠白色肢體消瘦多愁少喜也丹溪八珍湯治小兒解顱有熱加酒炒芩連外用布帛緊束及以白蘞末敷之薛氏補中益氣湯治小兒囟門不合依本方加山茱萸山藥兼六味丸加鹿茸服簡要治小兒解顱不和顱蹄不計多少燒灰研以生油和傅於頭骨縫上以痊為度簡要一方治小兒解顱不合生蟹足骨半兩焙乾白蘞半兩上為末用乳汁和貼縫骨上以痊為度準繩調元散主稟受元氣不足顱囟開解肌肉消瘦腹大如腫致語遲行遲手足如分筒神昏慢齒生遲服之效方見行遲門無擇三辛散治小兒頭顱應合不合頭骨開名曰解顱細辛桂心各五分白薑七錢半上為末乳汁調敷干再敷之小兒面赤即效回春人參地黃丸治小兒顱囟開解頭縫不合此乃腎氣不成腎主骨髓而腦為髓海腎氣不盛所以腦髓不足故不能合人參二錢熟地四錢鹿茸山藥茯苓牡丹山茱萸各二錢上為細末煉蜜丸芡實大用人參煎湯研化食遠服百問柏子仁散治小兒囟門不合防風柏子仁上等分為末乳汁調塗囟門上養生方一方小兒解顱防風白芨柏子仁各等分上為末以乳汁調塗一日一換八二鶴膝小兒稟受不足氣血不充故肌肉瘦薄骨節呈露狀如鶴膝抑亦腎虛得之腎虛則精髓內耗層革不榮易為邪氣所襲日就枯悴其殆鶴膝之節乎醫統加味地黃丸治小兒鶴膝熟地四兩山茱萸山藥各二兩澤瀉一兩牡丹皮茯苓各半兩鹿茸酥炙牛膝各三錢上為末麵糊丸如黍米大三歲兒已上與十五丸一方加當歸局方大防風湯治鶴膝風腫痛不消或潰而不斂牛膝酒炒附子炮甘草各一錢白朮羌活人參防風各二錢杜仲川芎肉桂黃耆熟地黃芍藥炒各一錢半上水煎量兒大小用之八三行遲小兒行遲者因稟受肝腎氣虛肝主筋腎主骨肝藏血腎藏精血不足則筋不營精不足骨不立故不能行也回春錢氏地黃丸治肝腎虛弱骨髓不充不能行依本方加酒炙鹿茸牛膝五加皮同服自然髓生而骨強即能漸漸行也醫林五加皮散治小兒四五歲不能行五加皮一兩牛膝木瓜各五錢上為末每服二錢空心米湯下日二服服後再用好酒半盞與兒飲仍量兒大小醫統虎骨丸治小兒腳軟行遲虎脛骨酥炙生地酸棗仁茯苓防風川芎牛膝肉桂當歸上為末煉蜜丸如麻子大每服十丸酒送下或木瓜湯下準繩調元散治小兒稟受元氣不足行遲手足如筒山藥五錢茯苓白芍茯神各二錢半白朮二錢半菖蒲一錢人參熟地當歸黃耆川芎各二錢半甘草炙一錢半上入薑棗水煎服嬰兒乳母同服袖珍羚羊角丸錢氏方治小兒五六歲骨氣虛腳筋弱不能行茯苓酸棗仁羚羊角虎脛骨醋炙生地各五錢黃耆桂心防風當歸各二錢半上為末煉蜜丸如小豆大食前以溫酒化下二三丸服之一月漸漸即可行也醫統五加皮散治小兒三歲不能行五加皮為末以酒服八四語遲巢氏云小兒四五歲不能言心氣不足而不能言也醫林菖蒲丸保幼須知云言心之聲也小兒在胎時其母卒有驚怖邪氣乘心故兒感受母氣心宮不守舌本不通四五歲而不能言者宜此人參石菖麥門冬遠志川芎當歸各三錢乳香辰砂各一錢上為末蜜丸麻子大每服十丸粳米飲下錢氏菖蒲丸治小兒心氣不足五六歲不能言石菖三錢人參五錢丹參三錢天門一兩赤石脂二錢直指有當歸川芎硃砂上為細末煉蜜丸如緑豆大溫水下十丸至二十丸日二三服久服效又有病後腎虛不語宜兼服六味地黃丸海藏云地黃丸足少陰也與葛蒲丸上下通經本草治小兒久不語百舌鳥炙食之百舌鳥今之鶯也名百舌薛氏加味逍遙散薛氏曰乳母五火遺熱閉塞氣道而不語者宜之薛氏七味白朮散小兒病後津液內亡會厭乾涸而不言者宜此薛氏補中益氣湯小兒脾胃虛弱清氣不升而言遲者直訣團參湯小兒心氣虛而不能言語綱目雞頭丸治小兒諸病後不能語雄雞頭炙一錢鳴蟬炙焦三個大黃煨一兩甘草一兩當歸三分木通黃耆各半兩川芎遠志門冬各三分上同為細末煉蜜丸如小豆大平旦米飲下五丸空心日三四服兒大者加之久服取效雞蟬二物宜求死者用之不可旋殺孫真人所謂殺生求生去生更遠矣直訣錢氏云腎怯失音相似病吐瀉及大病後雖有聲而不能語此非失音為腎怯不能上接於陽故也當補腎地黃丸主之失音乃捽病耳口禁不止則失音聲遲亦同明堂五六歲不語者灸心腧三壯八五齒遲聶氏云稟受腎氣不足者則齒生而遲齒骨之餘骨乃腎之候腎不足故骨不長而齒生遲丹溪芎黃散治小兒齒生遲或齒嚼物少力川芎生地山藥當歸芍藥炒甘草各等分上各別為末每服二錢白湯調下將此干藥末擦牙齦即生按醫林此方加沉香入門腎氣丸主齒遲因稟氣不足則髓不能充骨或十全大補湯加黃柏知母全幼三香檳榔圓治嬰孩小兒稟受腎氣不足腎主骨髓髓不充於齒故齒不生香附炒沉香各二錢檳榔人參蝦蟆燒灰各二錢半麝香少上為細末羊髓煮爛丸如黍米大用米飲食後服八六發遲本事方兒稟受血氣不足不能榮於發故頭髮不生或者呼之為疳病胙也入門蓯蓉丸小兒發遲乃血氣不能二束蓯蓉川芎當歸熟地芍藥各等分胡粉減半上為極細末蜜丸如黍米大每服五六丸黑豆煎湯下仍磨化抹頭上湯氏香粉膏治小兒白禿不生髮燥痛香薷一兩胡粉五分豬脂二錢半上用水一小鐘煎香薷取汁三分入胡粉豬脂調勻頭上塗一日三次肘後治小兒頭上白禿發不生用椿楸樹葉心取汁傅之大效永類一方治小兒發遲陳香薷二兩上水一盞煎汁三分入豬脂半兩和勻日日塗之八七龜胸龜胸乃胸高脹滿其狀如龜此肺經受熱所致蓋因乳母酒面無度或夏月熱煩熱乳與兒得之或乳母多食五辛亦成此疾醫林百合丹治小兒龜胸大黃焙七錢半天門杏仁百合木通桑白皮甜葶藶軟石膏各五錢上為末煉蜜丸緑豆大每服五丸食後臨臥熟水下正傳瀉白散治肺熱脹滿攻於胸膈成龜胸桑白皮一錢地骨皮一錢甘草炙五分加黃芩一錢上水煎服丹溪治小兒龜胸蒼朮黃柏酒炒芍藥飛炒防風山楂威靈仙加當歸又利後加生地上為末煉蜜丸食後溫水下八八龜背聖惠論云龜背者小兒初生未滿半周強令早坐遂使客風吹背故令背高如龜之狀入門松蕊丹主龜背客風吹脊入於骨髓松花枳殼防風獨活各一兩麻黃前胡大黃桂心各五錢上為末煉蜜丸黍米大每十丸粥飲下醫統枳殼防風丸治客風入背而高聳枳殼防風獨活前胡麻黃當歸大黃煨各一錢上為末麵糊丸黍米大食後米飲下百問龜胸丸治小兒龜胸龜背大黃煨一錢天門冬百合杏仁炒木通枳殼桑白皮蜜炙甜葶藶炒朴硝各五分上為細末煉蜜丸如芡實大每用一丸溫湯化服八九囟陷囟陷乃因臟腑有熱渴引水漿致成泄痢久則血氣虛弱不能充腦髓故囟陷如坑百問當歸散治小兒囟門陷下甘草炙半錢桔梗陳皮當歸各一錢上水煎服本草一方治小兒囟陷半夏末水調塗足心準繩烏附膏理囟門陷綿川烏生綿附子生各五錢雄黃二錢上件為末用生蔥和根葉細切爛杵入煎藥同煎空心作成膏貼陷處聖惠一方以天靈蓋炙令黃搗羅為末以生油調塗九囟填囟填乃囟門腫起也蓋脾主肌肉乳食不常飢飽無度或寒或熱致使臟腑不調其氣上衝為填脹囟突而毫毛髮短黃若寒氣上逆則堅硬熱氣上衝則柔軟寒者溫之熱者涼之肝盛風熱交攻亦然入門瀉青丸治小兒肝盛風熱交攻以致囟填突起者龍膽草三錢當歸川芎山梔大黃羌活防風各五分為末蜜丸芡實大每一二丸竹葉薄荷煎湯化下普濟一方治小兒生下囟腫者黃蘗末水調貼足心九一手拳不展醫林薏苡仁丸治小兒稟受肝氣怯弱致兩手伸展無力兩膝攣縮當歸秦艽薏苡仁酸棗仁防己羌活各一兩上為末煉蜜丸芡實大每一丸麝香荊芥湯下聖惠薏苡仁散治兒有胞母臟腑虛為風冷所乘兒生肝氣不足致筋脈攣縮不得伸展薏苡仁七錢五分秦艽防風酸棗仁炒甘草微炙赤各半兩當歸焙桂心各二錢半為散每一錢水一小盞煎五分不計時候量兒加減準繩羚羊角散治兒手不展是風邪滯氣所客令營衛不通羚羊角羌活五加皮白蘚皮桂心各二錢半麻黃半兩甘草炙一錢二分半上為散一錢水煎量兒加減九二腳拳不展醫林海桐皮散治稟受腎氣不足血氣未營腳指拳縮不能伸展海桐皮牡丹當歸熟地牛膝酒浸各一兩山茱萸補骨脂各五錢上為末每服一錢白湯下聖惠當歸散治兒在胞母臟腑有積冷為風邪所乘生後腎氣不足血未營故腳指拳縮不展當歸焙麻黃各半兩羌活酸棗微炒人參杜仲微炒桂心各二錢半上薑水煎量兒大小乳前服九三白虎小兒有白虎一病不可不察據統天曆遊年圖云白虎在太歲前一辰也假如太歲在巳則為白虎在辰大歲在申則為白虎在未余仿此其神所值之方小兒不知禁忌出入居處稍有觸冒便能為病其壯身微熱有時少冷啼叫屈指為數物手足不瘛瘲是也醫統集香散治白虎病降真香沉香乳香檀香人參安息香茯神甘草炙酸棗仁上等分水煎射一字調入不拘時服藥渣房內燒九四魃病魃小鬼者小兒所以有魃病因其母未及周年即有胎孕小兒乳之故曰魃病其證令兒寒熱黃瘦骨空發落日漸羸瘦是也治法速與斷其乳溫平胃氣調和血脈自然而愈醫統龍膽湯治小兒魃病龍膽草鉤藤柴胡桔梗芍藥川芎茯苓甘草炙各一錢人參一分大黃蒸半錢上水煎服後夜用紅紗袋盛夜明砂與佩之吉醫林龍膽湯治孕婦被惡祟導其腹中致令兒病其證下利寒熱去來又治婦人有兒飲乳復有娠孕兒吃此乳亦作此病龍膽草柴胡黃芩桔梗芍藥鉤藤皮甘草炙茯苓各二錢半蜣蜋二枚大黃二兩煨上水煎服得利則止量兒大小多少與服聖惠治小兒生下十餘月後母又有妊令兒精神不爽身體萎瘁名為魃病伏翼上燒灰細研以粥飲調下半錢日四五服效濟世養真益元膏治小兒魃病虛羸面黃肌瘦體熱人參五錢白朮炒茯苓陳皮麥門山藥各一兩山楂一兩甘草炙五分上為細末火聚蜜丸芡實大每三丸棗湯化下九五諸瘡癬疥經曰諸痛癢瘡瘍皆屬心火小兒臟腑本是火多況有失調外受風寒鬱而為熱內襲母乳五味七情之火發於內者則為內驚發於皮膚之間則為瘡癬癤毒治法當先清其乳母謹忌食味次調和小兒氣血不可峻用攻發之劑當緩以和之得其治道田氏苦瓠散小兒疥癬浸淫瘡漸展不止苦瓠二兩蛇退皮半兩燒灰露蜂房半兩微炒上為細末生油調塗故帛上貼田氏青金散治小兒濕癬浸濕瘡白膠香二兩研蛤粉半兩青黛二錢半上細末乾摻瘡上千金一方小兒癬瘡蛇床子杵末和豬脂塗之濟衆一方小兒浸淫瘡痛不可忍發寒熱者刺薊葉新水調傅瘡上干即易保幼一方小兒疥癬藁本煎湯浴之並以浣衣準繩當歸飲子治小兒心血凝滯內蘊風熱發見皮膚遍身瘡疥或腫或癢或膿水浸淫當歸赤芍川芎生地蒺藜炒荊芥穗防風各一兩何首烏黃耆甘草炙各半兩上銼薑煎服九六眉瘡薛氏曰眉瘡者謂小兒兩眉間生瘡如疥癬當求其因而藥之醫統金銀散小兒眉間生瘡名曰鏈銀瘡煅金銀鍋一個輕粉五分上為細末麻油調傅準繩治眉煉燒小麥存性研細好油調塗九七凍瘡按凍瘡因受稟虛怯故寒邪易乘氣血凝滯久而不愈則潰爛成瘡治法須壯脾胃溫氣血湯氏生附散治爛腳瘡用生附末面水調敷之愈子母治小兒凍瘡萑兒腦髓塗之立效湯氏白蘞散治凍瘡白蘞一兩黃蘗炒黑五錢為末乾摻患處子母一方治足上凍瘡以醋洗足研藕傅之九八湯火瘡肘後治小兒湯火瘡水煮大豆汁塗上易瘥無斑也準繩薛云湯火之證若發熱作渴小便赤澀者內熱也用四物加山梔連翹甘草若肉未死而作痛者熱毒也用四君子加芎歸山梔連翹若肉已死而不潰者氣血虛也用四君加當歸黃耆外傅當歸膏或柏葉末蠟油調搽至白色其肉自生準繩神效當歸膏治湯火等瘡不問已潰未潰肉雖傷而未壞者用之自愈已死者用之自潰新肉易生搽至肉色漸白其毒殆盡生肌最速蓋當歸地黃麻油二蠟皆主生肌止痛補血續筋與新肉相宜當歸生地各一兩麻油四兩黃蠟一兩白者止用五錢上先將當歸地黃入油煎枯去滓將蠟溶化候冷攪勻即成膏矣凡塗患處將細紙蓋之發者癰疽杖瘡潰爛用之尤效凡死肉潰爛將脫止有些須相連者宜用利刀剪去蓋死肉有毒去遲則傷新肉死肉去盡尤宜速貼蓋新肉最畏風寒不可忽也準繩乳香定痛散治損傷一切瘡瘍潰爛疼痛乳香沒藥各五錢滑石一兩冰片一錢上為細末搽患處痛即止準繩治湯火所傷方用黃蜀葵花浸油內以油敷患處或收黃蜀葵花曬乾碾末香油調敷亦可又方用萆麻子肉碾爛入蛤粉等分如干再入香油些少調搽患處九九懸癰小兒初生口內血氣凝結上齶及舌上有泡如癤或如蘆籜樣名曰懸癰一名垂癰凡在此急宜以針用綿纏裹惟留針鋒如粟米許刺皰上泄出黃赤血汁用鹽湯洗用蜜調一字散如聖散鵝翎蘸刷之一刺不消次日再刺不過數次自消盡醫統一字散硃砂硼砂各五分冰片少許上為細末蜜調少許鵝翎刷入口內咽下無妨醫統如聖散真鉛粉一錢牛黃辰砂太陰玄精石上為末摻入口內患處一發斑醫統葛根橘皮湯治小兒發斑癮疹如錦紋嘔吐清汁發熱此冬溫暖小兒感乖戾之氣未即病至春或被積寒所折毒氣不能泄至天氣暄熱溫毒始發也葛根橘皮杏仁麻黃知母黃芩甘草上水煎百問黃連橘皮湯溫毒發熱兼治麻證泄瀉並去血黃連陳皮杏仁枳實麻黃葛根各半兩厚朴甘草炙各錢半上水煎服回春防風通聖散治小兒身常發熱風斑及腳紅常紅腫此脾經風熱也去硝黃加鼠黏子酒炒黃連為末亦用防風白芷薄荷黃連黃芩黃耆黃柏煎湯浴之宜避風準繩玄參升麻湯治癍疹已發未發或身如錦紋甚則煩躁言語喉閉腫痛玄參升麻甘草上水煎服準繩犀角消毒散治癍疹丹毒發熱痛癢及瘡疹等症牛蒡子甘草荊芥防風各五分犀角末二分金銀花三分上水煎熟入犀角傾出服東垣人參安胃散治癍疹因服峻厲之劑脾胃虛熱泄瀉嘔吐飲食少思等證人參一錢黃耆炒二錢生甘草炙甘草各五分白芍酒炒七分白茯苓四分陳皮三分黃連炒二分上為末水煎服一一癰毒腫節小兒癰毒腫節者皆因血氣凝滯而有熱毒之氣乘之故結聚成癰節腫毒也始初微見頭紅㿔起痛者急用不語唾夜半頻頻塗之即消如不退用萬病解毒丸磨塗並服立效若已成當用天烏散貼凡小兒諸癰瘡毒皆可服漏蘆湯熱甚者解毒丸四順清涼飲加防風連翹玄參之劑五福化毒丹連翹湯之類醫統天烏散塗一切腫毒天南星草烏赤小豆黃蘗各等分上為末生薑自然汁調貼患處或用米醋亦佳醫統解毒丸治小兒一切瘡腫毒節丹毒赤遊腫玄參連翹升麻黃芩芍藥各三錢當歸羌活防風生地荊芥甘草各一錢上煉蜜丸如雞頭子大以青黛為衣燈心薄荷湯下局方五福化毒丹治小兒蘊積熱毒口舌生瘡身體多疥玄參桔梗各半兩茯苓二兩人參牙硝青黛各半兩甘草七錢麝香一字金銀箔十片上為末煉蜜丸芡實大一歲兒服一丸分四服薄荷湯化下及治痘疹後痘毒上攻口齒涎血臭氣仍以雞翎掃藥於口內醫統玄參散解諸熱消瘡毒玄參生地各一兩大黃半兩煨上為末煉蜜丸燈心淡竹葉湯下或入砂糖少許有加防風羌活赤芍連翹醫統漏蘆湯治小兒癰瘡及丹毒瘡節漏蘆麻黃連翹升麻黃芩甘草芒硝各二錢大黃一兩白蘞十錢上水煎服量兒大小加減準繩神效解毒散治一切瘡毒初起腫者即消已潰仍腫者即散巳潰毒不解者即愈金銀花一兩甘草節五錢黃耆皂角刺炒當歸各三錢乳香沒藥各二錢上為散每服二錢酒煎溫酒調服亦可嬰兒病乳母亦服如瘡已潰腫痛已止者去乳沒金銀花倍加黃耆甘草直訣仙方活命散治一切瘡毒未成內消已成即潰此消毒排膿止痛之聖藥也若膿出而腫痛不止者元氣虛也當補之穿山甲白芷防風沒藥甘草赤芍當歸尾乳香天花粉貝母各一錢金銀花陳皮各三錢皂角刺一錢上每服二三錢酒水各半煎一二瘰癧小兒瘰癧是臟腑久伏積熱而頸項筋宛之中及項下有核如梅李初生漸次而多謂之瘰癧瘰癧者結核是也或在耳後或在耳前或在耳下連及頤項或在頸下連鈌盆皆謂瘰癧或胸前及胸側或在兩脅是為馬刀瘡手足少陽經主之醫統散癧湯治小兒結核成癧先用此方連翹桔梗梢甘草稍天花粉貝母黃柏大黃玄參青皮赤芍各等分上入燈心二十根水煎服準繩玄參飲治瘰癧及頭上生惡核腫痛玄參升麻各五錢川烏草烏當歸川芎赤葛生乾地黃赤芍各二錢半甘草三錢大黃半生半炮四錢上銼薑水煎溫服醫統白芨散治瘰癧已潰膿汁出不幹白芨貝母各半兩輕粉一錢上為細末先以檞皮洗過後用清油調傅醫統檞皮散小兒瘰癧痛以此洗之檞皮去粗皮此木在處有之即包益檞萊木是也上不拘多少切碎水煎溫湯頻洗醫統柴胡通經湯治小兒項側有核堅而不潰名曰馬刀柴胡歸尾桔梗生甘草連翹三稜鼠黏子黃芩黃連各五錢紅花少許上水煎服其餘瘰癧治法與大人同惟在量其大小虛實加減耳一三滯頤小兒滯頤者多涎流出而漬於頤間也此由脾胃冷涎多故也脾之液為涎緣脾胃虛冷不能制其津液故流出於頤法當溫脾按湯氏此論未詳也何者內經曰舌縱涎下皆屬熱然湯氏言脾胃虛冷此恐一偏見也故生生子曰此症亦有脾熱者但清其熱則涎自不泛上寒熱二字人看其面色審其兼症問其二便庶治不偏百問溫胃散治滯頤者涎流出積於頤上此由脾冷涎多故也半夏人參肉豆蔻白朮乾薑甘草各半兩丁香一兩上每服二錢生薑三片煎服錢氏益黃散治小兒滯頭泉按名醫方考曰滯頤者頤額之下多涎滯也皆土弱不能制水之象火能生土故用丁香甘能補土故用甘草香能快脾故用陳皮澀能去滑故用訶子用青皮者謂其快膈平肝能抑其所不勝爾入門木香半夏丸冷涎自流者乃胃虛不能收約也木香半夏丁香各五錢白薑白朮青皮陳皮各二錢半上為末蒸餅丸麻子大一歲十丸二歲倍之米湯灌下準繩金朱丹治脾熱多涎金箔二十片硃砂水飛半夏天南星各一兩石膏茯苓各半兩上為末生薑汁丸如黍米大每服十粒人參煎湯下乳後入門通心飲熱涎稠黏者乃胃火炎上也木通連翹瞿麥山梔子黃芩甘草各三分麥門上入燈心水煎服清解散因脾熱滯頤者白朮白滑石各五分甘草一錢黃連酒炒二錢扁豆炒茯苓各三錢葛根一錢半石斛三錢上為末每服一錢燈心湯調下家藏錢氏白朮散龜溪道三先生曰小兒滯頤用此湯加升麻綱目清心導痰丸治小兒舌縱涎下多唾甚妙也白附子一兩南星薑汁二兩半夏二兩黃連炒七錢半天花粉一兩白薑蠶炒去絲嘴半兩川烏鹽制二錢鬱金七錢半天麻羌活各半兩上為末薑汁糊為丸如梧桐子大每服五七丸用通天愈風湯吞下薛己六君子湯小兒口角流涎或痰氣壅盛脾不能攝也聖濟一方治小兒流涎皂莢子仁半夏一錢二分上為末薑汁丸麻子大每溫水下五丸直訣蕪荑散治蟲動口內流涎白蕪荑乾漆炒各等分上為末每服五六分米飲下一四痘瘡痘瘡之由因兒在胎食母五臟血穢伏於命門或至天行時氣或郁駭跌撲或飲食所傷因而發之狀類傷寒其症燥腮赤目胞亦赤呵欠頓悶乍涼乍熱咳嗽嚏噴足稍冷耳冷尻冷多睡驚耳後有紅絲赤脈此其候也五臟各具一症肝藏水疱肺臟膿疱心臟班脾臟疹歸腎變黑丹溪曰虛者益之實者損之寒者溫之熱者清之此治痘之大要也舍是四者無治法矣又發熱之初急宜表散要在表熱盡退為佳既出之後隨證溫涼務在解肌消毒調氣活血使營衛和暢則無塵滯陷伏之患又必謹避風寒戒絶房事調節飲食禁止穢氣自然獲吉矣三因三豆湯凡值天時不正鄉鄰痘瘡預服之則不發赤小豆黑豆緑豆各一兩甘草半兩上水煎熟逐日任意吃豆飲汁七日其瘡自然不發也春抱按龔居中曰黑豆解腎經毒制相火也赤小豆解心經毒制君火也緑豆解陽明經毒制胃火也龔雲林曰誠此能活血解毒則不染也用豆者又以形治以類從也易簡而便理胃開食治於童稚其為神巧矣乎或曰古人方書往往有食療而存矣然當時鄙之鮮有用之者乎子於此書間舉之者有何補矣春曰世醫以食療鄙之者此庸淺之俗醫也故李南豐曰人知藥之藥人而不知食之藥人矣孫真人曰醫者先曉病源知其所犯以食治之食療不愈然後命藥也豈食療可絶廢乎濟世升麻葛根湯治時行瘟疫頭痛發熱肢體煩痛痘疹未發疑似之間宜服一見苗不可服慎之升麻葛根白芍甘草上水煎服痘出不快清便自調者乃邪在表也當本方微發散若痘出太稠密加人參當歸木香紫草大力子防風桔梗若痘出自利加條芩若痘出腹痛加木香青皮枳殼楂若痘出腰痛加獨活細辛若痘出頭痛加羌活藁本蔓荊子若痘出驚搐加木通安心生地黃生血寧心燈心清心熱痘出衄血加山梔玄參乃樞機之劑管領諸氣上下肅清而瀉無根之火為聖藥生地黃痘出眼痛加蜜蒙花柴胡明目益精龍龍膽草治兩目赤腫睛脹瘀肉高起痛不可忍也痘出咽痛加桔梗連翹若手足痘不起脾胃不足也加防風官桂人參黃耆若痘泄瀉者裡虛也加白朮人參茯苓痘後遍身瘡癬如疥如癩膿血浸淫皮膚潰爛日久不瘳此毒氣深漫散於皮膚此方主之按此發表出痘疹之劑也藥品皆輕薄傷寒傷風痘疹之間宜用此方山甫曰表熱壯盛此邪實於表也經曰輕可以去實故用升麻葛根以疏表甘草佐之可以和在表之氣芍藥佐之可以和在表之營去其實邪和其營衛風寒則解痘疹則出誠初間之良劑也又按此方錢氏所制也保赤全書曰或痘已出表熱甚者亦宜此湯又曰以本方加紫蘇箏尖各五分山楂牛子各一錢冬加麻黃一錢服之痘易出易斂又按凡見紅點則禁後服者恐一偏見歟師曰此蓋為痘疏毒少者言不達立言之旨處謂凡痘才見紅點真不可服殊不知四味乃發表解毒疏通氣血升降陽之劑痘太密正宜常服以解之令陷者升之燥者潤之郁者疏之過者平之陰精不衰而陽毒不亢也苟謂痘疏毒少者雖他藥不可服況此湯乎醫御參蘇飲治小兒發憎寒咳嗽或過天時或感風寒異氣痘疹疑似之間最宜服此發散紫蘇陳皮半夏茯苓乾葛桔梗各一錢甘草五分人參七分上水煎服按保赤全書曰加山楂最妙冬加麻黃也此方亦發熱疑似之間可用之山甫曰風寒客於外故用紫蘇乾葛以發表痰嗽壅於內故用半夏前胡桔梗陳皮茯苓以安里邪去之後中外必虛人參甘草急固其虛此則表和而痘易出里和而氣不虛表裡無失斯良劑也醫御惺惺散治小兒風寒時氣發熱必作痘疹宜服此人參白朮茯苓桔梗細辛天花粉甘草各等分上每服一錢水一盞薄荷葉同煎三分去滓服要和氣入薑煎山甫加芍藥山甫曰發熱之初未明是痘形體怯弱者此方主之人參白朮茯苓甘草防其虛也乃細辛桔梗所以疏其陽天花粉白芍所以和其陰醫御敗毒散治痘瘡壯熱已出未快咽喉腫痛胸膈不利人參桔梗甘草柴胡荊芥防風陳皮各等分牛子加倍上為粗末每服一錢水一盞煎四分去滓食後溫服按保赤全書方升麻乾葛紫蘇川芎羌活防風荊芥前胡薄荷桔梗枳殼牛蒡子蟬蛻山楂地骨皮甘草十六味也又方無葛根加紫蘇上薑水煎服初熱壯盛等症宜此保赤蘇解散治痘初壯熱頭痛或腰痛腹痛作脹一切熱毒甚者紫蘇乾葛防風荊芥白芷蟬蛻紫草升麻牛子木通甘草上水煎服保赤紫草化毒湯痘已出未出熱壅不快並宜服之紫蘇二錢陳皮一錢升麻甘草各五分上水煎服小便赤加木通山甫曰紫草活竅利血化毒陳皮快膈消痰利氣升麻消風發散瘡痍甘草補虛和中解熱木通之加為導熱邪由溺而泄肅壽世消毒飲痘瘡欲出已出熱尚未解毒氣太盛稠密成片急進此三四服快透消毒如神專治內蘊邪熱咽喉不利痰涎壅嗽眼目赤臉腫腮項結核腫壅毒聚遍身風疹痹毒赤痛等症牛蒡子微炒四錢荊芥甘草各一錢防風半錢上水煎服一方加黃芩一錢犀角五分按上方出和劑局方而無防風醫學正傳方有防風犀角李氏入門有防風升麻犀角黃芩而名犀角消毒飲山甫曰咽喉腫痛膈上熱盛者此方主之牛蒡子疏喉中風壅之痰荊芥清膈間風壅熱生甘草緩喉中風壅之氣乃防風者散諸風不去之邪也玉案鼠黏子湯治痘疹稠密身熱等症鼠黏子當歸甘草柴胡連翹黃芩黃耆地骨皮各等分上水煎服回春神功散治痘出毒氣太盛血紅一片不分地界如蚊蠶種或諸失血或吐瀉七日以前之諸症可服解毒黃耆人參白芍紫草紅花生地黃牛子各等分前胡甘草減半上水煎服熱甚者加黃芩黃連各二錢未退者加大黃有驚加蟬蛻一個保赤清地退火湯治痘不退熱而出名為火里苗急用此方以退其熱則後無青黑干陷之患地骨一錢地膚子九分牛子七分柴胡一錢五分紫草八分用糯米一撮制過葛根八分連翹六分當歸五分木通三分蟬蛻二分上薑水煎服保赤連翹升麻湯治痘一發密如針頭形勢重者輕其表而涼其內連翹升麻黃芩葛根各一錢麥門二錢上水煎服按上方此膀胱胃經藥也保赤化毒湯治痘已出未愈熱毒解毒清熱涼血毒一解不致黑陷血一涼不致紅紫紫草升麻甘草蟬蛻地骨皮黃芩酒炒又加木通上各等分水煎服保赤如聖湯治痘已出未愈身熱如火紫草升麻乾葛白芍甘草木通猴梨上各等分水煎服心煩加麥門赤苓煩渴加人參五味子麥門七八九月身如火者加酒炒黃芩地骨皮保赤涼血解毒湯治痘出未曾退熱紅不分地或痘苗乾枯黑陷急用此方可起脹貫漿紫草一錢生地八分赤芍三分紅花二分蘇木三分防風三分荊芥三分黃連三分牛子四分天麻二分柴胡八分木通三分牡丹皮七分甘草二分上薑一片燈心二十根糯米一撮水煎服保赤大保元湯治頂陷根窩雖紅而皮軟且薄血有餘而氣不足也黃耆三錢人參一錢五分甘草二錢川芎一錢官桂一分白朮炒一錢上薑棗水煎服準繩十神解毒湯專治身發壯熱腮紅臉赤毛焦色枯已出未出二日以前痘點煩紅燥渴欲飲睡臥不安小便赤澀者此熱盛故也當歸生地黃紅花牡丹皮赤芍桔梗木通腹皮連翹川芎燈心水煎服此方得安表和中解毒三法盡善誠痘科之神方也丹溪云熱者清之實者平之其此方之謂歟毒盛綿密加荊芥牛蒡渴加天花粉竹葉滑石小便尿血加犀角梔子吐血乾嘔加犀角黃連發紅斑加犀角黃芩黃蘗山梔子玄參小便溢加豬苓澤瀉小便祕加滑石瞿麥大便祕加枳實前胡煩躁加麥門冬天花粉煩渴狂亂譫語加知母石膏麥門冬嘔吐加豬苓澤瀉黃連咽喉痛加甘草牛蒡子荊芥泄瀉加澤瀉防風嘔加陳皮保赤解毒防風湯治痘七日後壯熱毒盛氣弱痘出不快及痘出而聲又啞防風五分地骨皮醫學綱目易水先生方也黃耆枳殼芍藥荊芥牛蒡子各二分半上水煎服心法附紫草木香湯治瘡出不快及大便自利紫草木香茯苓白朮各一錢甘草少許上入糯米煎湯春抱按楊氏云紫草能利大便白朮木香佐之又按李氏入門有人參或隱或加藿香心法附疏氣飲治氣實痰鬱發不出者蒼朮白芷防風升麻黃芩芍藥連翹當歸各等分甘草節減半上水煎心法附紫草木通湯治痘出不快醫學綱目海藏王氏方也紫草木通人參茯苓糯米各四分甘草二分上水煎服如大便利者去紫草加木香醫林快透散治痘出不快紫草蟬蛻人參木通白芍甘草上水煎服春抱按此方入門名透肌散一方有升麻吳山甫曰氣弱痘出不盡者此方主之人參甘草能益氣而補中紫草木通能透肌而起痘升麻蟬蛻能退熱而消風乃芍者所以調陰氣而和營衛也正傳五積散天時嚴寒為寒所折不能起發宜散寒溫表冬三月寒甚紅斑初見宜五積正氣散參蘇飲楊氏調解散陳氏木香散白芷川芎各三分桔梗一分半芍藥茯苓甘草炙川歸各錢半肉桂半夏各二分陳皮枳殼麻黃蒼朮各一錢乾薑厚朴薑製各四分上除肉桂枳殼白芷三味另為粗末外一十二味細切漫火炒令轉色攤冷次入三味末令均作一服水一盞半入生薑三片煎至一盞去粗稍熱服正傳辰砂五苓散炎暑隆盛煩渴昏迷瘡出不快五苓散加辰砂細研為末是也上煎生地黃麥門冬調服直訣參耆四聖散治痘瘡已出至六七日不起發不成膿人參黃耆炒白朮炒茯苓當歸芍藥炒川芎各五分紫草木通防風各三分糯米二百粒上作二劑水煎服玉案人參透肌散治虛而有熱雖能出快長不齊整隱於肌膚者人參白朮白苓紫草當歸白芍木通蟬蛻甘草糯米各五分上水煎不拘時服醫統保元湯治痘令其內固外護扶助陽氣則氣旺血附氣血無恙一身之元氣可保而無壞亂矣區區痘毒藉此領載則何難出之有惟其有回生起死之功轉危就安之力故曰保元夫保元湯轉補元氣氣載血血載毒則痘自無內陷而為害者矣人參一錢黃耆二錢甘草五分上水一盞加薑一片煎五分不拘時服血虛而燥大便閉澀加當歸川芎痘白灰陷頂者有寒者加肉桂渴煩而燥加麥門冬泄瀉者加白朮茯苓小便不利車前子或合五苓散調入熱甚者黃芩抱按本草魏氏方也論曰此方原出東垣治慢驚土衰火旺之法今備而治痘以其內固營血外護衛氣滋助陰陽作為膿水其症雖異其理則同去白芍加生薑改名保元湯襲氏醫鑑曰活血加當歸五分芍藥一錢勻氣加陳皮五分解毒加玄參牛蒡子各七分頂陷加芎桂色不光澤加芍桂糯米色昏紅紫加木香當歸不能成漿加桂糯漿足濕潤下斂加朮苓發渴加麥門五味子頭額不起脹加芎六分為引面部不起脹加桔四分為引兩手不起脹加桂枝二分為引春抱又按保赤全書曰或本方加桂以助參耆之力吳山甫曰氣虛陷頂者此方主之氣者長養萬物者也氣盛即物壯氣弱即物衰故痘瘡陷頂者責之氣虛也魏桂嵓自論云人參益內甘草和中實表宜用黃耆助陽須憑官桂前三味得三二之道體後一味扶一命之顛危醫統補中益氣湯治痘疹發熱難出或脾胃虛陷發及陷附倒靨此能補中益氣可以為痘疹之內托十分穩當寒熱得中而無太過不及之弊內有參耆以補元氣有當歸以生血有術陳以健脾有升柴以發表托裡不致內陷寒加桂乾薑熱加芩連血不行者加紫草渴加麥門吳山甫曰難經謂氣主煦之故氣者噓長萬物者也痘不起脹氣之弱也可知矣故用參耆朮草以補氣用柴升以升陽有歸可以活其榮陳可以利其氣醫統六君子湯治痘疹脾胃虛弱泄瀉不食方四君子加半夏陳皮壽世參苓白朮散治痘疹胃虛不進飲食或口乾發熱或吐瀉等方見脾胃門春抱按保赤全書曰治痘已靨身熱不退煩渴不止者名參苓白朮散者則錢氏七味白朮散而加麥門者也此藥極能清神生津云醫統藿香正氣散治痘疹或感風寒頭痛發熱咳嗽噁心惡食嘔吐出不快者此藥發散溫和調中散表醫統導赤散治痘疹心經蘊熱煩躁不寧小便不利面赤多渴人參生地麥門木通甘草上水煎服加竹葉同煎服更妙春抱按吳氏加燈心曰內熱故用地黃小便黃赤故導以木通竹葉燈心口乾煩渴故潤以參麥甘草乃氣化而津液自生也玉案犀角地黃湯治熱血痘初出太熱大便黑糞或衄血小便出血犀角牡丹皮各一錢白芍一錢五分生地黃三錢上水煎服一方有當歸一錢半按吳山甫曰心主血生地所以涼心血肝納血白芍所以和肝血火能載血牡丹皮所以去血之火熱能行血生犀角所以解諸經之熱醫統四君子湯治痘疹脾胃虛弱而不思飲食氣弱不能載痘頂陷灰白宜用之醫統八物湯治痘疹氣血兩虛不能載毒故有內陷不起或枯澀不潤或不灌漿或不結靨多是氣血不足故也不拘日期並宜服山甫曰氣體虛弱痘證雖順此方主之書貴未然之防痘證雖順若氣體虛弱不補恐有後失故用人參茯苓白朮甘草以補氣當歸川芎芍藥地黃以養血醫統十全大補湯治證同前虛之甚則又宜此山甫曰痘證十日以上血氣虛弱者此方主之參耆朮苓甘草大補氣也芎歸芍地肉桂大補血也氣血平補故曰十全醫林四物湯治痘瘡出入不快顏色不紅潤光澤不透者為血澀故也此藥能活血調和營衛無如此妙活人書用白芍一味為末治痘瘡不快以此知四物湯誠痘瘡之仙方也一方加甘草尤妙山甫曰痘根淡血弱者此方主之痘至五六日氣尊血附之時痘根淡者為血弱故用當歸活血川芎行血熟地補血芍藥斂血入門加味四聖散治痘出不快及變陷倒靨小便赤身熱未退或風吹復胃者紫草黃耆人參甘草川芎蟬蛻木通木香上加糯米百粒水煎服大便祕加枳殼便調加糯米能解毒發痘也準繩理中湯痘始出手足便冷者其人先有吐利四肢者皆稟氣於胃脾胃氣弱而不得至經此方主之依本方加桂上薑棗水煎服按保赤全書曰寒瀉便清不渴而嘔吐者首尾可用之若陰寒手足厥冷腹痛自利者加附子山甫曰胃中虛寒或又誤服涼藥瀉而手足厥冷者此方主之參朮甘草之甘溫所以補虛乾薑附子之辛熱所以回陽濟世內托散治氣血虛損或風邪穢毒沖觸使瘡毒內陷伏而不出或出不勻快用此活血勻氣調胃補虛內托瘡毒使之盡出易收易靨黃耆人參當歸各二錢川芎防風桔梗厚朴白芷甘草生各一錢木香肉桂各三分上水煎服於紅紫黑陷屬熱毒者去桂加紫草紅花黃芩陳氏木香散治發痘疹裡虛泄瀉而作渴者木香五分丁香五粒人參五分肉桂八分陳皮半夏各八分赤茯苓甘草前胡訶子大腹皮各五分上薑水煎服龔氏回春去腹半甘加耆朮朴按薛氏曰案若痘瘡已出未出之間其瘡不光澤不起發不紅活五七日內泄瀉作渴或肚腹作脹氣促作喘或身雖熱而腹脹足指冷或身熱作渴或驚悸腹脹或汗出不止或寒戰咬牙瘡不結痂此皆脾胃虛寒津液衰少急用此藥治之若誤認為實熱用寒涼之藥及飲蜜水生冷瓜果之類必不治蘴溪吳氏曰胃虛而寒則生泄瀉失津液則令人渴是方也參草補胃木丁桂溫胃青半腹前苓調胃乃訶子者所以止瀉而生津也此亦以胃氣為主蓋胃不虛寒則瀉自止津液自生而渴自除矣陳氏異功散治痘出欲靨未靨之間頭溫足冷腹脹瀉渴急服此藥能除風寒濕痹調和陰陽滋養血氣使痘易出易靨不致癢塌切忌食蜜木香肉桂當歸茯苓白朮人參陳皮厚朴半夏丁香肉蔻附子上薑棗水煎服龔氏回春加芎耆訶子去肉木陳薛氏曰按前方若痘瘡不光澤不起發不紅活不結靨謂之表裡俱虛宜用此藥治之若悶亂煩渴吐瀉不食腹痛腹脹痰喘氣急謂之表裡虛寒急用此藥送豆蔻丸或十日至十一日當靨不靨煩渴咬牙手足並冷飲沸湯而不知熱此陽虛脫陷急用此湯救之亦有復生者丹溪先生曰陳氏方大率歸重於太陰經蓋以手太陰屬肺主皮毛也足太陰屬脾主肌肉肺金惡寒而易於感脾胃土惡濕而無物不受觀其用丁香官桂所以治肺之寒也用附朮半夏所以治脾之濕也使其肺果有寒脾果有濕而兼有虛也量而與之中病則止何傷之有今也不然徒見其瘡之出遲者身熱者泄瀉者驚悸者氣急者渴思飲者不問寒熱虛實率投木香散異功散若誤投禍不旋踵山甫曰參朮茯歸所以補胃桂附丁豆所以溫胃半術陳朴所以調胃胃陽明也陳氏云陽明主肌肉胃氣充足則肌肉溫暖自然光澤起脹而無癢塌之患也準繩參附湯治痘疹陽氣虛寒咬牙寒戰手足並冷人參一兩附子三錢上生薑水煎服壽世獨參湯治痘出至貫膿收靨之時倒塌陷伏心慌喘急悶亂死在須臾人參一兩上水煎濃汁灌下即蘇保赤胃風湯治痘下痢膿血人參白朮茯苓官桂川芎當歸白芍上加粟米一百粒水煎服按此方出和劑局方而劉宗原曰名之為治風而實非治風乃補血和血益胃氣之藥下血痢而挾虛者實可倚仗也保赤阿膠駐車丸治痘後下痢膿血並腸垢當歸二兩黃連四兩乾薑炮一兩五錢上為末阿膠二兩炒成珠醋煮膏和末藥丸如桐子大每服二十丸食前米飲下日三服小兒研化保赤涼血芍藥湯治痘出作痛芍藥酒炒當歸酒洗生地黃酒洗地骨皮紅花上各等分水煎服保赤犀角消毒飲治痘出作痛犀角牛子荊芥甘草上水煎服按痘出而痛者治各不同初出時痛者發未盡也宜和解既出稠密痛者毒盛血瘀也上二方最宜也保赤加味四聖解毒湯治痘癢大便祕者紫草木通枳殼黃耆桂枝大黃上水煎服按群玉曰痘瘡發癢如能食而大便堅結者此邪氣內實正氣外虛也此湯主之保赤消風火解毒湯治痘發癢防風荊芥升麻芍藥桂枝牛子葛根上各等分淡竹葉為引水煎服按心書曰痘瘡作癢者火邪傳於肌膚之間不能即出或血方流行而為風寒外束故鬱滯而作癢者此湯最宜保赤八物湯治痘發癢剝去痂皮仍灌漿如瘡疥者人參黃耆甘草白朮當歸川芎白芍地黃上各等分水煎服或加薑棗按痘癢屬氣血虛者宜此保赤參耆內托散治瘡色淡白精神虛怯小便利大便頻至夜癢甚者此氣血兼脾俱虛也人參黃耆當歸川芎防風厚朴桔梗白芷桂紫草木香糯米一撮上等分水煎服保赤加味四物湯瘡色紅紫煩躁大小便不利渴欲飲湯水甚而至抓破流血者此氣虛血熱毒盛而血行氣分血味鹹醃螫皮肉而癢也用之治依本方加參耆丹皮連翹蟬蛻白芷甘草上等分水煎服補遺方全幼疹痘護眼人多用胭脂塗目四邊仍以黃柏膏塗之醫林黃蘗膏醫學綱目護眼膏錢氏方也黃蘗一兩新緑豆一兩半甘草四兩上為末香油調從耳前至眼眶厚塗之日兩三次如早用則瘡不至面縱有亦稀也濟世吹雲散治痘後餘毒入眼生翳或紅或腫痛黃丹水飛一錢輕粉三分片腦一釐上為末鵝管吹耳內如左眼患吹入右耳右眼患吹入左耳一日三次兼服後藥須得早治遲則必難為矣保赤一方用黃丹輕粉各一錢為末吹照前法效一加雄黃麝香少許最妙保赤化毒湯治痘後餘毒生翳當歸川芎赤芍生地防風葛根菊花天花粉蟬蛻各等分穀精草上水煎服赤腫痛加黃連梔子翳加木賊丹溪一方治熱眼防風黃連連翹升麻桔梗梔子草決明赤芍當歸上水煎服保赤地黃散治痘瘡入眼心肝壅熱目赤腫痛或生赤脈或白膜遮睛四邊散漫者易治若暴遮黑睛多致失明宜速用此大人亦宜熟地黃當歸防風蟬蛻羌活白蒺藜穀精草木賊各一錢玄參五分犀角一錢黃連大黃甘草木通各一錢五分上為末每五分量兒大小用羊肝煮汁調服忌口將息一方有生地黃保赤洗肝散治痘毒攻眼障腫遮睛川芎歸尾防風羌活薄荷梔子甘草上等分水煎食後服如睛痛昏暗加石膏穀精草緑豆皮翳膜加蟬蛻白蒺藜熱實便祕加黃芩大黃按羌活防風薄荷清肝經之風熱蓋目者肝之竅肝木藏也喜散而惡郁故上件三味散之則條達也當歸和肝部之血川芎甘草和肝部之氣山梔清鬱火也丹溪曰目病屬風熱血少夫痘蘊非常之熱自里而達外苟氣血弱而不能逐毒則火內郁而血脈逆行斯痘毒入於目矣況熱毒生風肝應於木而目病由茲作焉是故有赤腫痛不能開者此方主之保赤撥雲散治痘毒入眼生翳防風甘草羌活黃芩黃連菊花白芷荊芥龍膽草石膏川芎大黃石決明草決明上研末蜜水調下保赤蜜蒙花散治痘入目翳膜遮暗蜜蒙花菊花石決明蒺藜木賊羌活上為末茶清調下醫林人齒散治痘疹初出光壯忽然黑陷心煩在躁氣喘妄語或見鬼神並宜速治不然毒氣入臟必死人齒燒存性上為末每齒作一服酒下按保赤全書用麝香少許俱二味為末用雞冠血調成膏好酒半盞乳半盞入蔥白一撮煎調下山甫曰痘之為物外感穢氣則陷入內食穢物則凸出牙灰麝香亦穢物耳故用之以起陷中之痘錢氏云變黑歸腎而用骨余以治之非通論也全幼阮氏闢穢丹薰解穢惡法蒼朮細辛甘松川芎乳香降真上為末用水圓烈火焚解穢氣全幼小兒痘瘡房室中時時燒大黃蒼朮以闢穢氣不可燒沉檀腦麝乳白膠等香煎煼肉油氣並切忌之正傳天花散治痘後失音天花粉桔梗茯苓訶子肉石菖蒲甘草上為末用水調半匙在碗內外以小竹七莖黃荊七條縛作一束點火在碗內煎臨臥服醫統清涼飲子治痘毒癰癤驚痰壯熱大黃連翹當歸芍藥羌活防風梔子甘草上水煎服醫林五福化毒丹治痘疹餘毒上攻口齒及治蘊積毒熱驚惕狂躁頰赤咽乾口舌生瘡人參半兩玄參半兩茯苓一兩青黛甘草各五錢桔梗一兩牙硝半兩麝香腦子各半錢一方無腦子而有金銀箔上為末煉蜜丸每兩作十二丸一歲兒一丸分作四服用薄荷湯化下瘡疹上攻涎血臭氣生地黃自然汁化一丸用雞翎刷口內熱疳肌肉黃瘦雀目不見物陳粟米泔水化下食後臨睡服濟世治痘後不問蘊毒發於何經初起紅腫用黑豆緑豆赤豆三豆以酸醋浸研漿時時以鵝翎刷之隨手退去保元清金散痘餘毒在脾肺者則發咳嗽陳皮中半夏中貝母上天花粉上麥門冬上桔梗上梔子炒黃芩各等分甘草生下上水煎食遠服保元麥門冬飲痘毒發熱作渴咽痛麥門冬四分黃芩三分甘草五分人參玄參各三分金銀花五分上水煎服咽痛加桔梗五分方考十三味敗毒散痘後腫毒此方主之當歸陳皮白芷赤芍乳香穿山甲沒藥貝母金銀花皂角刺防風甘草天花粉上水煎服山甫曰實證補之則生癰毒是方也防風白芷解表而泄其熱乳香沒藥散血而消其毒穿山甲皂角刺能引諸藥至有毒之處金花赤芍能解熱毒於瘀壅之中痰中諸熱貝母天花粉可除氣血不調甘草陳皮當歸可療正傳十六味流氣飲痘後餘毒氣流於陰陽脾經則癰發四肢手腕並膝臏而腫痛宜此湯當歸川芎芍藥人參黃耆檳榔子防風白芷紫蘇木香肉桂桔梗厚朴烏藥枳殼甘草上水煎服按此方出於外科集驗也丹溪曰此方乃表裡氣血之藥也復以疏風助陽之藥參入非脈之洪緩沉遲緊細者不宜用或語云向井氏曰痘疹留毒腫痛者熟梨一枚去實搗渣滓俱取之敷於腫上而不日消散妙也曾於二男三歲而患痘疹愈後左手肘下留毒腫痛按之其熱如燒手以上件法而敷處有氣如焢二三日而全消散矣春抱按梨微酸寒蘇恭曰切片貼湯火傷止痛不爛云云此痘疹留毒焮痛清解之理一也最信從其言也方考治痘瘡濕爛方或以敗草灰或以蠶繭灰入枯礬少許傅之或以牆上白𧒮螄螺燒灰敷之或以蛤粉敷之四法者皆是濕者燥之意一五水痘夫水痘亦類傷寒之狀身熱二三日而出或咳嗽面赤眼光如水或噴嚏或唾涕與平痘不同易出易靨不宜燥濕苟能燥之亦不為害不能結痂矣保赤麥湯散古本只此一方或作湯服亦可地骨皮滑石甘草各五分甜葶藶麻黃大黃知母羌活人參各一錢上為末每服三分用小麥七粒煎水服一六麻疹古謂麻即疹也疹出如麻成朵痘出如豆成粒皆象其形而名也夫胎毒一也痘出於五臟臟屬陰陰主血故痘有形而有汁其症寒熱備有也疹出於六腑腑屬陽主氣故疹有形而無漿其形多實熱而無寒也為症既異則治法亦殊痘宜內實可用補劑疹忌內實只宜解散惟初熱發麥略相似耳既出之後痘則補氣以生血疹宜補陰以制陽何也蓋疹熱甚則陰分受其熬煎而血多虛耗故治以清火滋陰為主而不可少動其氣所以燥悍之劑首尾當深忌者也世知痘證所繫之重而不知疹之殺人尤甚方書多忽而不備良可太息矣壽世升麻葛根湯疹之初起呵欠發熱惡寒咳嗽噴嚏流涕頭眩者宜此湯升麻葛根白芍藥甘草上水煎服李氏入門曰此方麻症初起之神劑也潮熱甚加黃芩黃連地骨皮按此方麻疹初起之聖藥也蓋發熱之初多似傷風惟疹子則有上件諸症而或眼胞腫面浮腫雙腮赤噁心乾嘔等此麻疹之先兆也宜此湯山甫曰麻疹已山未出此方皆主之諸疹未出升葛根能出之諸疹已出升麻葛根能散之芍藥和營甘草和衛醫統敗毒散斑疹出未快寒熱頭痛身疼者羌活獨活柴胡前胡人參桔梗甘草川芎茯苓枳殼上水煎濟世消毒飲麻疹既出見一日而又沒者乃為風寒所沖麻毒內攻若不治胃爛而死可服此藥熱退遂安如麻見一二日退後若有被風寒之症又宜神妙也方見痘門醫鑑蘇葛湯初熱未見點發表之藥暫用分兩量兒大小服之紫蘇二錢葛根二錢甘草二錢白芍一錢半陳皮五分砂仁五分上薑水煎服醫鑑加味升麻湯治小兒麻疹表藥也或鄰家已有疹證預服升麻玄參柴胡黃芩各五分乾葛赤芍各四錢獨活一錢甘草二錢上水煎服保赤防風解毒湯治麻疹初發熱如時令和緩以此辛涼之藥發之防風薄荷荊芥石膏知母桔梗牛子甘草連翹木通枳殼淡竹葉上各等分加燈心水煎服保赤黃連解毒湯治麻疹初發熱如時令暄熱以此辛寒藥發之黃連黃芩黃柏山梔牛子甘草防風荊芥知母石膏桔梗玄參木通上薑水煎服醫鑑麻疹出時如色紅紫乾燥暗晦乃火盛毒熾急用六乙散解之或四物湯去地黃加紅花炒芩進之保赤竹茹石膏湯治麻症作吐陳皮半夏石膏茯苓竹茹甘草上水煎服玉案必勝飲治痧已出而瀉不止陳皮厚朴蒼朮茯苓牛子澤瀉木通上薑水煎濟世四苓散治麻疹泄瀉須分新久新瀉熱瀉宜之豬苓澤瀉白朮茯苓上加木通水煎服按醫鑑曰疹症寒瀉者十中無一如有傷食傷冷不得已以理中湯一服而止保赤升麻澤瀉湯治麻疹自利豬苓澤瀉滑石赤茯苓甘草黃連升麻上各等分水煎服保赤平胃散治麻疹出之時泄瀉者蒼朮厚朴甘草陳皮上各等分水煎服或為末調服亦可按疹出之時自利不止或瀉稀水頻數者最為惡候但要看其疹若遍身稠密太盛或紫色或紅色甚者則又不妨蓋毒在大腸非泄則鬱遏而不解惟用平胃散加葛根連翹以解之而已疹一發透依期收去自然瀉止若疹已收而瀉尤不止者疹必未盡再用前藥加連翹黃連牛蒡子木通澤瀉以分利之若用訶子肉蔻等澀滯之藥則變腹脹痞滿喘急不治之症矣醫鑑一方小兒疹後赤白痢疾黃連甘草杏仁桔梗木通厚朴澤瀉上各等分燈草水煎服如下墜加枳殼保赤黃芩芍藥湯治麻症滯下者條芩三錢白芍升麻各二錢甘草一錢上水煎服保赤三黃丸治麻後赤白痢裡急後重身實者黃芩蒸黃連炒大黃蒸過上各等分為末糊丸如梧桐子大二三丸白湯下量大小虛實加減保赤香連丸治症同前身虛者以此和之黃連一兩吳茱萸五兩上用少水拌勻頓滾水內半日取出炒乾揀去茱萸不用加木香三兩不見火共為細末醋糊丸米湯下量大小加減按黃連苦寒直折心家之火恐其大寒之性凝而不行故以茱萸之辛溫制之木香以通利三焦氣行而火降矣且能監製黃連此方也一冷一熱寒因熱用最得制方之妙保赤黃芩湯治麻後赤白痢黃芩炒黃連炒當歸酒洗川芎人參木香青皮炒枳殼炒檳榔甘草上各等分水煎好再加益元散調服按疹出之時曾作瀉痢未經清解至疹退之後變為休息痢不問赤白裡急後重晝夜無度頻並者此餘毒在大腸也須分虛實治之實者三黃丸利之虛者香連丸和之後用黃芩湯養血行氣為治河間曰養血而下利自止行氣而後重自除誠哉斯言也鑑之濟世導赤散治麻疹已出譫語小便閉者生地木通甘草淡竹葉上水煎按此方清利心小腸之熱良劑保赤甘桔湯疹出之時咽喉腫痛不能飲食者此毒火怫鬱而上薰咽喉也以此湯甘草桔梗上水煎服加玄參牛蒡子連翹保赤利咽解毒湯山豆根一錢麥門一錢牛蒡子炒七分玄參七分桔梗七分防風五分甘草二分上水煎服玉案玄桔湯治痧症咽喉腫痛玄參桔梗牛蒡子連翹天花粉甘草淡竹葉七片上生薑水煎服保元清金降火湯治麻疹後熱乘肺金聲啞不出或咳或喘蘇梗陳皮黃連黃芩酒炒山梔子炒石膏玄參貝母瓜蔞天門冬麥門冬當歸生地茯苓桑白皮杏仁白芍甘草上生薑水煎服保元一方小兒疹後咳嗽腹脹喘急煩躁泄瀉聲啞唇口青黑黃連黃芩連翹玄參知母桔梗杏仁白芍麻黃牛子葛根陳皮厚朴甘草上水煎服回春防風通聖散麻疹已出大小便閉防風川芎當歸白芍連翹薄荷麻黃各四分石膏桔梗黃芩各八分白朮山梔荊芥各三分滑石二錢芒硝四分甘草一錢大黃四分上水煎服壽世白虎解毒湯麻疹已出譫語煩躁作渴者石膏知母黃連黃芩黃柏梔子甘草上水煎服壽世犀角解毒湯麻疹已出大便下血或小便下血吐血衄血或二便閉澀瘡疹稠密熱渴赤痛等症犀角一錢升麻代之生地五分牡丹一錢赤芍一錢黃連黃芩黃柏梔子上水煎服吐血衄血加炒山梔童便和服入門疹子沒復餘熱內攻循衣摸床譫言妄語神昏喪志者死如熱輕餘毒未除必先見諸氣色雖預防之始終以升麻葛根湯為主或消毒飲黃連解毒湯隨症選用乃忌魚腥蔥蒜之物入門麻疹始終雜症皆熱熾也初起已沒及一切雜症與痘毒大同但始終藥宜清涼雖然麻愛清涼痘愛溫不易常道虛則補實則瀉醫家治法故治麻亦有血虛而用四物湯氣虛而用四君子湯天寒傷冷則溫中理中之藥一時之權也家藏龜溪道三先生曰疹後微熱不止者錢氏曰白朮散醫鑑麻疹正出之時雖不進飲食者但得麻疹淡紅潤澤真正不為害也蓋熱毒未解內蘊實熱自不必食也退後若不食當隨用四物湯加砂仁神麯一二帖決能食矣如胃氣弱者忌少下地黃也
