front:
  text: 序夫嬰童良方數千愚採托一千餘件以便日用近間二三閲之者曰此書所編盡取前賢舊方補瀉溫涼等之劑摘其要點能用之者藏於藥笥以便調劑遺忘則豈云無少補乎寶永六年己丑歲冬十月吉旦攝陽下津氏
  hash: sha256:f09190604275ee739271e606842571912e851e404a56df24ba892e00fc1c23ae
